<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>觸控事件優化：長按與放開 - Vibe Coding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

</head>

<body id="page-started" class="bg-gray-50 flex flex-col min-h-screen font-[Inter]">

    <script type="module" src="/js/nav-component.js?v=2026.05.26.V48.START_MASTER_PARITY"></script>
    <script src="/js/course-shared.js?v=2026.05.26.V48.START_MASTER_PARITY"></script>
    

    <!-- Tab Navigation Bar -->
    <div class="unit-tabs-wrapper">
        <div class="unit-tabs-container">
            <div class="unit-tabs-flex" id="course-tabs-container">
                <button onclick="switchTab('unit1')" id="tab-unit1" class="unit-tab-btn active">
                    <span>1️⃣</span> 觸控生命週期
                </button>
                <button onclick="switchTab('unit2')" id="tab-unit2" class="unit-tab-btn">
                    <span>2️⃣</span> 長按邏輯
                </button>
                <button onclick="switchTab('unit3')" id="tab-unit3" class="unit-tab-btn">
                    <span>3️⃣</span> 防止預設行為
                </button>
            </div>
        </div>
    </div>

    <!-- Content Area (Iframe) -->
    <div class="flex-grow w-full relative">
        <iframe id="content-frame" src="" class="w-full h-full border-0 absolute inset-0 bg-gray-50 option-opacity"
            onload="resizeIframe(this)"></iframe>
    </div>

    <script>
        const tabs = {
            unit1: {
                id: 'tab-unit1',
                url: 'start-04-unit-touch-basics.html'
            },
            unit2: {
                id: 'tab-unit2',
                url: 'start-04-unit-long-press.html'
            },
            unit3: {
                id: 'tab-unit3',
                url: 'start-04-unit-prevent-default.html'
            }
        };

        const iframe = document.getElementById('content-frame');

        function switchTab(unitKey) {
            // Update Tab Styles
            Object.keys(tabs).forEach(key => {
                const tabEl = document.getElementById(tabs[key].id);
                if (key === unitKey) {
                    tabEl.classList.add('active');
                } else {
                    tabEl.classList.remove('active');
                }
            });

            // Update Iframe Source with Query Params (Tokens)
            const url = tabs[unitKey].url;
            loadContent(url);
        }

        function loadContent(url) {
            iframe.style.opacity = '0';
            setTimeout(() => {
                const separator = url.includes('?') ? '&' : '?';
                const query = window.location.search.substring(1);
                iframe.src = query ? `${url}${separator}${query}` : url;
                iframe.onload = () => {
                    iframe.style.opacity = '1';
                };
            }, 300);
        }

        // Initialize first tab
        switchTab('unit1');
    </script>

</body>

</html>
