<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 代理人與 Vibe Coding 實戰指南 - Vibe Coding</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body id="page-started" class="bg-gray-50 flex flex-col min-h-screen font-[Inter]">

    <!-- Navigation (Shared) -->
    <div id="nav-placeholder"></div>
    <script src="/js/nav-component.js"></script>
    <script>
        renderNav('/');
    </script>

    <!-- Tab Navigation Bar -->
    <div class="unit-tabs-wrapper">
        <div class="unit-tabs-container">
            <div class="unit-tabs-flex" id="course-tabs-container">
                <button onclick="switchTab('mode')" id="tab-mode" class="unit-tab-btn active">
                    <span class="tab-icon">🤖</span>
                    <span class="tab-text">Agent 模式</span>
                </button>
                <button onclick="switchTab('web')" id="tab-web" class="unit-tab-btn">
                    <span class="tab-icon">🌐</span>
                    <span class="tab-text">網頁版代理人</span>
                </button>
                <button onclick="switchTab('vibe')" id="tab-vibe" class="unit-tab-btn">
                    <span class="tab-icon">🔥</span>
                    <span class="tab-text">Vibe Coding 實戰</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Content Area (Iframe) -->
    <div class="flex-grow w-full relative bg-gray-50">
        <iframe id="content-frame" src="" 
            class="w-full h-full border-0 absolute inset-0 opacity-0 transition-opacity duration-300"
            onload="this.style.opacity='1'">
        </iframe>
    </div>

    <script>
        const iframe = document.getElementById('content-frame');
        const tabs = {
            mode: { btn: document.getElementById('tab-mode'), file: '00-unit-agent-mode.html' },
            web: { btn: document.getElementById('tab-web'), file: '00-unit-web-agents.html' },
            vibe: { btn: document.getElementById('tab-vibe'), file: '00-unit-vibe-coding.html' }
        };

        // Initial Load
        const urlParams = new URLSearchParams(window.location.search);
        const initialTab = urlParams.get('tab') || 'mode';
        switchTab(initialTab);

        function switchTab(tabId) {
            const config = tabs[tabId] || tabs.mode;
            
            // Reset all tabs
            Object.values(tabs).forEach(t => {
                if (t.btn) t.btn.classList.remove('active');
            });

            // Activate current
            if (config.btn) config.btn.classList.add('active');
            
            // Load content
            loadContent(config.file);

            // Update URL without reload
            const newUrl = new URL(window.location);
            newUrl.searchParams.set('tab', tabId);
            window.history.pushState({}, '', newUrl);
        }

        function loadContent(url) {
            iframe.style.opacity = '0';
            const separator = url.includes('?') ? '&' : '?';
            const query = window.location.search.substring(1);
            iframe.src = query ? `${url}${separator}${query}` : url;
        }

        // Expose to window for iframe child calls
        window.switchTab = switchTab;
    </script>
    <script type="module" src="/js/master-nav.js?v=13"></script>
</body>

</html>
