<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>BLE 搖桿控制 | Vibe Coding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
        background: radial-gradient(circle at center, #1a1f2e 0%, #0d121c 100%);
        color: #e5e7eb;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        margin: 0; 
        padding: 1.5rem;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    .container-wrap { 
        max-width: 420px;
        width: 100%; 
        padding: 2rem; 
        background: rgba(31, 41, 55, 0.7);
        backdrop-filter: blur(20px);
        border-radius: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    #joystick { 
        position: relative; 
        width: min(75vw, 320px); 
        height: 0;
        padding-top: min(75vw, 320px);
        margin: 2rem auto; 
        border-radius: 50%; 
        background: #111827;
        box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.6), 0 0 0 8px rgba(79, 70, 229, 0.05);
        touch-action: none; 
    }

    #joystick-inner {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100%; height: 100%;
    }

    #joystick-thumb {
        position: absolute;
        width: 80px; 
        height: 80px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.3);
        cursor: grab;
        transition: transform 0.1s ease-out, box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        color: white;
        font-weight: 800;
        z-index: 10;
        border: 2px solid rgba(255, 255, 255, 0.1);
    }

    #joystick-thumb.active { 
        cursor: grabbing; 
        transform: translate(-50%, -50%) scale(1.1);
        box-shadow: 0 15px 30px rgba(79, 70, 229, 0.6);
    }
    
    .status-badge {
        flex: 1;
        text-align: center;
        font-weight: 700;
        font-size: 0.875rem;
        padding: 0.75rem;
        border-radius: 1rem;
        transition: all 0.3s ease;
    }

    .status-connected { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
    .status-disconnected { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
    .status-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }

    .telemetry-card {
        background: rgba(17, 24, 39, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 1rem;
        border-radius: 1.5rem;
    }
  </style>
</head>
<body>
    <div class="container-wrap">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black text-white tracking-tight">BLE Joystick</h1>
            <a href="index.html" class="text-gray-500 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </a>
        </div>

        <div class="flex gap-3 mb-8">
            <button id="btnConnect" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-900/20 transition-all active:scale-95">
                連線
            </button>
            <div id="status" class="status-badge status-disconnected">未連線</div>
        </div>

        <div id="joystick">
            <div id="joystick-inner">
                 <div id="joystick-thumb">T:0, S:0</div>
            </div>
        </div>

        <div class="telemetry-card space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-gray-500 text-sm font-medium">狀態</span>
                <span id="main-status" class="text-green-400 font-bold">靜止</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="text-center">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Throttle</p>
                    <p id="val_t" class="text-2xl font-black text-indigo-400">0</p>
                </div>
                <div class="text-center border-l border-gray-800">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Steering</p>
                    <p id="val_s" class="text-2xl font-black text-indigo-400">0</p>
                </div>
            </div>
        </div>

        <!-- QR Code Section: Hidden on mobile -->
        <div class="mt-10 pt-10 border-t border-gray-800 hidden md:flex flex-col items-center">
            <p class="text-xs text-gray-500 mb-4">Scan to open on mobile</p>
            <div class="bg-white p-2 rounded-2xl shadow-xl">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://vibe-coding.tw/examples/joystick.html" 
                     alt="QR Code" class="w-[120px] h-[120px]">
            </div>
            <p class="text-[10px] text-gray-600 mt-3 font-mono">https://vibe-coding.tw/examples/joystick.html</p>
        </div>
    </div>

<script>
const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c0ffee00dead'; 
const CHARACTERISTIC_UUID = '4fafc202-1fb5-459e-8fcc-c0ffee01feed'; 
const DEVICE_ID_KEY = 'ble_joystick_device_id'; 
const MAX_CONTROL_VALUE = 255; 
const DEADZONE_PWM = 15; 
const SEND_INTERVAL_MS = 60; 

const joystickContainer = document.getElementById('joystick');
const joystickInner = document.getElementById('joystick-inner');
const thumb = document.getElementById('joystick-thumb');
const statusEl = document.getElementById('status');
const mainStatusEl = document.getElementById('main-status');
const valTEl = document.getElementById('val_t');
const valSEl = document.getElementById('val_s');
const btnConnect = document.getElementById('btnConnect');

let device = null;
let characteristic = null;
let sendingInterval = null;
let lastPayload = {t: 0, s: 0}; 
let isDragging = false;
let isConnected = false;

let rect, centerX, centerY, maxRadius;

function updateConnectionStatus(text, state) {
    statusEl.textContent = text;
    statusEl.className = 'status-badge';
    
    switch (state) {
        case 'connected':
            statusEl.classList.add('status-connected');
            break;
        case 'error':
            statusEl.classList.add('status-error');
            break;
        case 'disconnected':
        case 'connecting':
        default:
            statusEl.classList.add('status-disconnected');
            break;
    }
    btnConnect.textContent = isConnected ? '斷開' : '連線';
}

function resize() {
    rect = joystickInner.getBoundingClientRect();
    centerX = rect.left + rect.width / 2;
    centerY = rect.top + rect.height / 2;
    maxRadius = rect.width / 2;
}

window.addEventListener('resize', resize);
window.addEventListener('scroll', resize); 
resize(); 

function updateMotorValues(rawX, rawY) {
    const distance = Math.sqrt(rawX*rawX + rawY*rawY);
    const magnitude = Math.min(1.0, distance / maxRadius);
    const angle = Math.atan2(rawY, rawX);
    
    const normS = magnitude * Math.cos(angle); 
    const normT = magnitude * Math.sin(angle); 

    let speedT = Math.round(normT * MAX_CONTROL_VALUE);
    let speedS = Math.round(normS * MAX_CONTROL_VALUE);

    if (Math.abs(speedT) < DEADZONE_PWM) speedT = 0;
    if (Math.abs(speedS) < DEADZONE_PWM) speedS = 0;

    valTEl.textContent = speedT; 
    valSEl.textContent = speedS; 
    thumb.textContent = `T:${speedT}, S:${speedS}`;
    
    let currentStatus = "靜止";
    let statusColor = "text-green-400";
    if (Math.abs(speedT) > DEADZONE_PWM || Math.abs(speedS) > DEADZONE_PWM) {
         statusColor = "text-yellow-400";
         if (speedT > DEADZONE_PWM && Math.abs(speedS) < DEADZONE_PWM) currentStatus = "前進中";
         else if (speedT < -DEADZONE_PWM && Math.abs(speedS) < DEADZONE_PWM) currentStatus = "後退中";
         else if (speedS > DEADZONE_PWM) currentStatus = "右轉中";
         else if (speedS < -DEADZONE_PWM) currentStatus = "左轉中";
         else currentStatus = "移動中";
    }
    mainStatusEl.textContent = currentStatus;
    mainStatusEl.className = `font-bold ${statusColor}`;

    lastPayload.t = speedT;
    lastPayload.s = speedS;
}

function resetThumbPosition() {
    thumb.style.left = '50%';
    thumb.style.top = '50%';
    thumb.style.transform = 'translate(-50%, -50%)'; 
    thumb.classList.remove('active');
}

function stopMotors() {
    isDragging = false;
    if (sendingInterval) {
        clearInterval(sendingInterval);
        sendingInterval = null;
    }
    resetThumbPosition();
    updateMotorValues(0, 0); 
    sendControl(); 
}

function handleMove(e) {
    e.preventDefault(); 
    if (!isDragging) return;

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    let offsetX = clientX - centerX;
    let offsetY = clientY - centerY; 
    
    const distance = Math.sqrt(offsetX * offsetX + offsetY * offsetY);
    if (distance > maxRadius) {
        const angle = Math.atan2(offsetY, offsetX);
        offsetX = maxRadius * Math.cos(angle);
        offsetY = maxRadius * Math.sin(angle);
    }
    
    const thumbRelativeX = maxRadius + offsetX;
    const thumbRelativeY = maxRadius + offsetY;

    thumb.style.left = `${thumbRelativeX}px`;
    thumb.style.top = `${thumbRelativeY}px`;

    updateMotorValues(offsetX, -offsetY);
}

function handleStart(e) {
    e.preventDefault(); 
    if (!isConnected) {
        updateConnectionStatus('請先連線', 'disconnected');
        return;
    }

    isDragging = true;
    thumb.classList.add('active');
    handleMove(e);

    if (!sendingInterval) {
         sendingInterval = setInterval(sendControl, SEND_INTERVAL_MS);
    }
}

function handleEnd() {
    if (!isDragging) return;
    stopMotors(); 
}

joystickInner.addEventListener('pointerdown', handleStart); 
document.addEventListener('pointermove', handleMove); 
document.addEventListener('pointerup', handleEnd); 
document.addEventListener('pointercancel', handleEnd); 

function onDisconnect() {
    isConnected = false;
    updateConnectionStatus('❌ 已斷線', 'disconnected'); 
    stopMotors(); 
    if (device) device.removeEventListener('gattserverdisconnected', onDisconnect);
    device = null;
    characteristic = null;
}

async function acquireDevice() {
    updateConnectionStatus('尋找中...', 'connecting');
    const storedDeviceId = localStorage.getItem(DEVICE_ID_KEY);

    if (storedDeviceId) {
        try {
            const devices = await navigator.bluetooth.getDevices();
            const knownDevice = devices.find(d => d.id === storedDeviceId);
            if (knownDevice) return knownDevice;
        } catch (e) {}
    }
    
    try {
        const newDevice = await navigator.bluetooth.requestDevice({
            filters:[{ namePrefix: 'esp32' }], 
            optionalServices: [SERVICE_UUID] 
        });
        localStorage.setItem(DEVICE_ID_KEY, newDevice.id);
        return newDevice;
    } catch(err) {
        throw new Error("取消掃描");
    }
}

async function connectBLE(){
    if (!navigator.bluetooth) {
        updateConnectionStatus('不支援 Web Bluetooth', 'error');
        return;
    }
    
    if (isConnected && device && device.gatt.connected) {
        device.gatt.disconnect();
        return;
    }

    try{
        if (!device) device = await acquireDevice();
        updateConnectionStatus(`連線中...`, 'connecting');

        device.removeEventListener('gattserverdisconnected', onDisconnect);
        device.addEventListener('gattserverdisconnected', onDisconnect);

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID); 
        
        isConnected = true;
        updateConnectionStatus('✅ 已連線', 'connected');
        
        if(isDragging && !sendingInterval) {
            sendingInterval = setInterval(sendControl, SEND_INTERVAL_MS);
        }
    }catch(err){
        isConnected = false;
        device = null;
        updateConnectionStatus(`❌ 失敗`, 'error');
    }
}

async function sendControl(){
  if(!characteristic || !isConnected || !device.gatt.connected) return;
  const payload = `${lastPayload.t},${lastPayload.s}`;
  try{
    await characteristic.writeValue(new TextEncoder().encode(payload));
  }catch(err){
    if (device && device.gatt && !device.gatt.connected) onDisconnect();
  }
}

btnConnect.addEventListener('click', connectBLE);
stopMotors(); 
updateConnectionStatus('未連線', 'disconnected'); 
</script>
</body>
</html>
