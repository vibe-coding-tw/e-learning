<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <title>WiFi 組態設定 - BLE 傳輸</title>
    <script>
        (function() {
            const w = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
                w.apply(console, args);
            };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 確保全螢幕高度和柔軟的背景色 */
        body {
            background-color: #1f2937;
            color: #f9fafb;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .container-wrap {
            max-width: 450px;
            width: 100%;
            padding: 30px;
            background-color: #1f2937;
            border-radius: 1.5rem;
        }

        /* 頂部控制列 - 模仿搖桿頁面佈局 */
        .top-control {
            width: 100%;
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 20px;
        }

        /* 按鈕樣式 (Connect / Send) */
        button {
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: #4f46e5;
            /* 靛藍色 */
            color: white;
            font-weight: 700;
            /* Neumorphic 外凸效果 */
            box-shadow: 3px 3px 6px #171d26, -3px -3px 6px #273142;
            transition: all 0.15s ease-in-out;
        }

        button:hover {
            background: #3730a3;
            box-shadow: 5px 5px 10px #171d26, -5px -5px 10px #273142;
        }

        button:disabled {
            background: #374151;
            color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 狀態顯示區域 - 內凹樣式 */
        #statusLog {
            flex: 1;
            text-align: center;
            font-weight: 600;
            font-size: 0.875rem;
            color: #9ca3af;
            padding: 12px;
            background: #2d3748;
            border-radius: 12px;
            /* Neumorphic 內凹效果 */
            box-shadow: inset 3px 3px 6px #171d26, inset -3px -3px 6px #3b4555;
        }

        .log-success {
            color: #4ade80 !important;
        }

        .log-error {
            color: #f87171 !important;
        }

        .log-info {
            color: #60a5fa !important;
        }

        /* 輸入框樣式 */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            border-radius: 10px;
            border: none;
            background: #2d3748;
            color: #f9fafb;
            font-weight: 500;
            /* 深色內凹效果 */
            box-shadow: inset 3px 3px 6px #171d26, inset -3px -3px 6px #3b4555;
            transition: box-shadow 0.15s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            background: #232d3a;
            /* 輕微的亮光效果 */
            box-shadow: inset 2px 2px 4px #171d26, inset -2px -2px 4px #3b4555, 0 0 5px #4f46e5;
        }

        /* 返回主選單按鈕 */
        .menu-button {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #4f46e5;
            color: white;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            box-shadow: 3px 3px 6px #171d26, -3px -3px 6px #273142;
            transition: all 0.2s ease;
        }
    </style>
</head>

<body class="p-4">
    <div class="container-wrap">

        <h1 class="text-2xl font-extrabold text-center text-indigo-400 mb-6 border-b border-gray-700 pb-2">
            WiFi 組態設定
        </h1>

        <!-- 頂部控制列：連線按鈕與狀態 -->
        <div class="top-control">
            <button id="btnConnect" class="flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <span>連線 BLE</span>
            </button>

            <div id="statusLog">
                等待連線...
            </div>
        </div>

        <!-- 設定表單 -->
        <div class="bg-gray-800 p-6 rounded-xl shadow-2xl space-y-4">
            <div class="space-y-2">
                <label for="ssid" class="block text-sm font-medium text-gray-400">Wi-Fi 網路名稱 (SSID)</label>
                <input type="text" id="ssid" placeholder="請輸入 SSID" required>
            </div>

            <div class="space-y-2">
                <label for="password" class="block text-sm font-medium text-gray-400">密碼 (Password)</label>
                <input type="password" id="password" placeholder="請輸入密碼" required>
            </div>

            <button id="btnSend"
                class="mt-6 w-full bg-indigo-600 text-white p-4 rounded-xl font-bold transition duration-150 hover:bg-indigo-700 disabled:opacity-50"
                disabled>
                傳送設定至裝置
            </button>

            <p class="text-center text-xs text-gray-500 pt-2">
                傳輸格式：SSID 與密碼會一次送到 <code>wifi-set</code>
            </p>
        </div>

        <!-- 返回主選單按鈕 -->
        <!-- 注意：如果這是您專案中的第二個頁面，請確保 index.html 存在 -->
        <a href="../index.html"
            class="menu-button w-full mt-8 text-center bg-gray-700 hover:bg-gray-600 text-gray-300 p-3 block rounded-xl shadow-md transition">
            返回主選單
        </a>
    </div>

    <!-- 引入 Quantifier 和 BLE Client 模組 -->
    <script src="../js/quantifier.d6e180f13fbd.js"></script>
    <script src="../js/ble-client.b00233280cf9.js"></script>

    <script>
        // --- BLE Configuration (對齊韌體 protocomm_ble 端點) ---
        const DEVICE_NAME_PREFIX = 'esp32';
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        // protocomm_nimble 會把 16-bit endpoint UUID 放進 base UUID 的 bytes[12:13]
        // NimBLE ble_uuid_to_str: u8p[15..12] = Group1, u8p[11..10] = Group2, ...
        // 對這組 base UUID 而言，0xff51 展開成 6e40ff51-b5a3-f393-e0a9-e50e24dcca9e
        const WIFI_SET_CHARACTERISTIC_UUID   = '6e40ff51-b5a3-f393-e0a9-e50e24dcca9e';
        const WIFI_CLEAR_CHARACTERISTIC_UUID = '6e40ff52-b5a3-f393-e0a9-e50e24dcca9e';
        const STATUS_CHARACTERISTIC_UUID     = '6e40ff53-b5a3-f393-e0a9-e50e24dcca9e';

        const DEVICE_ID_KEY = 'ble_config_device_id';

        // --- DOM Elements ---
        const statusLog = document.getElementById('statusLog');
        const btnConnect = document.getElementById('btnConnect');
        const btnSend = document.getElementById('btnSend');
        const ssidInput = document.getElementById('ssid');
        const passwordInput = document.getElementById('password');


        // --- Helper Functions ---

        /**
         * 將訊息記錄到狀態區域
         */
        function logStatus(message, type = 'info') {
            let typeClass = '';
            switch (type) {
                case 'success':
                    typeClass = 'log-success';
                    break;
                case 'error':
                    typeClass = 'log-error';
                    break;
                case 'info':
                default:
                    typeClass = 'log-info';
                    break;
            }
            statusLog.classList.remove('log-success', 'log-error', 'log-info');
            statusLog.classList.add(typeClass);
            statusLog.innerHTML = message;
        }

        /**
         * 更新 UI 狀態（按鈕啟用/禁用）
         */
        function updateUI(isConnected) {
            if (isConnected) {
                btnConnect.querySelector('span').textContent = '斷開';
                btnSend.disabled = false;
            } else {
                btnConnect.querySelector('span').textContent = '連線 BLE';
                btnSend.disabled = true;
            }
        }


        // --- BLE Connection Logic ---

        /**
         * 處理 BLE 斷線
         */
        function onDisconnect() {
            logStatus('❌ 已斷線', 'error');
            updateUI(false);
        }

        /**
         * 連線/斷開 BLE 裝置
         */
        async function connectBLE() {
            if (!navigator.bluetooth) return;

            // 如果已連線，則斷開
            if (window.bleClient.connected) {
                window.bleClient.disconnect();
                return; // onDisconnect callback 會處理 UI
            }

            try {
                logStatus('準備連線...', 'info');

                // 註冊斷線回調 (確保一次)
                if (window.bleClient.onDisconnectCallbacks.indexOf(onDisconnect) === -1) {
                    window.bleClient.onDisconnectCallbacks.push(onDisconnect);
                }

                // 連線到 protocomm BLE service
                const device = await window.bleClient.connect(SERVICE_UUID, null, DEVICE_NAME_PREFIX);

                updateUI(true);

                // 連線成功後，讀取目前狀態
                await readStatus(device);

            } catch (err) {
                console.error('BLE 連線失敗:', err);
                if (err?.name === 'AbortError' || err?.name === 'NotFoundError') {
                    if (err?.stage === 'requestDevice') {
                        logStatus('⚪ 已取消裝置選擇。', 'info');
                    } else if (err?.deviceName) {
                        const serviceList = Array.isArray(err.availableServices) && err.availableServices.length > 0
                            ? `<br>服務清單：${err.availableServices.join(', ')}`
                            : (err.availableServicesError ? `<br>讀取服務失敗：${err.availableServicesError}` : '');
                        const stageInfo = err?.stage ? `<br>階段：${err.stage}` : '';
                        logStatus(`❌ 已選擇 ${err.deviceName}，但連線失敗 (${err.message})${stageInfo}${serviceList}`, 'error');
                    } else {
                        logStatus(`❌ 連線失敗 (${err.message})`, 'error');
                    }
                } else if ((err?.message || '').includes('Must be handling a user gesture')) {
                    logStatus('⚠️ 瀏覽器阻止配對：請用實際滑鼠點擊「連線 BLE」，不要由腳本觸發。', 'error');
                } else {
                    logStatus(`❌ 連線失敗 (${err.message})`, 'error');
                }
                updateUI(false);
            }
        }

        /**
         * 從裝置讀取目前狀態
         * protocomm 採用「先 WRITE 觸發 handler，再 READ 取回回應」的協定。
         * 直接呼叫 readFrom 只會拿到上次快取的值（初次連線時為空）。
         */
        async function readStatus(device) {
            try {
                logStatus('正在從裝置抓取目前狀態...', 'info');

                // protocomm 協定：先 WRITE 空請求觸發 status handler，再 READ 取得 JSON 回應
                await window.bleClient.writeTo(STATUS_CHARACTERISTIC_UUID, new Uint8Array([0]));
                // 短暫等待 handler 處理完成
                await new Promise(r => setTimeout(r, 100));

                const decoder = new TextDecoder();
                const statusBuffer = await window.bleClient.readFrom(STATUS_CHARACTERISTIC_UUID);
                const statusText = decoder.decode(statusBuffer).replace(/\0+$/g, '').trim();
                const status = statusText ? JSON.parse(statusText) : {};

                const appName = status.app_name || device?.name || 'unknown';
                const wifiState = status.wifi_state || 'unknown';
                const bleState = status.ble_state || 'unknown';
                // 只有 wifi_state === 'connected' 時韌體才會填 IP，其餘情況是空字串。
                const wifiIp = status.wifi_ip || '';

                // 密碼基於安全考量，韌體的 status 端點永遠不會回傳，所以只能帶回 SSID，
                // 密碼欄位保持空白，需要使用者自己重新輸入。
                if (status.wifi_ssid) {
                    ssidInput.value = status.wifi_ssid;
                }

                // mDNS 主機名稱固定等於 app_name（韌體端 build_mdns_hostname() 直接沿用
                // board_build_device_name()），不管有沒有連線都能算出來；IP 則只有
                // wifi_state === 'connected' 才有值。兩個都給，因為 mDNS .local 在某些
                // 網路環境會解析失敗，IP 是更可靠的備援。
                const mdnsInfo = appName !== 'unknown'
                    ? ` · mDNS <b>${appName}.local</b>（http://${appName}.local/）`
                    : '';
                const ipInfo = wifiIp ? ` · IP <b>${wifiIp}</b>（http://${wifiIp}/）` : '';
                logStatus(`✅ 已連線: ${appName} · Wi-Fi ${wifiState} · BLE ${bleState}${mdnsInfo}${ipInfo}`, 'success');
            } catch (err) {
                console.warn('讀取狀態失敗 (可能韌體不支援讀取特性):', err);
                logStatus(`✅ 已連線: ${device?.name || 'ESP32'}，但無法讀取目前狀態`, 'success');
            }
        }


        /**
         * 傳送 SSID 和密碼給裝置
         */
        async function sendConfig() {
            if (!window.bleClient.connected) {
                logStatus('⚠️ 請先連線到 BLE 裝置。', 'info');
                return;
            }

            const ssid = ssidInput.value.trim();
            const password = passwordInput.value.trim();

            if (ssid === "" || password === "") {
                logStatus('⚠️ SSID 和密碼欄位不可為空。', 'error');
                return;
            }

            const encoder = new TextEncoder();

            try {
                logStatus(`傳送 Wi-Fi 設定到 ${ssid}...`, 'info');
                btnSend.disabled = true; // 傳送中禁用按鈕

                // 韌體的 wifi-set 端點期待單次 payload，使用換行分隔 SSID / Password
                await window.bleClient.writeTo(WIFI_SET_CHARACTERISTIC_UUID, encoder.encode(`${ssid}\n${password}`));

                logStatus('✅ 設定已送出，正在斷開 BLE 讓裝置專心連 Wi-Fi...', 'success');

                // ESP32-C3 只有一顆天線，BLE 和 Wi-Fi 共用無線電、靠時間切片共存。
                // 如果送出設定後繼續保持 BLE 連線，持續的 BLE 連線會佔用無線電時間，
                // 干擾 STA 的 WPA 認證交握，導致連線一直逾時重試、永遠連不上
                // （實測 serial log 出現 "Coexist: Wi-Fi connect fail, apply reconnect
                // coex policy"）。所以送出設定後主動斷線，把無線電讓給 Wi-Fi 用。
                // 等待 300ms 讓韌體端把 BLE 回應送完，避免斷線切斷還沒送達的 ACK。
                await new Promise(r => setTimeout(r, 300));
                if (window.bleClient.connected) {
                    window.bleClient.disconnect();
                    // disconnect() 會觸發 onDisconnect callback，蓋成「❌ 已斷線」的紅字訊息；
                    // 稍等一下讓那則訊息先跑完，再蓋回這裡真正想呈現的說明文字。
                    await new Promise(r => setTimeout(r, 150));
                }
                logStatus('✅ 設定已送出，BLE 已斷開讓裝置專心連 Wi-Fi。請等待約 15-20 秒後，再按「連線 BLE」重新連線查看是否已連上並取得 IP（瀏覽器需要你手動點擊才能觸發配對選擇視窗，無法自動重連）。', 'success');

                // 清空欄位：SSID 下次連線時 readStatus() 會從裝置狀態自動帶回來；
                // 密碼基於安全考量，韌體從不透過 status 回傳，所以密碼欄位清空後
                // 需要使用者自己重新輸入（不是忘記存，是設計上就不回傳明文密碼）。
                ssidInput.value = '';
                passwordInput.value = '';

            } catch (err) {
                logStatus(`❌ 傳送失敗: ${err.message}`, 'error');
                console.error('BLE Write Error:', err);
            } finally {
                btnSend.disabled = false;
            }
        }

        // --- Initialization ---

        btnConnect.addEventListener('click', connectBLE);
        btnSend.addEventListener('click', sendConfig);

        // 檢查瀏覽器是否支援 Web Bluetooth
        if (!navigator.bluetooth) {
            logStatus('❌ 瀏覽器不支援 Web Bluetooth。', 'error');
            btnConnect.disabled = true;
            btnConnect.querySelector('span').textContent = "不支援";
        }
    </script>
</body>

</html>
