<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <title>馬達 Ramping 調校 - BLE 傳輸</title>
    <script>
        (function() {
            const w = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
                w.apply(console, args);
            };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 確保全螢幕高度和柔軟的背景色 */
        body {
            background-color: #1f2937;
            color: #f9fafb;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .container-wrap {
            max-width: 500px;
            /* 稍微放大容器以容納更多欄位 */
            width: 100%;
            padding: 30px;
            background-color: #1f2937;
            border-radius: 1.5rem;
        }

        /* 頂部控制列 */
        .top-control {
            width: 100%;
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 20px;
        }

        /* 按鈕樣式 (Connect / Send) */
        button {
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: #4f46e5;
            /* 靛藍色 */
            color: white;
            font-weight: 700;
            /* Neumorphic 外凸效果 */
            box-shadow: 3px 3px 6px #171d26, -3px -3px 6px #273142;
            transition: all 0.15s ease-in-out;
        }

        button:hover {
            background: #3730a3;
            box-shadow: 5px 5px 10px #171d26, -5px -5px 10px #273142;
        }

        button:disabled {
            background: #374151;
            color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 狀態顯示區域 - 內凹樣式 */
        #statusLog {
            flex: 1;
            text-align: center;
            font-weight: 600;
            font-size: 0.875rem;
            color: #9ca3af;
            padding: 12px;
            background: #2d3748;
            border-radius: 12px;
            /* Neumorphic 內凹效果 */
            box-shadow: inset 3px 3px 6px #171d26, inset -3px -3px 6px #3b4555;
        }

        .log-success {
            color: #4ade80 !important;
        }

        .log-error {
            color: #f87171 !important;
        }

        .log-info {
            color: #60a5fa !important;
        }

        /* 輸入框樣式 */
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            border-radius: 10px;
            border: none;
            background: #2d3748;
            color: #f9fafb;
            font-weight: 500;
            /* 深色內凹效果 */
            box-shadow: inset 3px 3px 6px #171d26, inset -3px -3px 6px #3b4555;
            transition: box-shadow 0.15s;
        }

        input[type="number"]:focus {
            outline: none;
            background: #232d3a;
            /* 輕微的亮光效果 */
            box-shadow: inset 2px 2px 4px #171d26, inset -2px -2px 4px #3b4555, 0 0 5px #4f46e5;
        }

        /* 返回主選單按鈕 */
        .menu-button {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #4f46e5;
            color: white;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            box-shadow: 3px 3px 6px #171d26, -3px -3px 6px #273142;
            transition: all 0.2s ease;
        }
    </style>
</head>

<body class="p-4">
    <div class="container-wrap">

        <h1 class="text-2xl font-extrabold text-center text-indigo-400 mb-6 border-b border-gray-700 pb-2">
            馬達 Ramping 調校
        </h1>

        <!-- 頂部控制列：連線按鈕與狀態 -->
        <div class="top-control">
            <button id="btnConnect" class="flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <span>連線 BLE</span>
            </button>

            <div id="statusLog">
                等待連線...
            </div>
        </div>

        <!-- 設定參數表單 -->
        <div class="space-y-6">
            <!-- Acceleration Zone -->
            <div class="bg-gray-800 p-6 rounded-2xl shadow-xl border border-indigo-500/20 space-y-4">
                <div class="flex items-center space-x-2 border-b border-gray-700 pb-2 mb-2">
                    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    <h3 class="text-lg font-bold text-indigo-300">加速設定 (Throttle)</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label for="controlTimeoutT"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">加速超時 (Timeout)
                            ms</label>
                        <input type="number" id="controlTimeoutT" value="" min="0" required placeholder="例如: 500">
                    </div>
                    <div class="space-y-1">
                        <label for="pwmStartKickT"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">啟動推力 (Kick PWM)</label>
                        <input type="number" id="pwmStartKickT" value="" min="0" required placeholder="例如: 50">
                    </div>
                    <div class="space-y-1">
                        <label for="rampAccelStepT"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">漸進步長 (Ramp Speed)</label>
                        <input type="number" id="rampAccelStepT" value="" min="0" required placeholder="例如: 10">
                    </div>
                    <div class="space-y-1">
                        <label for="pwmEffectiveLimitT"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">輸出上限 (PWM Limit)</label>
                        <input type="number" id="pwmEffectiveLimitT" value="" min="0" required placeholder="例如: 255">
                    </div>
                </div>
            </div>

            <!-- Steering / Trim Zone -->
            <div class="bg-gray-800 p-6 rounded-2xl shadow-xl border border-emerald-500/20 space-y-4">
                <div class="flex items-center space-x-2 border-b border-gray-700 pb-2 mb-2">
                    <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                    </svg>
                    <h3 class="text-lg font-bold text-emerald-300">轉向 &amp; 微調 (Steering)</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label for="controlTimeoutS"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">轉向超時 (Timeout)
                            ms</label>
                        <input type="number" id="controlTimeoutS" value="" min="0" required placeholder="例如: 2000">
                    </div>
                    <div class="space-y-1">
                        <label for="deadband"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">死區 (Deadband) PWM</label>
                        <input type="number" id="deadband" value="" min="0" required placeholder="例如: 10">
                    </div>
                    <div class="space-y-1">
                        <label for="driveTrim"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">驅動微調 (Drive Trim)</label>
                        <input type="number" id="driveTrim" value="" required placeholder="例如: 0">
                    </div>
                    <div class="space-y-1">
                        <label for="steeringTrim"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">轉向微調 (Steering Trim)</label>
                        <input type="number" id="steeringTrim" value="" required placeholder="例如: 0">
                    </div>
                </div>
            </div>

            <!-- Invert Zone -->
            <div class="bg-gray-800 p-4 rounded-2xl shadow-xl border border-yellow-500/20 space-y-3">
                <h3 class="text-sm font-bold text-yellow-300 border-b border-gray-700 pb-2">反向設定 (Invert)</h3>
                <div class="flex items-center gap-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="driveInverted" class="w-4 h-4 accent-indigo-500">
                        <span class="text-sm text-gray-300">驅動反向 (Drive Inverted)</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="steeringInverted" class="w-4 h-4 accent-emerald-500">
                        <span class="text-sm text-gray-300">轉向反向 (Steering Inverted)</span>
                    </label>
                </div>
            </div>

            <div class="space-y-3">
                <button id="btnSend"
                    class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold transition duration-150 hover:bg-indigo-700 disabled:opacity-50 shadow-lg"
                    disabled>
                    讀取/傳送 馬達設定
                </button>

                <p class="text-center text-xs text-gray-500">
                    連線後自動從裝置讀取，修改後點擊上方按鈕儲存
                </p>
            </div>
        </div>

        <!-- 返回主選單按鈕 -->
        <a href="../index.html"
            class="menu-button w-full mt-8 text-center bg-gray-700 hover:bg-gray-600 text-gray-300 p-3 block rounded-xl shadow-md transition">
            返回主選單
        </a>
    </div>

    <!-- 引入 Quantifier 和 BLE Client 模組 -->
    <script src="../js/quantifier.d6e180f13fbd.js"></script>
    <script src="../js/ble-client.b00233280cf9.js"></script>

    <script>
        // --- BLE Configuration (對齊韌體 protocomm_ble 端點) ---
        // 與 wifi-config.html 使用同一個 protocomm BLE service
        const MOTOR_SERVICE_UUID    = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        // protocomm_nimble 將 0xff54 寫入 service_uuid bytes[12:13] → 6e40ff54
        const MOTOR_CHARACTERISTIC_UUID = '6e40ff54-b5a3-f393-e0a9-e50e24dcca9e';
        const DEVICE_ID_KEY = 'ble_motor_config_device_id';

        // --- DOM Elements ---
        const statusLog = document.getElementById('statusLog');
        const btnConnect = document.getElementById('btnConnect');
        const btnSend = document.getElementById('btnSend');

        // 欄位定義 (對應韌體 motor_config_t 欄位名稱)
        const PARAM_IDS = [
            { id: 'controlTimeoutT',   key: 'throttle_timeout_ms' },
            { id: 'controlTimeoutS',   key: 'steering_timeout_ms' },
            { id: 'pwmEffectiveLimitT', key: 'pwm_limit'          },
            { id: 'rampAccelStepT',    key: 'ramp_speed'          },
            { id: 'pwmStartKickT',     key: 'kick_pwm'            },
            { id: 'deadband',          key: 'deadband'            },
            { id: 'driveTrim',         key: 'drive_trim'          },
            { id: 'steeringTrim',      key: 'steering_trim'       },
        ];
        const BOOL_PARAM_IDS = [
            { id: 'driveInverted',    key: 'drive_inverted'    },
            { id: 'steeringInverted', key: 'steering_inverted' },
        ];

        // --- Helper Functions ---

        function logStatus(message, type = 'info') {
            let typeClass = type === 'success' ? 'log-success' : (type === 'error' ? 'log-error' : 'log-info');
            statusLog.classList.remove('log-success', 'log-error', 'log-info');
            statusLog.classList.add(typeClass);
            statusLog.innerHTML = message;
        }

        function updateUI(isConnected) {
            if (isConnected) {
                btnConnect.querySelector('span').textContent = '斷開';
                btnSend.disabled = false;
                btnSend.textContent = '傳送設定至裝置';
            } else {
                btnConnect.querySelector('span').textContent = '連線 BLE';
                btnSend.disabled = true;
                btnSend.textContent = '讀取/傳送 馬達 Ramping 調校';
            }
        }

        function clearInputFields() {
            PARAM_IDS.forEach(param => {
                const element = document.getElementById(param.id);
                if (element) element.value = "";
            });
        }

        // --- Logic ---

        function onDisconnect() {
            logStatus('❌ 已斷線', 'error');
            updateUI(false);
            clearInputFields();
        }

        async function readConfig() {
            try {
                logStatus('正在從裝置讀取設定值...', 'info');
                btnSend.disabled = true;

                // protocomm 協定：先 WRITE 空請求觸發 handler，再 READ 取得 JSON 回應
                await window.bleClient.writeTo(MOTOR_CHARACTERISTIC_UUID, new Uint8Array([0]));
                await new Promise(r => setTimeout(r, 100));

                const buffer = await window.bleClient.readFrom(MOTOR_CHARACTERISTIC_UUID);
                const text = new TextDecoder().decode(buffer).replace(/\0+$/g, '').trim();
                const config = text ? JSON.parse(text) : {};

                // 填入整數欄位
                PARAM_IDS.forEach(param => {
                    const el = document.getElementById(param.id);
                    if (el && config[param.key] !== undefined) el.value = config[param.key];
                });
                // 填入布林欄位 (checkbox)
                BOOL_PARAM_IDS.forEach(param => {
                    const el = document.getElementById(param.id);
                    if (el) el.checked = !!config[param.key];
                });

                logStatus('✅ 設定值讀取成功!', 'success');
            } catch (err) {
                logStatus(`❌ 讀取設定失敗: ${err.message}`, 'error');
                console.error('BLE Read Error:', err);
            } finally {
                btnSend.disabled = false;
            }
        }

        async function connectBLE() {
            if (!navigator.bluetooth) return;

            // 如果已連線，則斷開
            if (window.bleClient.connected) {
                window.bleClient.disconnect();
                return; // onDisconnect callback 會處理 UI
            }

            try {
                logStatus('準備連線...', 'info');

                // 註冊斷線回調 (只註冊一次)
                if (window.bleClient.onDisconnectCallbacks.indexOf(onDisconnect) === -1) {
                    window.bleClient.onDisconnectCallbacks.push(onDisconnect);
                }

                const device = await window.bleClient.connect(MOTOR_SERVICE_UUID, MOTOR_CHARACTERISTIC_UUID);

                logStatus('✅ 已連線: ' + device.name, 'success');
                updateUI(true);

                // 連線成功後讀取
                await readConfig();

            } catch (err) {
                console.error('BLE 連線失敗:', err);
                logStatus(`❌ 連線失敗 (${err.message})`, 'error');
                updateUI(false);
                clearInputFields();
            }
        }

        async function sendConfig() {
            if (!window.bleClient.connected) {
                logStatus('⚠️ 請先連線到 BLE 裝置。', 'info');
                return;
            }

            try {
                // 從欄位收集數值並組成 JSON
                const payload = {};
                PARAM_IDS.forEach(param => {
                    const el = document.getElementById(param.id);
                    const value = parseInt(el?.value);
                    if (isNaN(value)) throw new Error(`欄位 ${param.id} 包含無效數值。`);
                    payload[param.key] = value;
                });
                BOOL_PARAM_IDS.forEach(param => {
                    const el = document.getElementById(param.id);
                    payload[param.key] = el ? el.checked : false;
                });

                const jsonStr = JSON.stringify(payload);
                logStatus('傳送馬達設定 JSON...', 'info');
                btnSend.disabled = true;

                // protocomm 協定：WRITE JSON payload 觸發 motor_config_handler (同時儲存並套用設定)
                await window.bleClient.writeTo(MOTOR_CHARACTERISTIC_UUID, new TextEncoder().encode(jsonStr));
                // 短暫等待 handler 處理完成後讀回確認值
                await new Promise(r => setTimeout(r, 150));
                const buffer = await window.bleClient.readFrom(MOTOR_CHARACTERISTIC_UUID);
                const confirmed = new TextDecoder().decode(buffer).replace(/\0+$/g, '').trim();
                console.log('[motor-config] confirmed:', confirmed);

                logStatus('✅ 設定已成功傳送並儲存!', 'success');

            } catch (err) {
                logStatus(`❌ 傳送失敗: ${err.message}`, 'error');
            } finally {
                btnSend.disabled = false;
            }
        }

        // --- Initialization ---

        btnConnect.addEventListener('click', connectBLE);
        btnSend.addEventListener('click', sendConfig);

        if (!navigator.bluetooth) {
            logStatus('❌ 瀏覽器不支援 Web Bluetooth。', 'error');
            btnConnect.disabled = true;
            btnConnect.querySelector('span').textContent = "不支援";
        } else {
            clearInputFields();
        }
    </script>
</body>

</html>
