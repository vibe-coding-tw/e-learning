<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <title>馬達 Ramping 調校 - BLE 傳輸</title>
    <script>
        (function() {
            const w = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
                w.apply(console, args);
            };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 確保全螢幕高度和柔軟的背景色 */
        body {
            background-color: #1f2937;
            color: #f9fafb;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .container-wrap {
            max-width: 500px;
            /* 稍微放大容器以容納更多欄位 */
            width: 100%;
            padding: 30px;
            background-color: #1f2937;
            border-radius: 1.5rem;
        }

        /* 頂部控制列 */
        .top-control {
            width: 100%;
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 20px;
        }

        /* 按鈕樣式 (Connect / Send) */
        button {
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: #4f46e5;
            /* 靛藍色 */
            color: white;
            font-weight: 700;
            /* Neumorphic 外凸效果 */
            box-shadow: 3px 3px 6px #171d26, -3px -3px 6px #273142;
            transition: all 0.15s ease-in-out;
        }

        button:hover {
            background: #3730a3;
            box-shadow: 5px 5px 10px #171d26, -5px -5px 10px #273142;
        }

        button:disabled {
            background: #374151;
            color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 狀態顯示區域 - 內凹樣式 */
        #statusLog {
            flex: 1;
            text-align: center;
            font-weight: 600;
            font-size: 0.875rem;
            color: #9ca3af;
            padding: 12px;
            background: #2d3748;
            border-radius: 12px;
            /* Neumorphic 內凹效果 */
            box-shadow: inset 3px 3px 6px #171d26, inset -3px -3px 6px #3b4555;
        }

        .log-success {
            color: #4ade80 !important;
        }

        .log-error {
            color: #f87171 !important;
        }

        .log-info {
            color: #60a5fa !important;
        }

        /* 輸入框樣式 */
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-top: 4px;
            border-radius: 10px;
            border: none;
            background: #2d3748;
            color: #f9fafb;
            font-weight: 500;
            /* 深色內凹效果 */
            box-shadow: inset 3px 3px 6px #171d26, inset -3px -3px 6px #3b4555;
            transition: box-shadow 0.15s;
        }

        input[type="number"]:focus {
            outline: none;
            background: #232d3a;
            /* 輕微的亮光效果 */
            box-shadow: inset 2px 2px 4px #171d26, inset -2px -2px 4px #3b4555, 0 0 5px #4f46e5;
        }

        /* D-Pad 即時控制按鈕 */
        .dpad-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2d3748;
            border-radius: 14px;
            font-size: 1.5rem;
            color: #9ca3af;
            box-shadow: 3px 3px 6px #171d26, -3px -3px 6px #273142;
            cursor: pointer;
            user-select: none;
            touch-action: none;
            transition: all 0.1s ease;
        }

        .dpad-btn:active,
        .dpad-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #fff;
            box-shadow: inset 2px 2px 4px #171d26, inset -2px -2px 4px #3b4555;
        }

        /* 返回主選單按鈕 */
        .menu-button {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #4f46e5;
            color: white;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            box-shadow: 3px 3px 6px #171d26, -3px -3px 6px #273142;
            transition: all 0.2s ease;
        }
    </style>
</head>

    <script src="../js/ble-client.b00233280cf9.js"></script>

    <script>
        // --- BLE Configuration (對齊韌體 protocomm_ble 端點) ---
        // 與 wifi-config.html 使用同一個 protocomm BLE service
        const MOTOR_SERVICE_UUID    = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        // protocomm_nimble 將 0xff54 寫入 service_uuid bytes[12:13] → 6e40ff54-b5a3-f393-e0a9-e50e24dcca9e
        const MOTOR_CHARACTERISTIC_UUID = '6e40ff54-b5a3-f393-e0a9-e50e24dcca9e';
        // 0xff55 → motor-control 端點（跟 d-pad.html 共用同一個 BLE service，同一次連線即可）
        const MOTOR_CONTROL_CHARACTERISTIC_UUID = '6e40ff55-b5a3-f393-e0a9-e50e24dcca9e';
        const DPAD_SEND_INTERVAL = 200;
        const DEVICE_ID_KEY = 'ble_motor_config_device_id';

        // --- DOM Elements ---
        const statusLog = document.getElementById('statusLog');
        const btnConnect = document.getElementById('btnConnect');
        const btnSend = document.getElementById('btnSend');

        // 欄位定義 (對應韌體 motor_config_t 欄位名稱)
        const PARAM_IDS = [
            { id: 'controlTimeoutT',   key: 'throttle_timeout_ms' },
            { id: 'controlTimeoutS',   key: 'steering_timeout_ms' },
            { id: 'pwmEffectiveLimitT', key: 'pwm_limit'          },
            { id: 'rampAccelStepT',    key: 'ramp_speed'          },
            { id: 'pwmStartKickT',     key: 'kick_pwm'            },
            { id: 'pwmEffectiveLimitS', key: 'steering_pwm_limit' },
            { id: 'rampAccelStepS',    key: 'steering_ramp_speed' },
            { id: 'pwmStartKickS',     key: 'steering_kick_pwm'   },
            { id: 'deadband',          key: 'deadband'            },
            { id: 'driveTrim',         key: 'drive_trim'          },
            { id: 'steeringTrim',      key: 'steering_trim'       },
        ];
        const BOOL_PARAM_IDS = [
            { id: 'driveInverted',    key: 'drive_inverted'    },
            { id: 'steeringInverted', key: 'steering_inverted' },
        ];

        // --- Helper Functions ---

        function logStatus(message, type = 'info') {
            let typeClass = type === 'success' ? 'log-success' : (type === 'error' ? 'log-error' : 'log-info');
            statusLog.classList.remove('log-success', 'log-error', 'log-info');
            statusLog.classList.add(typeClass);
            statusLog.innerHTML = message;
        }

        function updateUI(isConnected) {
            if (isConnected) {
                btnConnect.querySelector('span').textContent = '斷開';
                btnSend.disabled = false;
                btnSend.textContent = '傳送設定至裝置';
            } else {
                btnConnect.querySelector('span').textContent = '連線 BLE';
                btnSend.disabled = true;
                btnSend.textContent = '讀取/傳送 馬達 Ramping 調校';
            }
            updateDpadEnabled(isConnected);
        }

        function clearInputFields() {
            PARAM_IDS.forEach(param => {
                const element = document.getElementById(param.id);
                if (element) element.value = "";
            });
        }

        // --- Logic ---

        function onDisconnect() {
            logStatus('❌ 已斷線', 'error');
            updateUI(false);
            clearInputFields();
        }

        async function readConfig() {
            try {
                logStatus('正在從裝置讀取設定值...', 'info');
                btnSend.disabled = true;

                // protocomm 協定：先 WRITE 空請求觸發 handler，再 READ 取得 JSON 回應
                await window.bleClient.writeTo(MOTOR_CHARACTERISTIC_UUID, new Uint8Array([0]));
                await new Promise(r => setTimeout(r, 100));

                const buffer = await window.bleClient.readFrom(MOTOR_CHARACTERISTIC_UUID);
                const text = new TextDecoder().decode(buffer).replace(/\0+$/g, '').trim();
                const config = text ? JSON.parse(text) : {};

                // 填入整數欄位
                PARAM_IDS.forEach(param => {
                    const el = document.getElementById(param.id);
                    if (el && config[param.key] !== undefined) el.value = config[param.key];
                });
                // 填入布林欄位 (checkbox)
                BOOL_PARAM_IDS.forEach(param => {
                    const el = document.getElementById(param.id);
                    if (el) el.checked = !!config[param.key];
                });

                logStatus('✅ 設定值讀取成功!', 'success');
            } catch (err) {
                logStatus(`❌ 讀取設定失敗: ${err.message}`, 'error');
                console.error('BLE Read Error:', err);
            } finally {
                btnSend.disabled = false;
            }
        }

        async function connectBLE() {
            if (!navigator.bluetooth) return;

            // 如果已連線，則斷開
            if (window.bleClient.connected) {
                window.bleClient.disconnect();
                return; // onDisconnect callback 會處理 UI
            }

            try {
                logStatus('準備連線...', 'info');

                // 註冊斷線回調 (只註冊一次)
                if (window.bleClient.onDisconnectCallbacks.indexOf(onDisconnect) === -1) {
                    window.bleClient.onDisconnectCallbacks.push(onDisconnect);
                }

                const device = await window.bleClient.connect(MOTOR_SERVICE_UUID, MOTOR_CHARACTERISTIC_UUID);

                logStatus('✅ 已連線: ' + device.name, 'success');
                updateUI(true);

                // 連線成功後讀取
                await readConfig();

            } catch (err) {
                console.error('BLE 連線失敗:', err);
                logStatus(`❌ 連線失敗 (${err.message})`, 'error');
                updateUI(false);
                clearInputFields();
            }
        }

        async function sendConfig() {
            if (!window.bleClient.connected) {
                logStatus('⚠️ 請先連線到 BLE 裝置。', 'info');
                return;
            }

            try {
                // 從欄位收集數值並組成 JSON
                const payload = {};
                PARAM_IDS.forEach(param => {
                    const el = document.getElementById(param.id);
                    const value = parseInt(el?.value);
                    if (isNaN(value)) throw new Error(`欄位 ${param.id} 包含無效數值。`);
                    payload[param.key] = value;
                });
                BOOL_PARAM_IDS.forEach(param => {
                    const el = document.getElementById(param.id);
                    payload[param.key] = el ? el.checked : false;
                });

                const jsonStr = JSON.stringify(payload);
                logStatus('傳送馬達設定 JSON...', 'info');
                btnSend.disabled = true;

                // protocomm 協定：WRITE JSON payload 觸發 motor_config_handler (同時儲存並套用設定)
                await window.bleClient.writeTo(MOTOR_CHARACTERISTIC_UUID, new TextEncoder().encode(jsonStr));
                // 短暫等待 handler 處理完成後讀回確認值
                await new Promise(r => setTimeout(r, 150));
                const buffer = await window.bleClient.readFrom(MOTOR_CHARACTERISTIC_UUID);
                const confirmed = new TextDecoder().decode(buffer).replace(/\0+$/g, '').trim();
                console.log('[motor-config] confirmed:', confirmed);

                logStatus('✅ 設定已成功傳送並儲存!', 'success');

            } catch (err) {
                logStatus(`❌ 傳送失敗: ${err.message}`, 'error');
            } finally {
                btnSend.disabled = false;
            }
        }

        // --- D-Pad 即時控制 (與 motor-config 共用同一個 BLE 連線/service，寫到 motor-control 特徵值) ---

        const dpadContainer = document.getElementById('dpad-container');
        const dpadValT = document.getElementById('dpadValT');
        const dpadValS = document.getElementById('dpadValS');
        const dpadButtons = document.querySelectorAll('.dpad-btn');

        let dpadThrottle = 0;
        let dpadSteering = 0;
        let dpadSendTimer = null;
        let dpadIsWriting = false;
        let dpadPendingSend = false;
        let dpadLastThrottle = 0;
        let dpadLastSteering = 0;
        let dpadLastSendTime = 0;

        const DPAD_MAP = {
            btnUp:    { t: 1000,  s: 0 },
            btnDown:  { t: -1000, s: 0 },
            btnLeft:  { t: 0,     s: -1000 },
            btnRight: { t: 0,     s: 1000 },
        };

        async function sendDpadData() {
            if (!window.bleClient.connected) return;

            // 若正在寫入，標記待補發並返回，防止 GATT 衝突（跟 d-pad.html 同一套邏輯）
            if (dpadIsWriting) {
                dpadPendingSend = true;
                return;
            }

            const now = Date.now();
            const timeSinceLastSend = now - dpadLastSendTime;
            const valuesChanged = (dpadThrottle !== dpadLastThrottle || dpadSteering !== dpadLastSteering);

            if (!valuesChanged && timeSinceLastSend < DPAD_SEND_INTERVAL && !dpadPendingSend) {
                return;
            }

            dpadIsWriting = true;
            dpadPendingSend = false;

            const payload = `${dpadThrottle},${dpadSteering}`;
            const encodedPayload = new TextEncoder().encode(payload);
            const MAX_RETRIES = 3;

            for (let i = 0; i < MAX_RETRIES; i++) {
                try {
                    await window.bleClient.writeTo(MOTOR_CONTROL_CHARACTERISTIC_UUID, encodedPayload);

                    dpadLastThrottle = dpadThrottle;
                    dpadLastSteering = dpadSteering;
                    dpadLastSendTime = Date.now();

                    dpadValT.textContent = dpadThrottle;
                    dpadValS.textContent = dpadSteering;
                    break;
                } catch (err) {
                    console.warn(`D-Pad write failed (retry ${i + 1}/${MAX_RETRIES}):`, err);

                    if (!window.bleClient.connected) {
                        break;
                    }
                    if (i < MAX_RETRIES - 1) {
                        await new Promise(resolve => setTimeout(resolve, (i + 1) * 50));
                    }
                }
            }

            dpadIsWriting = false;
            if (dpadPendingSend) {
                setTimeout(sendDpadData, 10);
            }
        }

        function updateDpadEnabled(isConnected) {
            if (isConnected) {
                dpadContainer.classList.remove('opacity-40', 'pointer-events-none');
                if (!dpadSendTimer) {
                    dpadSendTimer = setInterval(sendDpadData, DPAD_SEND_INTERVAL);
                }
            } else {
                dpadContainer.classList.add('opacity-40', 'pointer-events-none');
                clearInterval(dpadSendTimer);
                dpadSendTimer = null;
                dpadThrottle = 0;
                dpadSteering = 0;
                dpadValT.textContent = '0';
                dpadValS.textContent = '0';
            }
        }

        dpadButtons.forEach(btn => {
            const cfg = DPAD_MAP[btn.id];
            if (!cfg) return;

            const startHandler = (e) => {
                e.preventDefault();
                if (!window.bleClient.connected) return;
                dpadThrottle = cfg.t;
                dpadSteering = cfg.s;
                btn.classList.add('active');
                sendDpadData();
            };

            const endHandler = (e) => {
                e.preventDefault();
                dpadThrottle = 0;
                dpadSteering = 0;
                btn.classList.remove('active');
                sendDpadData();
            };

            btn.addEventListener('pointerdown', startHandler);
            btn.addEventListener('pointerup', endHandler);
            btn.addEventListener('pointercancel', endHandler);
            btn.addEventListener('pointerleave', endHandler);
        });

        // 保險機制：觸控裝置上手指滑出按鈕範圍時，pointerup/pointercancel 有時不會
        // 正確送達按鈕本身，導致 dpadThrottle/dpadSteering 卡在非零值、心跳持續送出
        // 「還在按」的指令，鬆手後馬達不會停。用 document 層級事件 + 視窗失焦/切分頁
        // 都強制送出停止指令，確保鬆手一定停。
        function dpadForceStopAll() {
            if (dpadThrottle === 0 && dpadSteering === 0) return;
            dpadThrottle = 0;
            dpadSteering = 0;
            dpadButtons.forEach(b => b.classList.remove('active'));
            sendDpadData();
        }
        document.addEventListener('pointerup', dpadForceStopAll);
        document.addEventListener('pointercancel', dpadForceStopAll);
        window.addEventListener('blur', dpadForceStopAll);
        document.addEventListener('visibilitychange', () => { if (document.hidden) dpadForceStopAll(); });

        // --- Initialization ---

        btnConnect.addEventListener('click', connectBLE);
        btnSend.addEventListener('click', sendConfig);

        if (!navigator.bluetooth) {
            logStatus('❌ 瀏覽器不支援 Web Bluetooth。', 'error');
            btnConnect.disabled = true;
            btnConnect.querySelector('span').textContent = "不支援";
        } else {
            clearInputFields();
        }
    </script>
</body>
