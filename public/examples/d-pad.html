<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>D-Pad 控制中心 | Vibe Coding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a1f2e 0%, #0d121c 100%);
            color: #e5e7eb;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 1.5rem;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container-wrap { 
            max-width: 420px; 
            width: 100%; 
            padding: 2rem; 
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-badge {
            flex: 1;
            background: rgba(17, 24, 39, 0.6);
            padding: 0.75rem;
            border-radius: 1rem;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #9ca3af;
            transition: all 0.3s ease;
        }
        .connected { 
            color: #10b981 !important; 
            background: rgba(16, 185, 129, 0.1) !important;
            border-color: rgba(16, 185, 129, 0.2) !important;
        }

        .d-pad-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 2.5rem auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
        }

        .control-btn {
            background: #2d3748;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #9ca3af;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 0 #1a202c, 0 15px 20px rgba(0,0,0,0.3);
            position: relative;
            top: 0;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-btn:active, .control-btn.active {
            top: 6px;
            box-shadow: 0 2px 0 #1a202c, 0 5px 10px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
        
        .center-dot {
            grid-column: 2;
            grid-row: 2;
            background: rgba(17, 24, 39, 0.8);
            border-radius: 50%;
            margin: 20px;
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        .telemetry-card {
            background: rgba(17, 24, 39, 0.4);
            padding: 1.25rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tel-item { text-align: center; }
        .tel-label { font-size: 0.65rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.25rem; }
        .tel-value { font-size: 1.5rem; font-weight: 900; color: #6366f1; font-family: ui-monospace, SFMono-Regular, monospace; }
        
    </style>
</head>
<body>
    <div class="container-wrap">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black text-white tracking-tight">D-Pad <span class="text-indigo-500">Controller</span></h1>
            <a href="index.html" class="text-gray-500 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </a>
        </div>

        <div class="flex gap-3 mb-8">
            <button id="btnConnect" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg transition-all active:scale-95">
                連線
            </button>
            <div id="status" class="status-badge">等待執行...</div>
        </div>

        <div class="d-pad-container">
            <div id="btnUp" class="control-btn" data-t="255" data-s="0">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>
            </div>
            <div id="btnLeft" class="control-btn" data-t="0" data-s="-255">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            </div>
            <div class="center-dot"></div>
            <div id="btnRight" class="control-btn" data-t="0" data-s="255">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
            </div>
            <div id="btnDown" class="control-btn" data-t="-255" data-s="0">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
            </div>
        </div>

        <div class="telemetry-card">
            <div class="tel-item">
                <div class="tel-label">Throttle</div>
                <div id="valT" class="tel-value">0</div>
            </div>
            <div class="tel-item border-l border-gray-800 pl-8">
                <div class="tel-label">Steering</div>
                <div id="valS" class="tel-value">0</div>
            </div>
        </div>

        <div class="mt-10 pt-10 border-t border-gray-800 hidden md:flex flex-col items-center">
            <p class="text-xs text-gray-500 mb-4">Scan to open on mobile</p>
            <div class="bg-white p-2 rounded-2xl shadow-xl">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://vibe-coding.tw/examples/d-pad.html" 
                     alt="QR Code" class="w-[120px] h-[120px]">
            </div>
            <p class="text-[10px] text-gray-600 mt-3 font-mono">https://vibe-coding.tw/examples/d-pad.html</p>
        </div>
    </div>

    <script>
        const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c0ffee00dead';
        const CHARACTERISTIC_UUID = '4fafc202-1fb5-459e-8fcc-c0ffee01feed';
        const SEND_INTERVAL = 60;

        let device = null;
        let characteristic = null;
        let isConnected = false;
        let currentThrottle = 0;
        let currentSteering = 0;
        let sendTimer = null;

        const btnConnect = document.getElementById('btnConnect');
        const statusEl = document.getElementById('status');
        const valTEl = document.getElementById('valT');
        const valSEl = document.getElementById('valS');
        const dpadButtons = document.querySelectorAll('.control-btn');

        function updateStatus(text, ok = false) {
            statusEl.textContent = text;
            statusEl.className = 'status-badge' + (ok ? ' connected' : '');
            btnConnect.textContent = isConnected ? '中斷' : '連線';
        }

        async function connect() {
            if (isConnected) {
                device.gatt.disconnect();
                return;
            }

            try {
                updateStatus('正在掃描...');
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'esp32' }],
                    optionalServices: [SERVICE_UUID]
                });

                device.addEventListener('gattserverdisconnected', () => {
                    isConnected = false;
                    characteristic = null;
                    clearInterval(sendTimer);
                    updateStatus('已斷線');
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                isConnected = true;
                updateStatus('已連線', true);
                sendTimer = setInterval(sendData, SEND_INTERVAL);

            } catch (err) {
                updateStatus('失敗: ' + err.message.substring(0, 10));
            }
        }

        async function sendData() {
            if (!characteristic || !isConnected) return;
            const payload = `${currentThrottle},${currentSteering}`;
            try {
                await characteristic.writeValue(new TextEncoder().encode(payload));
                valTEl.textContent = currentThrottle;
                valSEl.textContent = currentSteering;
            } catch (e) {}
        }

        btnConnect.addEventListener('click', connect);

        dpadButtons.forEach(btn => {
            const startHandler = (e) => {
                e.preventDefault();
                if (!isConnected) return;
                currentThrottle = parseInt(btn.dataset.t);
                currentSteering = parseInt(btn.dataset.s);
                btn.classList.add('active');
            };

            const endHandler = (e) => {
                e.preventDefault();
                currentThrottle = 0;
                currentSteering = 0;
                btn.classList.remove('active');
            };

            btn.addEventListener('pointerdown', startHandler);
            btn.addEventListener('pointerup', endHandler);
            btn.addEventListener('pointercancel', endHandler);
            btn.addEventListener('pointerleave', endHandler);
        });
    </script>
</body>
</html>
