    <script type="module">
        // 1. 匯入必要的 Firebase 函式
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";

        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
        import { firebaseConfig, connectFirebaseEmulators } from "./js/firebase-local.js?v=3";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app, 'asia-east1');
        connectFirebaseEmulators({ auth, db, functions });

        // 修改為通用的付款請求 Function (後端需配合修改)
        const initiatePayment = httpsCallable(functions, 'initiatePayment');
        const resolveDistributorCheckoutQuote = httpsCallable(functions, 'resolveDistributorCheckoutQuote');
        const getDistributorRoutingOptions = httpsCallable(functions, 'getDistributorRoutingOptions');
        const updateUserRoutingPreference = httpsCallable(functions, 'updateUserRoutingPreference');
        const getLessonsMetadata = httpsCallable(functions, 'getLessonsMetadata');
        let lessonsCache = null;

        function escapeHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // 您的商店代號 (公開資訊可放在前端)
        const MERCHANT_ID = "3271550";
        // 注意：HashKey 和 HashIV 請務必設定在 Firebase Cloud Functions 的環境變數中，不要寫在這裡！

        // ===============================================
        // A. 購物車項目渲染邏輯
        // ===============================================

        const unpaidItemsContainer = document.getElementById('unpaid-items');
        const emptyMsg = document.getElementById('empty-cart-msg');
        const cartTotalElement = document.getElementById('cart-total');
        const cartTotalNote = document.getElementById('cart-total-note');
        const checkoutBtn = document.getElementById('checkout-btn');
        const paymentFormContainer = document.getElementById('payment-form-container');
        const cartPrefillStatus = document.getElementById('cart-prefill-status');
        const routingPreferenceSection = document.getElementById('routing-preference-section');
        const preferredRegionSelect = document.getElementById('preferred-region-select');
        const preferredDistributorSelect = document.getElementById('preferred-distributor-select');
        const saveRoutingPreferenceBtn = document.getElementById('save-routing-preference-btn');
        const routingPreferenceStatus = document.getElementById('routing-preference-status');
        const routingRecommendationBadge = document.getElementById('routing-recommendation-badge');
        const routingSummaryRegion = document.getElementById('routing-summary-region');
        const routingSummaryDistributor = document.getElementById('routing-summary-distributor');
        const routingSummarySource = document.getElementById('routing-summary-source');
        const routingSummaryReason = document.getElementById('routing-summary-reason');
        const shippingCountrySelect = document.getElementById('shipping-country');
        const pricingApi = window.vibePricing || {
            resolveCartPrice(item = {}, locale = "zh-TW") {
                const currency = String(item.currency || item.price_currency || item.priceCurrency || "").toUpperCase();
                return { amount: Number(item.price || 0), currency };
            },
            formatPrice(priceEntry = {}, locale = "zh-TW") {
                const amount = Number(priceEntry?.amount ?? priceEntry ?? 0);
                const currency = String(priceEntry?.currency || "").toUpperCase();
                if (!amount) return String(locale || "").startsWith("en") ? "Free" : "免費";
                if (!currency) {
                    try {
                        return new Intl.NumberFormat(String(locale || "").startsWith("en") ? "en-US" : "zh-TW").format(amount);
                    } catch (_) {
                        return amount.toLocaleString();
                    }
                }
                if (currency === "TWD") {
                    return `TWD ${Math.round(amount).toLocaleString()}`;
                }
                return `${currency} ${amount.toLocaleString()}`;
            }
        };

        const isEn = String(window.currentLocale || '').startsWith('en');

        function localizeDistributorName(name) {
            if (!name) return '';
            const key = String(name).trim();
            const map = {
                '預設台幣經銷商': 'Default TWD Distributor',
                '預設美金經銷商': 'Default USD Distributor',
                'default-twd': 'Default TWD Distributor',
                'default-usd': 'Default USD Distributor'
            };
            if (isEn && map[key]) return map[key];
            return name;
        }

        function localizeRegionLabel(region) {
            if (!region) return '';
            const key = String(region).trim().toUpperCase();
            const map = {
                'TW': isEn ? 'TW / Taiwan' : 'TW / 台灣',
                'US': isEn ? 'US / United States' : 'US / 美國',
                'CA': isEn ? 'CA / Canada' : 'CA / 加拿大',
                'JP': isEn ? 'JP / Japan' : 'JP / 日本',
                'SG': isEn ? 'SG / Singapore' : 'SG / 新加坡',
                'HK': isEn ? 'HK / Hong Kong' : 'HK / 香港',
                'MY': isEn ? 'MY / Malaysia' : 'MY / 馬來西亞'
            };
            return map[key] || region;
        }

        function removeFromCart(productId) {
            let cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            delete cart[productId];
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            renderCartItems();
        }

        function normalizeId(id) {
            if (!id) return '';
            return id.trim().replace(/\.html$/, '');
        }

        function bootstrapRoutingDefaults() {
            const defaultRegion = getPreferredRegion() || 'US';
            const defaultDistributor = getPreferredDistributorId() || (defaultRegion === 'US' ? 'default-usd' : 'default-twd');
            if (preferredRegionSelect && !preferredRegionSelect.value) {
                preferredRegionSelect.value = defaultRegion;
            }
            if (preferredDistributorSelect && !preferredDistributorSelect.value) {
                preferredDistributorSelect.value = defaultDistributor;
            }
            setRoutingPreferenceLocal(defaultRegion, defaultDistributor, { source: getPreferredRegionSource() || 'auto' });
        }

        function normalizeRegionCode(value = '') {
            return String(value || '').trim().toUpperCase();
        }

        function getPreferredRegionSource() {
            return String(localStorage.getItem('vibe_user_region_source') || '').trim().toLowerCase();
        }

        function getLastSuccessfulRegion() {
            return normalizeRegionCode(
                localStorage.getItem('vibe_user_last_success_region')
                || localStorage.getItem('vibe_user_last_successful_region')
                || ''
            );
        }

        function inferRegionFromCountry(country = '') {
            const normalizedCountry = normalizeRegionCode(country);
            const countryToRegion = {
                TW: 'TW',
                US: 'US',
                CA: 'CA',
                JP: 'JP',
                SG: 'SG',
                HK: 'HK',
                MY: 'MY'
            };
            return countryToRegion[normalizedCountry] || '';
        }

        function getPreferredRegion() {
            const storedRegion = normalizeRegionCode(
                localStorage.getItem('vibe_user_region')
                || localStorage.getItem('preferredRegion')
                || localStorage.getItem('vibe_user_preferred_region')
                || ''
            );
            if (storedRegion) return storedRegion;

            const lastSuccessRegion = getLastSuccessfulRegion();
            if (lastSuccessRegion) return lastSuccessRegion;

            const shippingRegion = inferRegionFromCountry(shippingCountrySelect?.value || '');
            if (shippingRegion) return shippingRegion;

            const locale = String(localStorage.getItem('vibe_user_locale') || '').toLowerCase();
            if (locale.startsWith('en')) return 'US';
            return 'TW';
        }

        function getPreferredDistributorId() {
            return String(
                localStorage.getItem('vibe_user_preferred_distributor')
                || localStorage.getItem('preferredDistributorId')
                || ''
            ).trim();
        }

        function setRoutingPreferenceLocal(region = '', distributorId = '', options = {}) {
            const normalizedRegion = normalizeRegionCode(region);
            const normalizedDistributorId = String(distributorId || '').trim();
            if (normalizedRegion) {
                localStorage.setItem('vibe_user_region', normalizedRegion);
                localStorage.setItem('preferredRegion', normalizedRegion);
                localStorage.setItem('vibe_user_preferred_region', normalizedRegion);
                if (options.source) {
                    localStorage.setItem('vibe_user_region_source', String(options.source).trim().toLowerCase());
                }
            }
            if (normalizedDistributorId) {
                localStorage.setItem('vibe_user_preferred_distributor', normalizedDistributorId);
                localStorage.setItem('preferredDistributorId', normalizedDistributorId);
            } else {
                // Clear stale distributor preference when the user changes region.
                localStorage.removeItem('vibe_user_preferred_distributor');
                localStorage.removeItem('preferredDistributorId');
            }
        }

        function syncRegionFromShippingCountry(force = false) {
            const currentSource = getPreferredRegionSource();
            if (!force && currentSource === 'manual') return null;
            const suggestedRegion = inferRegionFromCountry(shippingCountrySelect?.value || '');
            if (!suggestedRegion) return null;
            const currentRegion = getPreferredRegion();
            if (!force && currentRegion === suggestedRegion) return null;
            setRoutingPreferenceLocal(suggestedRegion, getPreferredDistributorId(), { source: 'shippingcountry' });
            return suggestedRegion;
        }

        function setRoutingStatus(message = '', tone = 'info') {
            if (!routingPreferenceStatus) return;
            routingPreferenceStatus.textContent = message;
            routingPreferenceStatus.className = tone === 'success'
                ? 'text-sm text-emerald-700'
                : tone === 'error'
                    ? 'text-sm text-rose-700'
                    : 'text-sm text-slate-600';
        }

        function getRoutingSourceLabel(source = '') {
            const normalized = String(source || '').trim().toLowerCase();
            const labels = {
                manual: window.t('routing_source_manual', '手動選擇'),
                auto: window.t('routing_source_auto', '系統自動帶入'),
                checkout: window.t('routing_source_checkout', '結帳後記錄'),
                local: window.t('routing_source_local', '本機預設'),
                regiondefault: window.t('routing_source_region_default', '地區預設'),
                lastsuccess: window.t('routing_source_last_success', '上次成功付款'),
                explicit: window.t('routing_source_manual', '手動選擇'),
                guestlocal: window.t('routing_source_guest_local', '訪客預設'),
                shippingcountry: window.t('routing_source_shipping', '依收件地帶入')
            };
            return labels[normalized] || window.t('routing_source_unknown', '系統預設');
        }

        function getRoutingReasonLabel(reason = '') {
            const normalized = String(reason || '').trim().toLowerCase();
            const labels = {
                'region-default': window.t('routing_reason_region_default', '依地區預設'),
                'region-backup': window.t('routing_reason_region_backup', '依地區備援'),
                'single-region-match': window.t('routing_reason_single_match', '地區唯一經銷商'),
                'first-region-match': window.t('routing_reason_multiple_matches', '同地區多經銷商，請手動選擇'),
                'multiple-region-matches': window.t('routing_reason_multiple_matches', '同地區多經銷商，請手動選擇'),
                'first-active-distributor': window.t('routing_reason_region_default', '依地區預設'),
                'user-binding': window.t('routing_reason_user_binding', '依你的已儲存偏好'),

        function updateRoutingSummary(snapshot = {}) {
            const recommendation = snapshot.recommendation || {};
            const userPreference = snapshot.userPreference || {};
            const regionValue = String(userPreference.preferredRegion || snapshot.region || getPreferredRegion() || '').toUpperCase() || '—';
            const distributorValue = recommendation.distributorName || userPreference.preferredDistributorId || getPreferredDistributorId() || '—';
            const sourceValue = getRoutingSourceLabel(getPreferredRegionSource() || userPreference.bindingSource || recommendation.reason || '');
            const reasonValue = getRoutingReasonLabel(recommendation.reason || userPreference.bindingSource || '');

            if (routingSummaryRegion) routingSummaryRegion.textContent = regionValue;
            if (routingSummaryDistributor) routingSummaryDistributor.textContent = localizeDistributorName(distributorValue);
            if (routingSummarySource) routingSummarySource.textContent = sourceValue;
            if (routingSummaryReason) routingSummaryReason.textContent = reasonValue;
        }

        function buildFallbackRoutingDistributors(region = '') {
            const normalizedRegion = normalizeRegionCode(region);
            const fallbackDistributors = [
                { id: 'default-twd', name: '預設台幣經銷商', regions: ['TW'] },
                { id: 'default-usd', name: '預設美金經銷商', regions: ['US'] }
            ];
            if (!normalizedRegion) return fallbackDistributors;
            const regionalFallback = fallbackDistributors.filter((dist) => Array.isArray(dist.regions) && dist.regions.includes(normalizedRegion));
            return regionalFallback.length ? regionalFallback : fallbackDistributors;
        }

        function resolveFallbackDistributorIdForRegion(region = '') {
            const normalizedRegion = normalizeRegionCode(region);
            if (normalizedRegion === 'TW') return 'default-twd';
            if (normalizedRegion === 'US') return 'default-usd';
            return buildFallbackRoutingDistributors(normalizedRegion)[0]?.id || '';
        }

        function renderDistributorOptions(snapshot = {}) {
            if (!preferredRegionSelect || !preferredDistributorSelect) return;
            let regions = Array.isArray(snapshot.regions) ? snapshot.regions : [];
            let distributors = Array.isArray(snapshot.eligibleDistributors) ? snapshot.eligibleDistributors : [];
            const recommendation = snapshot.recommendation || {};
            const userPreference = snapshot.userPreference || {};
            const localRegion = getPreferredRegion();
            const localDistributorId = getPreferredDistributorId();
            const initialRegion = localRegion || userPreference.preferredRegion || snapshot.region || regions[0] || 'US';

            if (regions.length === 0) regions = ['TW', 'US'];
            if (distributors.length === 0) {
                distributors = buildFallbackRoutingDistributors(initialRegion);
            }

            const selectRegionText = window.t('routing_select_region_placeholder', '-- 請選擇地區 --');
            preferredRegionSelect.innerHTML = [`<option value="">${escapeHtml(selectRegionText)}</option>`]
                .concat(regions.map((region) => `<option value="${escapeHtml(region)}">${escapeHtml(localizeRegionLabel(region))}</option>`))
                .join('');
            preferredRegionSelect.value = initialRegion;

            const selectDistributorText = window.t('routing_select_distributor_placeholder', '-- 請先選擇地區 --');
            let matchedDistributors = distributors.filter(dist => 
                !initialRegion || !Array.isArray(dist.regions) || dist.regions.length === 0 ||
                dist.regions.map(r => r.toUpperCase()).includes(initialRegion.toUpperCase())
            );
            if (matchedDistributors.length === 0) {
                matchedDistributors = buildFallbackRoutingDistributors(initialRegion);
            }

            const availableDistributorIds = new Set(
                matchedDistributors
                    .map((dist) => String(dist.id || '').trim())
                    .filter(Boolean)
            );
            let initialDistributorId = localDistributorId
                || userPreference.preferredDistributorId
                || recommendation.distributorId
                || matchedDistributors[0]?.id
                || (initialRegion === 'TW' ? 'default-twd' : 'default-usd');
            if (initialDistributorId && !availableDistributorIds.has(initialDistributorId)) {
                initialDistributorId = recommendation.distributorId && availableDistributorIds.has(recommendation.distributorId)
                    ? recommendation.distributorId
                    : matchedDistributors[0]?.id || '';
            }
            
            preferredDistributorSelect.innerHTML = [`<option value="">${escapeHtml(selectDistributorText)}</option>`]
                .concat(matchedDistributors.map((dist) => {
                    const regionHint = Array.isArray(dist.regions) && dist.regions.length ? ` (${dist.regions.join(', ')})` : '';
                    const localizedName = localizeDistributorName(dist.name || dist.id);
                    return `<option value="${escapeHtml(dist.id)}">${escapeHtml(localizedName)}${escapeHtml(regionHint)}</option>`;
                }))
                .join('');
            preferredDistributorSelect.value = initialDistributorId;

            if (routingRecommendationBadge) {
                routingRecommendationBadge.textContent = recommendation.distributorId
                    ? `${window.t('routing_recommended', '推薦')} · ${localizeDistributorName(recommendation.distributorName || recommendation.distributorId)}`
                    : (matchedDistributors.length ? window.t('routing_manual_select', '請手動選擇') : window.t('routing_no_distributor', '無可用經銷商'));
            }
            updateRoutingSummary(snapshot);

            if (initialRegion && !preferredDistributorSelect.value) {
                const firstMatch = matchedDistributors[0]?.id || '';
                if (firstMatch) preferredDistributorSelect.value = firstMatch;
            }
        }

        async function loadRoutingOptions(region = '') {
            if (routingPreferenceSection) routingPreferenceSection.classList.remove('hidden');
            try {
                const res = await getDistributorRoutingOptions({ region: region || getPreferredRegion() || '' });
                const snapshot = res?.data || res || {};
                
                const regions = Array.isArray(snapshot.regions) ? snapshot.regions : [];
                const distributors = Array.isArray(snapshot.eligibleDistributors) ? snapshot.eligibleDistributors : [];
                if (regions.length === 0 || distributors.length === 0) {
                    throw new Error('empty_backend_data');
                }

                renderDistributorOptions(snapshot);
                const currentRegion = String(snapshot.userPreference?.preferredRegion || snapshot.region || getPreferredRegion() || '').toUpperCase();
                setRoutingPreferenceLocal(currentRegion, snapshot.userPreference?.preferredDistributorId || getPreferredDistributorId(), { source: snapshot.userPreference?.preferredRegion ? 'manual' : 'auto' });
                updateRoutingSummary(snapshot);
                
                const statusMsg = auth.currentUser 
                    ? (snapshot.recommendation?.distributorId
                        ? window.t('routing_sys_recommend', '系統推薦：{name}').replace('{name}', localizeDistributorName(snapshot.recommendation.distributorName || snapshot.recommendation.distributorId))
                        : window.t('routing_prompt_select', '請先選擇地區與經銷商。'))
                    : window.t('routing_guest_loaded', '訪客模式：已載入預設地區設定。');
                setRoutingStatus(statusMsg, 'info');
            } catch (error) {
                console.warn('Failed to load distributor routing options:', error);
                
                const targetRegion = (region || getPreferredRegion() || 'US').toUpperCase();
                const allFallbackDistributors = [
                    { id: 'default-twd', name: '預設台幣經銷商', regions: ['TW'] },
                    { id: 'default-usd', name: '預設美金經銷商', regions: ['US'] }
                ];
                const filteredDistributors = allFallbackDistributors.filter(d => 
                    d.regions.includes(targetRegion)
                );
                
                const fallbackSnapshot = {
                    regions: ['TW', 'US'],
                    eligibleDistributors: filteredDistributors.length ? filteredDistributors : allFallbackDistributors,
                    recommendation: {
                        distributorId: targetRegion === 'TW' ? 'default-twd' : 'default-usd',
                        distributorName: targetRegion === 'TW' ? '預設台幣經銷商' : '預設美金經銷商',
                        reason: 'local-fallback'
                    },
                    userPreference: {
                        preferredRegion: targetRegion,
                        preferredDistributorId: getPreferredDistributorId() || (targetRegion === 'TW' ? 'default-twd' : 'default-usd')
                    }
                };
                renderDistributorOptions(fallbackSnapshot);
                updateRoutingSummary(fallbackSnapshot);
                
                setRoutingPreferenceLocal(targetRegion, fallbackSnapshot.userPreference.preferredDistributorId, { source: 'auto' });
                setRoutingStatus(window.t('routing_load_failed_fallback', '無法載入推薦清單，已載入預設地區設定。'), 'error');
            }
        }

        async function saveRoutingPreference() {
            const preferredRegion = String(preferredRegionSelect?.value || '').trim().toUpperCase();
            const selectedDistributorId = String(preferredDistributorSelect?.value || '').trim();
            const fallbackDistributorId = resolveFallbackDistributorIdForRegion(preferredRegion);
            const preferredDistributorId = selectedDistributorId
                || getPreferredDistributorId()
                || fallbackDistributorId;
            const distributorLabel = preferredDistributorSelect?.selectedOptions?.[0]?.textContent || preferredDistributorId;
            if (!preferredRegion && !preferredDistributorId) {
                setRoutingStatus(window.t('routing_save_empty', '請至少選擇地區或經銷商。'), 'error');
                return;
            }
            if (!auth.currentUser) {
                setRoutingPreferenceLocal(preferredRegion, preferredDistributorId, { source: 'manual' });
                setRoutingStatus(window.t('routing_save_local_success', '偏好已儲存（僅限本機）。'), 'success');
                updateRoutingSummary({
                    region: preferredRegion,
                    recommendation: {
                        distributorId: preferredDistributorId,
                        distributorName: distributorLabel,
                        reason: 'explicit'
                    },
                    userPreference: {
                        preferredRegion,
                        preferredDistributorId,
                        bindingSource: 'manual'
                    }
                });
                renderCartItems();
                return;
            }
            try {
                const res = await updateUserRoutingPreference({
                    preferredRegion,
                    preferredDistributorId,
                    bindingSource: preferredDistributorId ? 'manual' : 'regionDefault'
                });
                const result = res?.data || res || {};
                setRoutingPreferenceLocal(result.preferredRegion || preferredRegion, result.preferredDistributorId || preferredDistributorId, { source: 'manual' });
                setRoutingStatus(window.t('routing_save_success', '偏好已儲存。'), 'success');
                updateRoutingSummary({
                    region: result.preferredRegion || preferredRegion,
                    recommendation: {
                        distributorId: result.preferredDistributorId || preferredDistributorId,
                        distributorName: distributorLabel || result.preferredDistributorId || preferredDistributorId,
                        reason: 'explicit'
                    },
                    userPreference: {
                        preferredRegion: result.preferredRegion || preferredRegion,
                        preferredDistributorId: result.preferredDistributorId || preferredDistributorId,
                        bindingSource: 'manual'
                    }
                });
                renderCartItems();
            } catch (error) {
                console.warn('Failed to save routing preference to backend:', error);
                setRoutingPreferenceLocal(preferredRegion, preferredDistributorId, { source: 'manual' });
                setRoutingStatus(window.t('routing_save_local_success', '偏好已儲存（僅限本機）。'), 'success');
                updateRoutingSummary({
                    region: preferredRegion,
                    recommendation: {
                        distributorId: preferredDistributorId,
                        distributorName: distributorLabel,
                        reason: 'explicit'
                    },
                    userPreference: {
                        preferredRegion,
                        preferredDistributorId,
                        bindingSource: 'manual'
                    }
                });
                renderCartItems();

        function findCartItemIdForPromo(cart, targetCourseId = '', targetUnitId = '') {
            if (!cart || typeof cart !== 'object') return null;
            
            const normalizedTargetCourseId = normalizeId(targetCourseId);
            const normalizedTargetUnitId = normalizeId(targetUnitId || targetCourseId);

            // 1. Direct Course ID Match
            if (normalizedTargetCourseId && cart[normalizedTargetCourseId]) return normalizedTargetCourseId;

            // 2. Iterate and match normalized unit identifiers
            return Object.keys(cart).find(itemId => {
                const item = cart[itemId] || {};
                const itemUnitId = normalizeId(item.unitId);
                const itemSourceUnitId = normalizeId(item.sourceUnitId);
                const itemProductId = normalizeId(itemId);

                return itemUnitId === normalizedTargetUnitId || 
                       itemSourceUnitId === normalizedTargetUnitId ||
                       itemProductId === normalizedTargetUnitId ||
                       itemProductId === normalizedTargetCourseId;
            }) || null;
        }

        async function getLessonsList() {
            if (Array.isArray(lessonsCache)) return lessonsCache;
            const distributorId = getPreferredDistributorId();
            const response = await getLessonsMetadata({ distributorId });
            lessonsCache = response.data?.lessons || [];
            return lessonsCache;
        }

        async function resolveReferralTargetItemId(cart, referralCourseId = '') {
            const normalizedReferralId = normalizeId(referralCourseId);
            let targetItemId = findCartItemIdForPromo(cart, normalizedReferralId, normalizedReferralId);
            if (targetItemId) return targetItemId;

            const lessons = await getLessonsList();
            const parentCourse = lessons.find(lesson => {
                const units = (Array.isArray(lesson.courseUnits) ? lesson.courseUnits : []).map(u => normalizeId(u));
                return units.includes(normalizedReferralId) ||
                    normalizeId(lesson.id) === normalizedReferralId ||
                    normalizeId(lesson.courseId) === normalizedReferralId;
            });

            if (parentCourse) {
                const parentCourseId = parentCourse.id || parentCourse.courseId;
                if (parentCourseId && cart[parentCourseId]) {
                    return parentCourseId;
                }
            }

            return null;
        }

        function extractAssignmentInviteCandidates(urlConfig) {
            const out = [];
            const seen = new Set();

            function walk(node) {
                if (!node) return;
                if (typeof node === 'string') {
                    const normalized = normalizeAssignmentInviteUrl(node);
                    if (normalized && !seen.has(normalized)) {
                        seen.add(normalized);
                        out.push(normalized);
                    }
                    return;
                }
                if (typeof node !== 'object') return;
                Object.values(node).forEach(walk);
            }

            walk(urlConfig);
            return out;
        }

        function getCartItemUnitCandidates(itemId, item = {}, lessons = []) {
            const seeds = [
                normalizeId(item.unitId || ''),
                normalizeId(item.sourceUnitId || ''),
                normalizeId(itemId || '')
            ].filter(Boolean);

            const foundUnits = new Set(seeds);
            const foundCourseIds = new Set();

            for (const lesson of lessons) {
                const courseId = normalizeId(lesson?.courseId || '');
                const lessonId = normalizeId(lesson?.id || '');
                const units = (Array.isArray(lesson?.courseUnits) ? lesson.courseUnits : []).map(u => normalizeId(u));
                const hits = seeds.some(seed => seed === courseId || seed === lessonId || units.includes(seed));
                if (!hits) continue;

                if (courseId) foundCourseIds.add(courseId);
                if (lessonId) foundCourseIds.add(lessonId);
                units.forEach(u => u && foundUnits.add(u));
            }

            foundCourseIds.forEach(cid => foundUnits.add(cid));
            return Array.from(foundUnits);
        }

        async function isKnownInviteForCartItem(inviteUrl, targetItemId) {
            const normalizedInvite = normalizeAssignmentInviteUrl(inviteUrl);
            if (!isAssignmentInviteUrl(normalizedInvite)) return false;

            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            const targetItem = cart[targetItemId] || {};
            const lessons = await getLessonsList();
            const unitCandidates = getCartItemUnitCandidates(targetItemId, targetItem, lessons);
            if (unitCandidates.length === 0) return false;

            for (const lesson of lessons) {
                const urlMap = lesson?.assignmentUrlMap || lesson?.assignmentUrls || {};
                for (const unitId of unitCandidates) {
                    const cfg = urlMap[unitId] || urlMap[`${unitId}.html`] || null;
                    const candidates = extractAssignmentInviteCandidates(cfg);
                    if (candidates.includes(normalizedInvite)) return true;
                }
            }
            return false;
        }

        function addCartItem(productId, productName, productPrice, isPhysical, options = {}) {
            let cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            if (cart[productId]) return false;

            cart[productId] = {
                name: productName,
                price: Number(productPrice) || 0,
                currency: options.currency || options.priceCurrency || '',
                price_currency: options.currency || options.priceCurrency || '',
                quantity: 1,
                isPhysical: !!isPhysical,
                unitId: options.unitId || null,
                sourceUnitId: options.sourceUnitId || null,
                referralLink: options.referralLink || options.promoCode || null,
                referredTutorEmail: options.referredTutorEmail || options.referralTutor || null,
                referredTutorName: options.referredTutorName || options.referralTutorName || null
            };
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            return true;
        }

        function setPrefillStatus(message, tone = 'info') {
            if (!cartPrefillStatus) return;
            const toneClass = tone === 'success'
                ? 'bg-green-50 border-green-200 text-green-700'
                : tone === 'error'
                    ? 'bg-red-50 border-red-200 text-red-700'
                    : 'bg-blue-50 border-blue-200 text-blue-700';
            cartPrefillStatus.className = `rounded-lg border px-4 py-3 mb-4 text-sm ${toneClass}`;
            cartPrefillStatus.textContent = message;
            cartPrefillStatus.classList.remove('hidden');
        }

        function renderCartItems() {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            let subtotalAmount = 0;
            let hasPhysical = false;
            let currencyMismatch = false;
            let expectedCurrency = '';

            unpaidItemsContainer.innerHTML = '';

            if (Object.keys(cart).length === 0) {
                emptyMsg.style.display = 'block';
                cartTotalElement.textContent = '0';
                if (cartTotalNote) {
                    cartTotalNote.textContent = isEn
                        ? 'Prices already include tax and shipping. The checkout amount is the final payable total.'
                        : '價格已含稅與運費，結帳金額即為實付總額。';
                }
                checkoutBtn.disabled = true;
                return;
            } else {
                emptyMsg.style.display = 'none';
            }

            const preferredRegion = getPreferredRegion();
            const currencies = new Set();
            for (const [id, item] of Object.entries(cart)) {
                const resolvedPrice = pricingApi.resolveCartPrice(item, isEn ? 'en' : 'zh-TW');
                const price = Number(resolvedPrice.amount || 0);
                const itemCurrency = String(resolvedPrice.currency || '').toUpperCase();
                if (itemCurrency) currencies.add(itemCurrency);
                const quantity = parseInt(item.quantity) || 1;
                const itemTotal = price * quantity;
                subtotalAmount += itemTotal;
                if (item.isPhysical) {
                    hasPhysical = true;
                }

                const itemDiv = document.createElement('div');
                itemDiv.className = 'bg-white/50 p-6 rounded-[2rem] border border-slate-200 shadow-sm mb-4';
                const codeLabel = window.t('cart_item_code', '產品代號: {id}').replace('{id}', id);
                const removeLabel = window.t('cart_item_remove', '移除');
                const currencyUnit = itemCurrency || '';
                const priceText = currencyUnit
                    ? `${itemTotal.toLocaleString()} ${currencyUnit}`
                    : itemTotal.toLocaleString();
                itemDiv.innerHTML = `
                    <div class="flex items-start justify-between gap-4">
                        <div class="min-w-0 flex-1">
                            <p class="font-semibold text-gray-800">${item.name}</p>
                            <p class="text-xs text-gray-500">${codeLabel}</p>
                        </div>
                        <div class="text-right shrink-0">
                             <p class="font-bold text-indigo-600">${priceText}</p>
                             <button class="remove-cart-item-btn text-sm text-rose-500 hover:text-rose-600 mt-2" data-product-id="${id}">${removeLabel}</button>
                        </div>
                    </div>
                `;
                unpaidItemsContainer.appendChild(itemDiv);
            }

            const observedCurrencies = [...currencies];
            if (observedCurrencies.length === 1) {
                expectedCurrency = observedCurrencies[0];
            } else if (observedCurrencies.length > 1) {
                currencyMismatch = true;
            } else {
                expectedCurrency = '';
            }

            const cartTotalLabel = document.getElementById('cart-total-label');
            if (cartTotalLabel) {
                cartTotalLabel.textContent = window.t('cart_total_label', '總金額:');
            }

            const shippingAmount = 0;
            const taxAmount = 0;
            const totalAmount = subtotalAmount + shippingAmount + taxAmount;

            if (hasPhysical) {
                if (cartTotalNote) {
                    cartTotalNote.textContent = isEn
                        ? 'Prices already include tax and shipping. The checkout amount is the final payable total.'
                        : '價格已含稅與運費，結帳金額即為實付總額。';
                }
            } else if (cartTotalNote) {
                cartTotalNote.textContent = isEn
                    ? 'Prices already include tax. The checkout amount is the final payable total.'
                    : '價格已含稅，結帳金額即為實付總額。';
            }

            cartTotalElement.textContent = expectedCurrency
                ? `${expectedCurrency} ${totalAmount.toLocaleString()}`
                : `${totalAmount.toLocaleString()}`;
            checkoutBtn.disabled = (totalAmount === 0) || currencyMismatch;
            if (currencyMismatch) {
                cartPrefillStatus.textContent = isEn
                    ? 'This cart contains mixed currencies. Please split the checkout by distributor or price book.'
                    : '購物車包含不同幣別的商品，請依經銷商或 price book 拆單結帳。';
                cartPrefillStatus.className = 'rounded-lg border px-4 py-3 mb-4 text-sm bg-amber-50 border-amber-200 text-amber-700';
                cartPrefillStatus.classList.remove('hidden');
            }

            document.querySelectorAll('.remove-cart-item-btn').forEach(button => {
                button.addEventListener('click', (event) => {
                    removeFromCart(event.currentTarget.dataset.productId);
                });
            });

        }

        renderCartItems();

        // ===============================================
        // A-2. 物流與實體商品邏輯 (新增)
        // ===============================================

        const receiverNameInput = document.getElementById('receiver-name');
        const receiverPhoneInput = document.getElementById('receiver-phone');

        function checkPhysicalItems() {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            let hasPhysical = false;
            for (const item of Object.values(cart)) {
                if (item.isPhysical) {
                    hasPhysical = true;

        const ASSIGNMENT_INVITE_RE = /^https:\/\/classroom\.github\.com\/a\/[A-Za-z0-9_-]+\/?$/;

        function normalizeAssignmentInviteUrl(raw = '') {
            try {
                const url = new URL(String(raw).trim());
                if (url.hostname !== 'classroom.github.com') return String(raw).trim();
                return `${url.origin}${url.pathname}`.replace(/\/+$/, '');
            } catch (_) {
                return String(raw).trim();
            }
        }

        function isAssignmentInviteUrl(raw = '') {
            return ASSIGNMENT_INVITE_RE.test(String(raw).trim());
        }

        async function applyReferralLink(code, options = {}) {
            const lowerCode = (code || '').toLowerCase();
            const isUrl = lowerCode.includes('github.com/classroom/') || lowerCode.includes('classroom.github.com/');
            // URLs should NOT be forced to uppercase
            const normalizedCode = isUrl ? normalizeAssignmentInviteUrl(code.trim()) : (code || '').trim().toUpperCase();

            const {
                silent = false,
                keepEditable = false,
                targetItemId = null,
                inputElement = null,
                statusElement = null,
                buttonElement = null
            } = options;

            if (!normalizedCode) {
                if (targetItemId && inputElement) {
                    const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
                    inputElement.value = cart[targetItemId]?.referralLink || '';
                }
                if (statusElement) {
                    statusElement.textContent = window.t('referral_unchanged', '未變更綁定：可先留白，或輸入有效作業連結再套用。');
                    statusElement.className = 'item-promo-status mt-2 text-sm text-slate-500';
                    statusElement.classList.remove('hidden');
                }
                return { success: true, message: 'unchanged' };
            }
            if (isUrl) {
                const normalizedInvite = normalizeAssignmentInviteUrl(normalizedCode);
                if (!isAssignmentInviteUrl(normalizedInvite)) {
                    const msg = window.t('referral_url_invalid', '連結格式錯誤，請使用有效的作業連結。');
                    if (statusElement) {
                        statusElement.textContent = `❌ ${msg}`;
                        statusElement.className = 'item-promo-status mt-2 text-sm text-red-600';
                        statusElement.classList.remove('hidden');
                    }
                    return { success: false, message: msg };
                }
                // [V16.2] Client-side pre-check removed to allow dynamic referral_links lookup via Cloud Function
                // This prevents issues where new tutor links aren't yet in the static metadata_lessons cache.

            }

            if (inputElement) inputElement.value = normalizedCode;
            if (buttonElement) {
                buttonElement.disabled = true;
                buttonElement.textContent = window.t('referral_verification_loading', '驗證中...');
            }
            if (statusElement) statusElement.classList.add('hidden');

            try {
                const verifyReferralLink = httpsCallable(functions, 'verifyReferralLink');
                
                // [V15.1] Pass cartItems for qualification check
                const result = await verifyReferralLink({ 
                    referralLink: normalizedCode,
                    cartItems: targetItemId ? [{ id: targetItemId }] : []
                });
                
                if (result.data && result.data.success) {
                    const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
                    const resolvedItemId = await resolveReferralTargetItemId(cart, result.data.courseId);
                    if (!resolvedItemId) {
                        throw new Error(window.t('referral_item_not_in_cart', '此老師作業連結對應的課程/單元不在目前購物車中'));
                    }
                    if (targetItemId && resolvedItemId !== targetItemId) {
                        throw new Error(window.t('referral_item_mismatch', '此老師作業連結不屬於目前這個課程項目'));
                    }

                    const finalItemId = targetItemId || resolvedItemId;

                    const existingItem = cart[finalItemId] || {};
                    cart[finalItemId] = {
                        ...existingItem,
                        referralLink: normalizedCode,
                        referredTutorEmail: result.data.referredTutorEmail,
                        referredTutorName: result.data.referredTutorName || result.data.referredTutorEmail,
                        sourceUnitId: existingItem.sourceUnitId || result.data.courseId || null
                    };
                    localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
                    renderCartItems();

                    if (statusElement) {
                        const successMsg = window.t('referral_applied_success', '✅ 已套用老師作業連結：{name}').replace('{name}', result.data.referredTutorName || result.data.referredTutorEmail);
                        statusElement.textContent = successMsg;
                        statusElement.className = 'item-promo-status mt-2 text-sm text-green-600 font-bold';
                    }
                    return {
                        success: true,
                        tutor: result.data.referredTutorEmail,
                        tutorName: result.data.referredTutorName || result.data.referredTutorEmail,
                        courseId: result.data.courseId || '',
                        itemId: finalItemId
                    };
                } else {
                    throw new Error(result.data.message || '無效的代碼');
                }
            } catch (err) {
                if (statusElement) {
                    statusElement.textContent = `❌ ${err.message}`;
                    statusElement.className = 'item-promo-status mt-2 text-sm text-red-600';
                }
                return { success: false, message: err.message };
            } finally {
                if (statusElement && (!silent || statusElement.textContent)) {
                    statusElement.classList.remove('hidden');
                }
                if (buttonElement) {
                    buttonElement.disabled = false;
                    buttonElement.textContent = window.t('referral_btn_apply', '套用連結');
                }
            }
        }

        async function hydrateCartFromInviteLink() {
            const url = new URL(window.location.href);
            const params = url.searchParams;
            if (params.get('action') !== 'addInviteItem') return;

            const courseId = params.get('courseId');
            const unitId = params.get('unitId') || courseId;
            const rawReferral = (params.get('tutor') || params.get('tutorEmail') || params.get('referralLink') || params.get('promoCode') || '').trim();
            const isUrl = rawReferral.toLowerCase().includes('github.com/classroom/') || rawReferral.toLowerCase().includes('classroom.github.com/');
            const referralLink = isUrl ? normalizeAssignmentInviteUrl(rawReferral) : rawReferral;
            const fallbackName = params.get('courseName') || courseId;
            const fallbackPrice = parseInt(params.get('coursePrice') || '0', 10) || 0;
            const fallbackPhysical = params.get('isPhysical') === 'true';

            if (!courseId) {
                setPrefillStatus(window.t('prefill_invite_missing', '推薦連結缺少課程資訊，無法自動加入購物車。'), 'error');
                return;
            }

            let courseMeta = null;
            try {
                const distributorId = getPreferredDistributorId();
                const lessonsResponse = await getLessonsMetadata({ distributorId });
                const lessons = lessonsResponse.data?.lessons || [];
                courseMeta = lessons.find(lesson => lesson.id === courseId) ||
                    lessons.find(lesson => lesson.docId === courseId) ||
                    lessons.find(lesson => lesson.courseId === courseId) ||
                    lessons.find(lesson => Array.isArray(lesson.courseUnits) && lesson.courseUnits.includes(unitId)) ||
                    null;
            } catch (error) {
                console.warn('Failed to fetch lessons metadata for invite link:', error);
            }

            const hasPriceData = !!courseMeta && courseMeta.dealerPriceBookId != null;
            if (courseMeta && !hasPriceData) {
                setPrefillStatus(window.t('prefill_invite_unavailable', '此課程尚未設定價格，暫時無法加入購物車。'), 'error');
                return;
            }

            const productName = courseMeta?.title || courseMeta?.courseName || fallbackName;
            const priceEntry = pricingApi.resolveCartPrice(
                courseMeta && typeof courseMeta === 'object'
                    ? courseMeta
                    : { price: fallbackPrice },
                localStorage.getItem('vibe_user_locale')?.startsWith('en') ? 'en' : 'zh-TW'
            );
            const productPrice = Number(priceEntry?.amount ?? fallbackPrice) || 0;
            const productCurrency = String(priceEntry?.currency || '').toUpperCase();
            const isPhysical = courseMeta?.isPhysical === true || fallbackPhysical;
            const itemAdded = addCartItem(courseId, productName, productPrice, isPhysical, {
                unitId,
                sourceUnitId: unitId,
                currency: productCurrency,
                priceCurrency: productCurrency
            });

            renderCartItems();
            checkPhysicalItems();

            let statusMessage = itemAdded
                ? window.t('prefill_invite_added', '已將「{name}」加入購物車，您可以直接前往結帳。').replace('{name}', productName)
                : window.t('prefill_invite_exists', '「{name}」原本已在購物車中，已保留現有品項。').replace('{name}', productName);

            if (referralLink) statusMessage += window.t('prefill_invite_referral_ignored', '（已忽略推薦碼/連結參數，綁定導師請在作業頁輸入授課老師 Email）');

            setPrefillStatus(statusMessage, 'success');

            [
                'action', 'courseId', 'unitId', 'referralLink', 'promoCode', 'tutor', 'tutorEmail',
                'courseName', 'coursePrice', 'isPhysical'
            ].forEach(key => params.delete(key));
            history.replaceState({}, '', `${url.pathname}${params.toString() ? `?${params.toString()}` : ''}`);
        }

        /**
         * 處理付款結帳流程 (雙通道版：綠界與 Stripe 路由)
         */
        async function handlePaymentCheckout(user, cartItems) {
            const storedLocale = localStorage.getItem('vibe_user_locale') || '';
            const isEn = storedLocale.startsWith('en');
            const checkoutLocale = isEn ? 'en' : 'zh-TW';
            const checkoutRegion = getPreferredRegion();
            const useInternationalShipping = checkoutRegion && checkoutRegion !== 'TW';
            const preferredDistributorId = getPreferredDistributorId();

            if (cartPrefillStatus) {
                cartPrefillStatus.textContent = isEn
                    ? 'Preparing checkout details...'
                    : '正在檢查結帳資料...';
                cartPrefillStatus.className = 'rounded-lg border px-4 py-3 mb-4 text-sm bg-blue-50 border-blue-200 text-blue-700';
                cartPrefillStatus.classList.remove('hidden');
            }

            // [NEW] 驗證實體商品欄位
            const hasPhysical = checkPhysicalItems();
            let logisticsInfo = null;

            if (hasPhysical) {
                const rName = receiverNameInput.value.trim();
                const rPhone = receiverPhoneInput.value.trim();

                if (!rName || !rPhone) {
                    alert(window.t('alert_shipping_required', '請完整填寫收件人姓名與手機號碼！'));
                    return;
                }

                if (useInternationalShipping) {
                    const country = document.getElementById('shipping-country').value;
                    const state = document.getElementById('shipping-state').value.trim();
                    const city = document.getElementById('shipping-city').value.trim();
                    const line1 = document.getElementById('shipping-line1').value.trim();
                    const zip = document.getElementById('shipping-zip').value.trim();
                    const line2 = document.getElementById('shipping-line2').value.trim();

                    if (!country || !city || !line1 || !zip) {
                        alert(window.t('alert_intl_address_required', 'Please fill in Country, City, Address Line 1, and ZIP code!'));
                        return;
                    }

                    logisticsInfo = {
                        receiverName: rName,
                        receiverPhone: rPhone,
                        isInternational: true,
                        address: {
                            country: country,
                            state: state,
                            city: city,
                            line1: line1,
                            line2: line2,
                            postalCode: zip
                        }
                    };
                } else {
                    const sId = storeIdInput.value;
                    if (!sId) {
                        alert(window.t('alert_shipping_required', '請選擇取貨門市！'));
                        return;
                    }
                    logisticsInfo = {
                        receiverName: rName,
                        receiverPhone: rPhone,
                        storeId: sId,
                        storeName: storeNameInput.value,
                        storeAddress: storeAddressInput.value
                    };
                }
            }

            // 先向後端解析每個品項的經銷商價格，並確保整筆訂單只落到同一個經銷商
            const cartEntries = Object.entries(cartItems || {});
            const resolvedQuotes = [];
            const checkoutCartItems = JSON.parse(JSON.stringify(cartItems || {}));
            let resolvedDistributorId = '';
            let resolvedPriceBookId = '';
            let resolvedPricingVersion = '';
            let resolvedCurrency = '';
            let calculatedTotal = 0;

            for (const [itemId, item] of cartEntries) {
                const productId = normalizeId(item.sourceUnitId || item.unitId || itemId);
                if (!productId) {
                    alert(isEn
                        ? 'Unable to resolve product identifier for one of the cart items.'
                        : '購物車中有品項無法解析產品代號，請先整理購物車。');
                    checkoutBtn.disabled = false;
                    checkoutBtn.textContent = window.t('checkout_btn_pay', '💳 前往付款');
                    return;
                }

                const snapshotPrice = pricingApi.resolveCartPrice(item, checkoutLocale);
                const quoteResponse = await resolveDistributorCheckoutQuote({
                    productId,
                    region: checkoutRegion,
                    locale: checkoutLocale,
                    tutorId: item.referredTutorEmail || '',
                    promotionCode: item.referralLink || '',
                    customerId: user.uid,
                    distributorId: preferredDistributorId,
                    priceBookId: String(item.priceBookId || '').trim()
                });

                const quoteData = quoteResponse?.data?.result || quoteResponse?.data || quoteResponse?.result || quoteResponse || {};
                if (!quoteData || quoteData.state === 'ambiguous' || quoteData.success === false) {
                    const msg = quoteData?.reason || quoteData?.message || (isEn
                        ? 'Unable to resolve a distributor for this checkout.'
                        : '無法解析此筆結帳所屬的經銷商，請先選擇經銷商或聯絡管理員。');
                    alert(msg);
                    checkoutBtn.disabled = false;
                    checkoutBtn.textContent = window.t('checkout_btn_pay', '💳 前往付款');
                    return;
                }

                const quotePrice = quoteData.price || {};
                const existingCurrency = String(snapshotPrice.currency || item.currency || item.price_currency || item.currencyCode || '').toUpperCase();
                const quoteCurrency = String(quotePrice.currency || '').toUpperCase();
                const itemCurrency = quoteCurrency || existingCurrency || (Number(snapshotPrice.amount) > 0 && existingCurrency) || '';
                const quotedAmount = Number(quotePrice.amount);
                const existingAmount = Number(snapshotPrice.amount || 0);
                const itemPrice = Number.isFinite(quotedAmount) && quotedAmount > 0 ? quotedAmount : existingAmount;
                const quantity = parseInt(item.quantity) || 1;

                if (!itemCurrency) {
                    alert(isEn
                        ? 'The distributor quote did not return a currency.'
                        : '經銷商報價未回傳幣別，請稍後再試。');
                    checkoutBtn.disabled = false;
                    checkoutBtn.textContent = window.t('checkout_btn_pay', '💳 前往付款');
                    return;
                }

                if (!resolvedCurrency) resolvedCurrency = itemCurrency;
                if (resolvedCurrency && itemCurrency !== resolvedCurrency) {
                    alert(isEn
                        ? 'Mixed currencies are not supported in a single checkout.'
                        : '單筆結帳不支援混合幣別，請先整理購物車。');
                    checkoutBtn.disabled = false;
                    checkoutBtn.textContent = window.t('checkout_btn_pay', '💳 前往付款');
                    return;
                }

                if (resolvedDistributorId && quoteData.distributorId && resolvedDistributorId !== quoteData.distributorId) {
                    alert(isEn
                        ? 'This cart contains items from multiple distributors. Please split the checkout.'
                        : '購物車包含不同經銷商的品項，請拆單結帳。');
                    checkoutBtn.disabled = false;
                    checkoutBtn.textContent = window.t('checkout_btn_pay', '💳 前往付款');
                    return;
                }

                resolvedDistributorId = resolvedDistributorId || quoteData.distributorId || '';
                resolvedPriceBookId = resolvedPriceBookId || quoteData.priceBookId || '';
                resolvedPricingVersion = resolvedPricingVersion || quotePrice.pricingVersion || quoteData.pricingVersion || '';
                if (!resolvedCurrency) resolvedCurrency = itemCurrency;

                checkoutCartItems[itemId] = {
                    ...item,
                    price: itemPrice,
                    currency: itemCurrency,
                    price_currency: itemCurrency,
                    price_usd: itemCurrency === 'USD' ? itemPrice : item.price_usd,
                    price_twd: itemCurrency === 'TWD' ? itemPrice : item.price_twd,
                    distributorId: quoteData.distributorId || item.distributorId || '',
                    priceBookId: quoteData.priceBookId || item.priceBookId || '',
                    pricingVersion: quotePrice.pricingVersion || quoteData.pricingVersion || item.pricingVersion || ''
                };
                calculatedTotal += itemPrice * quantity;

                resolvedQuotes.push({
                    itemId,
                    productId,
                    distributorId: quoteData.distributorId || '',
                    priceBookId: quoteData.priceBookId || '',
                    pricingVersion: quotePrice.pricingVersion || quoteData.pricingVersion || '',
                    price: itemPrice,
                    currency: itemCurrency
                });
            }

            if (hasPhysical) {
                const shippingFee = 0;
                calculatedTotal += shippingFee;
            }

            if (resolvedDistributorId) {
                cartPrefillStatus.textContent = isEn
                    ? `Distributor resolved: ${resolvedDistributorId}`
                    : `已解析經銷商：${resolvedDistributorId}`;
                cartPrefillStatus.className = 'rounded-lg border px-4 py-3 mb-4 text-sm bg-green-50 border-green-200 text-green-700';
                cartPrefillStatus.classList.remove('hidden');
            }

            if (auth.currentUser && (checkoutRegion || resolvedDistributorId)) {
                try {
                    await updateUserRoutingPreference({
                        preferredRegion: checkoutRegion || getPreferredRegion() || '',
                        preferredDistributorId: resolvedDistributorId || getPreferredDistributorId() || '',
                        bindingSource: resolvedDistributorId ? 'checkout' : 'regionDefault'
                    });
                    setRoutingPreferenceLocal(checkoutRegion || getPreferredRegion() || '', resolvedDistributorId || getPreferredDistributorId() || '', { source: 'checkout' });
                    setRoutingStatus(resolvedDistributorId
                        ? `已記住偏好經銷商：${resolvedDistributorId}`
                        : '已記住地區偏好。', 'success');
                } catch (error) {
                    console.warn('Failed to persist routing preference from checkout:', error);
                }
            }

            const isTwdCheckout = resolvedCurrency === 'TWD';
            const shouldUseStripe = !isTwdCheckout || (checkoutRegion && checkoutRegion !== 'TW');
            const checkoutGateway = shouldUseStripe ? 'STRIPE' : 'ECPAY';

            checkoutBtn.disabled = true;
            checkoutBtn.textContent = checkoutGateway === 'STRIPE'
                ? '🔒 Connecting to Stripe...'
                : window.t('checkout_btn_ecpay', '🔒 正在連接綠界金流...');
            if (cartPrefillStatus) {
                cartPrefillStatus.textContent = checkoutGateway === 'STRIPE'
                    ? '正在建立 Stripe 付款頁面...'
                    : '正在建立綠界付款單...';
                cartPrefillStatus.className = 'rounded-lg border px-4 py-3 mb-4 text-sm bg-blue-50 border-blue-200 text-blue-700';
                cartPrefillStatus.classList.remove('hidden');
            }

            try {
                const response = await initiatePayment({
                    amount: calculatedTotal,
                    currency: resolvedCurrency,
                    userId: user.uid,
                    cartDetails: checkoutCartItems,
                    logistics: logisticsInfo,
                    referralLink: null,
                    referredTutorEmail: null,
                    distributorId: resolvedDistributorId,
                    priceBookId: resolvedPriceBookId,
                    pricingVersion: resolvedPricingVersion,
                    gateway: checkoutGateway,
                    region: checkoutRegion,
                    locale: isEn ? "en" : "zh-TW",
                    // 設定交易完成後的返回網址
                    returnUrl: window.location.origin + '/payment-return.html'
                });

                const data = response?.data ?? response ?? null;
                const resData = data?.result ?? data;

                if (resData && (resData.gateway === "STRIPE" || resData.paymentParams || resData.sessionUrl)) {
                    if (resData.gateway === "STRIPE") {
                        console.log("Stripe Checkout URL received, redirecting...");
                        checkoutBtn.textContent = '🚀 Redirecting to Stripe...';
                        if (cartPrefillStatus) {
                            cartPrefillStatus.textContent = isEn
                                ? 'Redirecting to Stripe checkout...'
                                : '正在前往 Stripe 付款頁面...';
                        }
                        window.location.href = resData.sessionUrl;
                    } else if (resData.paymentParams) {
                        console.log("取得綠界參數成功，正在跳轉...");
                        checkoutBtn.textContent = window.t('checkout_btn_redirect', '🚀 前往付款頁面...');
                        if (cartPrefillStatus) {
                            cartPrefillStatus.textContent = isEn
                                ? 'Redirecting to ECPay checkout...'
                                : '正在前往綠界付款頁面...';
                        }
                        submitECPayForm(resData.paymentParams, resData.apiUrl);
                    } else {
                        throw new Error('無法取得交易參數。');
                    }
                } else {
                    console.error('[Checkout] Unexpected payment response shape:', response);
                    const receivedKeys = Object.keys(resData || data || {}).join(', ') || 'none';
                    throw new Error(`金流伺服器回傳格式不正確（收到欄位：${receivedKeys}）。`);
                }

            } catch (error) {
                console.error("結帳失敗:", error);
                alert(window.t('alert_checkout_failed', '結帳失敗：') + error.message);
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = window.t('checkout_btn_pay', '💳 前往付款');
            }
        }

        /**
         * 建立並送出綠界 (ECPay) 表單
         */
        function submitECPayForm(params, apiUrl) {
            const form = document.createElement('form');
            form.method = 'post';
            form.action = apiUrl; // 綠界的 API 網址
            form.target = '_self';
            form.style.display = 'none';

            // 將後端回傳的所有參數轉為 hidden input
            for (const key in params) {
                if (params.hasOwnProperty(key)) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = params[key];
                    form.appendChild(input);
                }
            }

            (paymentFormContainer || document.body).appendChild(form);
            form.submit();
        }
    </script>
</body>
