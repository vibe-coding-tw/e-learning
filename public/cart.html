    <script type="module">
        // 1. 匯入必要的 Firebase 函式
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";

        // 2. Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyCO6Y6Pa7b7zbieJIErysaNF6-UqbT8KJw",
            authDomain: "e-learning-942f7.firebaseapp.com",
            projectId: "e-learning-942f7",
            storageBucket: "e-learning-942f7.firebasestorage.app",
            messagingSenderId: "878397058574",
            appId: "1:878397058574:web:28aaa07a291ee3baab165f"
        };

        // 3. 初始化 Firebase 服務
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const functions = getFunctions(app, 'asia-east1');

        // 修改為通用的付款請求 Function (後端需配合修改)
        const initiatePayment = httpsCallable(functions, 'initiatePayment');
        const getLessonsMetadata = httpsCallable(functions, 'getLessonsMetadata');
        let lessonsCache = null;

        // 您的商店代號 (公開資訊可放在前端)
        const MERCHANT_ID = "3271550";
        // 注意：HashKey 和 HashIV 請務必設定在 Firebase Cloud Functions 的環境變數中，不要寫在這裡！

        // ===============================================
        // A. 購物車項目渲染邏輯
        // ===============================================

        const unpaidItemsContainer = document.getElementById('unpaid-items');
        const emptyMsg = document.getElementById('empty-cart-msg');
        const cartTotalElement = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('checkout-btn');
        const paymentFormContainer = document.getElementById('payment-form-container');
        const cartPrefillStatus = document.getElementById('cart-prefill-status');

        function removeFromCart(productId) {
            let cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            delete cart[productId];
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            renderCartItems();
        }

        function findCartItemIdForPromo(cart, targetCourseId = '', targetUnitId = '') {
            if (!cart || typeof cart !== 'object') return null;
            if (targetCourseId && cart[targetCourseId]) return targetCourseId;

            const normalizedUnitId = (targetUnitId || '').trim();
            return Object.keys(cart).find(itemId => {
                const item = cart[itemId] || {};
                return item.unitId === normalizedUnitId || item.sourceUnitId === normalizedUnitId;
            }) || null;
        }

        async function getLessonsList() {
            if (Array.isArray(lessonsCache)) return lessonsCache;
            const response = await getLessonsMetadata({});
            lessonsCache = response.data?.lessons || [];
            return lessonsCache;
        }

        async function resolvePromoTargetItemId(cart, promoCourseId = '') {
            let targetItemId = findCartItemIdForPromo(cart, promoCourseId, promoCourseId);
            if (targetItemId) return targetItemId;

            const lessons = await getLessonsList();
            const parentCourse = lessons.find(lesson =>
                Array.isArray(lesson.courseUnits) && lesson.courseUnits.includes(promoCourseId)
            );

            if (parentCourse?.courseId && cart[parentCourse.courseId]) {
                return parentCourse.courseId;
            }

            return null;
        }

        function addCartItem(productId, productName, productPrice, isPhysical, options = {}) {
            let cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            if (cart[productId]) return false;

            cart[productId] = {
                name: productName,
                price: parseInt(productPrice, 10) || 0,
                quantity: 1,
                isPhysical: !!isPhysical,
                unitId: options.unitId || null,
                sourceUnitId: options.sourceUnitId || null,
                promoCode: options.promoCode || null,
                referralTutor: options.referralTutor || null,
                referralTutorName: options.referralTutorName || null
            };
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            return true;
        }

        function setPrefillStatus(message, tone = 'info') {
            if (!cartPrefillStatus) return;
            const toneClass = tone === 'success'
                ? 'bg-green-50 border-green-200 text-green-700'
                : tone === 'error'
                    ? 'bg-red-50 border-red-200 text-red-700'
                    : 'bg-blue-50 border-blue-200 text-blue-700';
            cartPrefillStatus.className = `rounded-lg border px-4 py-3 mb-4 text-sm ${toneClass}`;
            cartPrefillStatus.textContent = message;
            cartPrefillStatus.classList.remove('hidden');
        }

        function renderCartItems() {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            let total = 0;

            unpaidItemsContainer.innerHTML = '';

            if (Object.keys(cart).length === 0) {
                emptyMsg.style.display = 'block';
                cartTotalElement.textContent = '0';
                checkoutBtn.disabled = true;
                return;
            } else {
                emptyMsg.style.display = 'none';
            }

            for (const [id, item] of Object.entries(cart)) {
                const price = parseFloat(item.price) || 0;
                const quantity = parseInt(item.quantity) || 1;
                const itemTotal = price * quantity;
                total += itemTotal;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-sm';
                const promoBadge = item.promoCode
                    ? `
                        <div class="mt-3 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2">
                            <p class="text-xs font-semibold uppercase tracking-wide text-emerald-700">已套用的推薦碼</p>
                            <p class="mt-1 text-sm font-bold text-emerald-700">${item.promoCode}</p>
                            <p class="text-xs text-emerald-700">${item.referralTutorName || item.referralTutor || '老師推薦'}</p>
                        </div>
                    `
                    : `
                        <div class="mt-3 rounded-lg border border-purple-200 bg-purple-50 px-3 py-2">
                            <p class="text-xs font-semibold uppercase tracking-wide text-purple-700">此課程可獨立套用推薦碼</p>
                            <p class="mt-1 text-xs text-purple-700">每個待結帳課程都可以綁定不同老師的推薦碼。</p>
                        </div>
                    `;
                itemDiv.innerHTML = `
                    <div class="flex items-start justify-between gap-4">
                        <div class="min-w-0 flex-1">
                            <p class="font-semibold text-gray-800">${item.name}</p>
                            <p class="text-xs text-gray-500">產品代號: ${id}</p>
                            ${promoBadge}
                        </div>
                        <div class="text-right shrink-0">
                             <p class="font-bold text-indigo-600">${itemTotal.toLocaleString()} 元</p>
                             <button class="remove-cart-item-btn text-sm text-rose-500 hover:text-rose-600 mt-2" data-product-id="${id}">移除</button>
                        </div>
                    </div>
                    <div class="mt-4 rounded-lg border border-purple-200 bg-white px-3 py-3">
                        <div class="flex items-center justify-between gap-3 mb-2">
                            <h3 class="text-sm font-bold text-gray-800">🎟️ 這個課程的推薦碼 / Promo Code</h3>
                            ${item.promoCode ? `<button class="clear-item-promo-btn text-xs font-semibold text-gray-500 hover:text-gray-700" data-product-id="${id}">清除代碼</button>` : ''}
                        </div>
                        <div class="flex flex-col gap-2 sm:flex-row">
                            <input type="text"
                                class="item-promo-input flex-1 border-gray-300 rounded-md shadow-sm p-2 uppercase"
                                data-product-id="${id}"
                                value="${item.promoCode || ''}"
                                placeholder="請輸入此課程對應的老師推薦碼">
                            <button
                                class="apply-item-promo-btn bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700 transition"
                                data-product-id="${id}">
                                ${item.promoCode ? '更新代碼' : '套用代碼'}
                            </button>
                        </div>
                        <p class="item-promo-status mt-2 text-sm hidden" data-product-id="${id}"></p>
                    </div>
                `;
                unpaidItemsContainer.appendChild(itemDiv);
            }

            cartTotalElement.textContent = total.toLocaleString();
            checkoutBtn.disabled = (total === 0);

            document.querySelectorAll('.remove-cart-item-btn').forEach(button => {
                button.addEventListener('click', (event) => {
                    removeFromCart(event.currentTarget.dataset.productId);
                });
            });

            document.querySelectorAll('.apply-item-promo-btn').forEach(button => {
                button.addEventListener('click', async (event) => {
                    const itemId = event.currentTarget.dataset.productId;
                    const input = document.querySelector(`.item-promo-input[data-product-id="${itemId}"]`);
                    const status = document.querySelector(`.item-promo-status[data-product-id="${itemId}"]`);
                    const code = input?.value?.trim().toUpperCase() || '';
                    if (!code) {
                        if (status) {
                            status.textContent = '請先輸入推薦碼。';
                            status.className = 'item-promo-status mt-2 text-sm text-amber-600';
                            status.classList.remove('hidden');
                        }
                        return;
                    }
                    await applyPromoCode(code, {
                        targetItemId: itemId,
                        inputElement: input,
                        statusElement: status,
                        buttonElement: event.currentTarget
                    });
                });
            });

            document.querySelectorAll('.clear-item-promo-btn').forEach(button => {
                button.addEventListener('click', (event) => {
                    clearItemPromo(event.currentTarget.dataset.productId);
                });
            });
        }

        renderCartItems();

        // ===============================================
        // A-2. 物流與實體商品邏輯 (新增)
        // ===============================================
        const shippingSection = document.getElementById('shipping-info-section');
        const receiverNameInput = document.getElementById('receiver-name');
        const receiverPhoneInput = document.getElementById('receiver-phone');
        const storeDisplay = document.getElementById('store-display');
        const storeIdInput = document.getElementById('store-id');
        const storeNameInput = document.getElementById('store-name');
        const storeAddressInput = document.getElementById('store-address');

        // 1. 檢查是否包含實體商品
        function checkPhysicalItems() {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            let hasPhysical = false;
            for (const item of Object.values(cart)) {
                if (item.isPhysical) {
                    hasPhysical = true;
                    break;
                }
            }

            if (hasPhysical) {
                shippingSection.classList.remove('hidden');
            } else {
                shippingSection.classList.add('hidden');
            }
            return hasPhysical;
        }

        // 頁面載入時檢查
        const hasPhysicalGoods = checkPhysicalItems();

        // 2. 處理從 Map 返回的參數
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            if (action === 'storeSelected') {
                const sId = urlParams.get('storeId');
                const sName = urlParams.get('storeName');
                const sAddr = urlParams.get('address');

                if (sId) {
                    storeIdInput.value = sId;
                    storeNameInput.value = sName;
                    storeAddressInput.value = sAddr;
                    storeDisplay.textContent = `[${sId}] ${sName} - ${sAddr}`;
                    storeDisplay.classList.add('text-green-700', 'font-bold');

                    // 恢復顯示 (因為重整後 JS 會重新執行 checkPhysicalItems)
                    // 但我們需要確保 cart 還有東西
                    checkPhysicalItems();
                }
            }
        });

        // 3. 開啟電子地圖 (修正版：從後端取得加密參數)
        window.openMap = async function (logisticsSubType) {
            try {
                // 呼叫後端 Function 取得參數
                const getLogisticsMapParams = httpsCallable(functions, 'getLogisticsMapParams');
                const response = await getLogisticsMapParams({
                    logisticsSubType: logisticsSubType,
                    isCollection: 'N'
                });

                const data = response.data;
                if (!data || !data.params) {
                    throw new Error('無法取得物流參數');
                }

                const params = data.params;
                const apiUrl = data.apiUrl || 'https://logistics.ecpay.com.tw/Express/map';

                // 建立 Form POST 到綠界 Map
                const mapForm = document.createElement('form');
                mapForm.method = 'POST';
                mapForm.action = apiUrl;

                for (const key in params) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = params[key];
                    mapForm.appendChild(input);
                }

                document.body.appendChild(mapForm);
                mapForm.submit();
            } catch (error) {
                console.error("開啟地圖失敗:", error);
                alert("開啟電子地圖失敗，請稍後再試。");
            }
        };

        // ===============================================
        // B-2. 優惠券 / 推薦代碼邏輯 (新增)
        // ===============================================
        const DEFAULT_MENTOR = 'info@vibe-coding.tw';

        function clearItemPromo(itemId) {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            if (!cart[itemId]) return;
            cart[itemId] = {
                ...cart[itemId],
                promoCode: null,
                referralTutor: null,
                referralTutorName: null
            };
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            renderCartItems();
        }

        async function applyPromoCode(code, options = {}) {
            const normalizedCode = (code || '').trim().toUpperCase();
            const {
                silent = false,
                keepEditable = false,
                targetItemId = null,
                inputElement = null,
                statusElement = null,
                buttonElement = null
            } = options;
            if (!normalizedCode) return { success: false, message: '缺少代碼' };

            if (inputElement) inputElement.value = normalizedCode;
            if (buttonElement) {
                buttonElement.disabled = true;
                buttonElement.textContent = '驗證中...';
            }
            if (statusElement) statusElement.classList.add('hidden');

            try {
                const verifyPromoCode = httpsCallable(functions, 'verifyPromoCode');
                const result = await verifyPromoCode({ promoCode: normalizedCode });
                
                if (result.data && result.data.success) {
                    const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
                    const resolvedItemId = await resolvePromoTargetItemId(cart, result.data.courseId);
                    if (!resolvedItemId) {
                        throw new Error('此代碼對應的課程/單元不在目前購物車中');
                    }
                    if (targetItemId && resolvedItemId !== targetItemId) {
                        throw new Error('此推薦碼不屬於目前這個課程項目');
                    }

                    const finalItemId = targetItemId || resolvedItemId;

                    const existingItem = cart[finalItemId] || {};
                    cart[finalItemId] = {
                        ...existingItem,
                        promoCode: normalizedCode,
                        referralTutor: result.data.tutor,
                        referralTutorName: result.data.tutorName || result.data.tutor,
                        sourceUnitId: existingItem.sourceUnitId || result.data.courseId || null
                    };
                    localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
                    renderCartItems();

                    if (statusElement) {
                        statusElement.textContent = `✅ 已套用：${result.data.tutorName || result.data.tutor}`;
                        statusElement.className = 'item-promo-status mt-2 text-sm text-green-600 font-bold';
                    }
                    return {
                        success: true,
                        tutor: result.data.tutor,
                        tutorName: result.data.tutorName || result.data.tutor,
                        courseId: result.data.courseId || '',
                        itemId: finalItemId
                    };
                } else {
                    throw new Error(result.data.message || '無效的代碼');
                }
            } catch (err) {
                if (statusElement) {
                    statusElement.textContent = `❌ ${err.message}`;
                    statusElement.className = 'item-promo-status mt-2 text-sm text-red-600';
                }
                return { success: false, message: err.message };
            } finally {
                if (statusElement && (!silent || statusElement.textContent)) {
                    statusElement.classList.remove('hidden');
                }
                if (buttonElement) {
                    buttonElement.disabled = false;
                    buttonElement.textContent = '套用代碼';
                }
            }
        }

        async function hydrateCartFromInviteLink() {
            const url = new URL(window.location.href);
            const params = url.searchParams;
            if (params.get('action') !== 'addInviteItem') return;

            const courseId = params.get('courseId');
            const unitId = params.get('unitId') || courseId;
            const promoCode = (params.get('promoCode') || '').trim().toUpperCase();
            const fallbackName = params.get('courseName') || courseId;
            const fallbackPrice = parseInt(params.get('coursePrice') || '0', 10) || 0;
            const fallbackPhysical = params.get('isPhysical') === 'true';

            if (!courseId) {
                setPrefillStatus('推薦連結缺少課程資訊，無法自動加入購物車。', 'error');
                return;
            }

            let courseMeta = null;
            try {
                const lessonsResponse = await getLessonsMetadata({});
                const lessons = lessonsResponse.data?.lessons || [];
                courseMeta = lessons.find(lesson => lesson.courseId === courseId) ||
                    lessons.find(lesson => Array.isArray(lesson.courseUnits) && lesson.courseUnits.includes(unitId)) ||
                    null;
            } catch (error) {
                console.warn('Failed to fetch lessons metadata for invite link:', error);
            }

            const productName = courseMeta?.title || courseMeta?.courseName || fallbackName;
            const productPrice = parseInt(courseMeta?.price ?? fallbackPrice, 10) || 0;
            const isPhysical = courseMeta?.isPhysical === true || fallbackPhysical;
            const itemAdded = addCartItem(courseId, productName, productPrice, isPhysical, {
                unitId,
                sourceUnitId: unitId
            });

            renderCartItems();
            checkPhysicalItems();

            let statusMessage = itemAdded
                ? `已將「${productName}」加入購物車，您可以直接前往結帳。`
                : `「${productName}」原本已在購物車中，已保留現有品項。`;

            if (promoCode) {
                const promoResult = await applyPromoCode(promoCode, { silent: false, keepEditable: false });
                if (promoResult.success) {
                    statusMessage += ` 已自動套用老師推薦代碼 ${promoCode}。`;
                } else {
                    statusMessage += ` 但推薦代碼 ${promoCode} 驗證失敗。`;
                }
            }

            setPrefillStatus(statusMessage, 'success');

            [
                'action', 'courseId', 'unitId', 'promoCode',
                'courseName', 'coursePrice', 'isPhysical'
            ].forEach(key => params.delete(key));
            history.replaceState({}, '', `${url.pathname}${params.toString() ? `?${params.toString()}` : ''}`);
        }

        // ===============================================
        // B. 身份驗證邏輯
        // ===============================================

        async function handleLogin() {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("登入失敗:", error);
            }
        }

        async function handleLogout() {
            await signOut(auth);
            onAuthStateChanged(auth, () => { });
        }

        onAuthStateChanged(auth, (user) => {
            const userDisplay = document.getElementById('user-display');
            const loginBtn = document.getElementById('login-btn');

            if (user) {
                userDisplay.textContent = `您好, ${user.displayName || user.email}`;
                loginBtn.textContent = '登出';
                loginBtn.onclick = handleLogout;
            } else {
                userDisplay.textContent = '訪客模式';
                loginBtn.textContent = '登入 / 註冊';
                loginBtn.onclick = handleLogin;
            }
        });

        hydrateCartFromInviteLink();

        // ===============================================
        // C. 付款按鈕邏輯 (已針對新金流修正)
        // ===============================================

        checkoutBtn.addEventListener('click', () => {
            const totalText = cartTotalElement.textContent.replace(/,/g, '').trim();
            const total = parseInt(totalText);

            if (total <= 0) {
                alert("購物車為空，無法結帳。");
                return;
            }

            if (!auth.currentUser) {
                alert("請先登入才能進行付款！請點擊右上角按鈕登入。");
                return;
            }

            const cartItems = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            const user = auth.currentUser;

            // 呼叫處理新金流 (藍新) 的函式
            handlePaymentCheckout(user, total, cartItems);
        });

        // ... (前面的程式碼不變)

        /**
         * 處理付款結帳流程 (綠界版)
         */
        async function handlePaymentCheckout(user, total, cartItems) {

            // [NEW] 驗證實體商品欄位
            const hasPhysical = checkPhysicalItems();
            let logisticsInfo = null;

            if (hasPhysical) {
                const rName = receiverNameInput.value.trim();
                const rPhone = receiverPhoneInput.value.trim();
                const sId = storeIdInput.value;

                if (!rName || !rPhone || !sId) {
                    alert('請完整填寫收件人姓名、手機並選擇取貨門市！');
                    return;
                }
                logisticsInfo = {
                    receiverName: rName,
                    receiverPhone: rPhone,
                    storeId: sId,
                    storeName: storeNameInput.value,
                    storeAddress: storeAddressInput.value
                };
            }

            checkoutBtn.disabled = true;
            checkoutBtn.textContent = '🔒 正在連接綠界金流...';

            try {
                const response = await initiatePayment({
                    amount: total,
                    userId: user.uid,
                    cartDetails: cartItems,
                    logistics: logisticsInfo,
                    promoCode: null,
                    referralTutor: DEFAULT_MENTOR,
                    // 設定交易完成後的返回網址
                    returnUrl: window.location.origin + '/payment-return.html'
                });

                const data = response.data;

                if (data && data.paymentParams) {
                    console.log("取得綠界參數成功，正在跳轉...");
                    checkoutBtn.textContent = '🚀 前往付款頁面...';

                    // 執行綠界表單提交
                    submitECPayForm(data.paymentParams, data.apiUrl);
                } else {
                    throw new Error('無法取得交易參數。');
                }

            } catch (error) {
                console.error("結帳失敗:", error);
                alert(`結帳失敗：${error.message}`);
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = '💳 前往付款';
            }
        }

        /**
         * 建立並送出綠界 (ECPay) 表單
         */
        function submitECPayForm(params, apiUrl) {
            const form = document.createElement('form');
            form.method = 'post';
            form.action = apiUrl; // 綠界的 API 網址

            // 將後端回傳的所有參數轉為 hidden input
            for (const key in params) {
                if (params.hasOwnProperty(key)) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = params[key];
                    form.appendChild(input);
                }
            }

            paymentFormContainer.appendChild(form);
            form.submit();
        }
    </script>
</body>
