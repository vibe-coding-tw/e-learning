    <script type="module">
        // 1. 匯入必要的 Firebase 函式
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";

        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
        import { firebaseConfig, connectFirebaseEmulators } from "./js/firebase-local.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app, 'asia-east1');
        connectFirebaseEmulators({ auth, db, functions });

        // 修改為通用的付款請求 Function (後端需配合修改)
        const initiatePayment = httpsCallable(functions, 'initiatePayment');
        const getLessonsMetadata = httpsCallable(functions, 'getLessonsMetadata');
        let lessonsCache = null;

        // 您的商店代號 (公開資訊可放在前端)
        const MERCHANT_ID = "3271550";
        // 注意：HashKey 和 HashIV 請務必設定在 Firebase Cloud Functions 的環境變數中，不要寫在這裡！

        // ===============================================
        // A. 購物車項目渲染邏輯
        // ===============================================

        const unpaidItemsContainer = document.getElementById('unpaid-items');
        const emptyMsg = document.getElementById('empty-cart-msg');
        const cartTotalElement = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('checkout-btn');
        const paymentFormContainer = document.getElementById('payment-form-container');
        const cartPrefillStatus = document.getElementById('cart-prefill-status');
        const pricingApi = window.vibePricing || {
            resolveCartPrice(item = {}, locale = "zh-TW") {
                const currency = String(item.currency || item.price_currency || "").toUpperCase() || (String(locale || "").startsWith("en") ? "USD" : "TWD");
                return { amount: Number(item.price || 0), currency };
            },
            formatPrice(priceEntry = {}, locale = "zh-TW") {
                const amount = Number(priceEntry?.amount ?? priceEntry ?? 0);
                const currency = priceEntry?.currency || (String(locale || "").startsWith("en") ? "USD" : "TWD");
                if (!amount) return String(locale || "").startsWith("en") ? "Free" : "免費";
                return `${currency} ${amount.toLocaleString()}`;
            }
        };

        function removeFromCart(productId) {
            let cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            delete cart[productId];
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            renderCartItems();
        }

        function normalizeId(id) {
            if (!id) return '';
            return id.trim().replace(/\.html$/, '');
        }

        function findCartItemIdForPromo(cart, targetCourseId = '', targetUnitId = '') {
            if (!cart || typeof cart !== 'object') return null;
            
            const normalizedTargetCourseId = normalizeId(targetCourseId);
            const normalizedTargetUnitId = normalizeId(targetUnitId || targetCourseId);

            // 1. Direct Course ID Match
            if (normalizedTargetCourseId && cart[normalizedTargetCourseId]) return normalizedTargetCourseId;

            // 2. Iterate and match normalized unit identifiers
            return Object.keys(cart).find(itemId => {
                const item = cart[itemId] || {};
                const itemUnitId = normalizeId(item.unitId);
                const itemSourceUnitId = normalizeId(item.sourceUnitId);
                const itemProductId = normalizeId(itemId);

                return itemUnitId === normalizedTargetUnitId || 
                       itemSourceUnitId === normalizedTargetUnitId ||
                       itemProductId === normalizedTargetUnitId ||
                       itemProductId === normalizedTargetCourseId;
            }) || null;
        }

        async function getLessonsList() {
            if (Array.isArray(lessonsCache)) return lessonsCache;
            const response = await getLessonsMetadata({});
            lessonsCache = response.data?.lessons || [];
            return lessonsCache;
        }

        async function resolveReferralTargetItemId(cart, referralCourseId = '') {
            const normalizedReferralId = normalizeId(referralCourseId);
            let targetItemId = findCartItemIdForPromo(cart, normalizedReferralId, normalizedReferralId);
            if (targetItemId) return targetItemId;

            const lessons = await getLessonsList();
            const parentCourse = lessons.find(lesson => {
                const units = (Array.isArray(lesson.courseUnits) ? lesson.courseUnits : []).map(u => normalizeId(u));
                return units.includes(normalizedReferralId) ||
                    normalizeId(lesson.courseId) === normalizedReferralId ||
                    normalizeId(lesson.id) === normalizedReferralId;
            });

            if (parentCourse) {
                const parentCourseId = parentCourse.courseId || parentCourse.id;
                if (parentCourseId && cart[parentCourseId]) {
                    return parentCourseId;
                }
            }

            return null;
        }

        function extractAssignmentInviteCandidates(urlConfig) {
            const out = [];
            const seen = new Set();

            function walk(node) {
                if (!node) return;
                if (typeof node === 'string') {
                    const normalized = normalizeAssignmentInviteUrl(node);
                    if (normalized && !seen.has(normalized)) {
                        seen.add(normalized);
                        out.push(normalized);
                    }
                    return;
                }
                if (typeof node !== 'object') return;
                Object.values(node).forEach(walk);
            }

            walk(urlConfig);
            return out;
        }

        function getCartItemUnitCandidates(itemId, item = {}, lessons = []) {
            const seeds = [
                normalizeId(item.unitId || ''),
                normalizeId(item.sourceUnitId || ''),
                normalizeId(itemId || '')
            ].filter(Boolean);

            const foundUnits = new Set(seeds);
            const foundCourseIds = new Set();

            for (const lesson of lessons) {
                const courseId = normalizeId(lesson?.courseId || '');
                const lessonId = normalizeId(lesson?.id || '');
                const units = (Array.isArray(lesson?.courseUnits) ? lesson.courseUnits : []).map(u => normalizeId(u));
                const hits = seeds.some(seed => seed === courseId || seed === lessonId || units.includes(seed));
                if (!hits) continue;

                if (courseId) foundCourseIds.add(courseId);
                if (lessonId) foundCourseIds.add(lessonId);
                units.forEach(u => u && foundUnits.add(u));
            }

            foundCourseIds.forEach(cid => foundUnits.add(cid));
            return Array.from(foundUnits);
        }

        async function isKnownInviteForCartItem(inviteUrl, targetItemId) {
            const normalizedInvite = normalizeAssignmentInviteUrl(inviteUrl);
            if (!isAssignmentInviteUrl(normalizedInvite)) return false;

            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            const targetItem = cart[targetItemId] || {};
            const lessons = await getLessonsList();
            const unitCandidates = getCartItemUnitCandidates(targetItemId, targetItem, lessons);
            if (unitCandidates.length === 0) return false;

            for (const lesson of lessons) {
                const urlMap = lesson?.assignmentUrlMap || lesson?.assignmentUrls || {};
                for (const unitId of unitCandidates) {
                    const cfg = urlMap[unitId] || urlMap[`${unitId}.html`] || null;
                    const candidates = extractAssignmentInviteCandidates(cfg);
                    if (candidates.includes(normalizedInvite)) return true;
                }
            }
            return false;
        }

        function addCartItem(productId, productName, productPrice, isPhysical, options = {}) {
            let cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            if (cart[productId]) return false;

            cart[productId] = {
                name: productName,
                price: Number(productPrice) || 0,
                currency: options.currency || options.priceCurrency || '',
                price_currency: options.currency || options.priceCurrency || '',
                quantity: 1,
                isPhysical: !!isPhysical,
                unitId: options.unitId || null,
                sourceUnitId: options.sourceUnitId || null,
                referralLink: options.referralLink || options.promoCode || null,
                referredTutorEmail: options.referredTutorEmail || options.referralTutor || null,
                referredTutorName: options.referredTutorName || options.referralTutorName || null
            };
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            return true;
        }

        function setPrefillStatus(message, tone = 'info') {
            if (!cartPrefillStatus) return;
            const toneClass = tone === 'success'
                ? 'bg-green-50 border-green-200 text-green-700'
                : tone === 'error'
                    ? 'bg-red-50 border-red-200 text-red-700'
                    : 'bg-blue-50 border-blue-200 text-blue-700';
            cartPrefillStatus.className = `rounded-lg border px-4 py-3 mb-4 text-sm ${toneClass}`;
            cartPrefillStatus.textContent = message;
            cartPrefillStatus.classList.remove('hidden');
        }

        function renderCartItems() {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            let total = 0;
            let hasPhysical = false;
            let currencyMismatch = false;
            let expectedCurrency = '';

            unpaidItemsContainer.innerHTML = '';

            if (Object.keys(cart).length === 0) {
                emptyMsg.style.display = 'block';
                cartTotalElement.textContent = '0';
                checkoutBtn.disabled = true;
                return;
            } else {
                emptyMsg.style.display = 'none';
            }

            const storedLocale = localStorage.getItem('vibe_user_locale') || '';
            const isEn = storedLocale.startsWith('en');
            expectedCurrency = isEn ? 'USD' : 'TWD';
            const cartTotalLabel = document.querySelector('[data-i18n="cart_total_label"]');
            if (cartTotalLabel) {
                cartTotalLabel.textContent = isEn
                    ? `Total (${expectedCurrency}):`
                    : `總金額 (${expectedCurrency}):`;
            }

            for (const [id, item] of Object.entries(cart)) {
                const resolvedPrice = pricingApi.resolveCartPrice(item, isEn ? 'en' : 'zh-TW');
                const price = Number(resolvedPrice.amount || 0);
                const itemCurrency = String(resolvedPrice.currency || '').toUpperCase();
                if (itemCurrency && expectedCurrency && itemCurrency !== expectedCurrency) {
                    currencyMismatch = true;
                }
                const quantity = parseInt(item.quantity) || 1;
                const itemTotal = price * quantity;
                total += itemTotal;
                if (item.isPhysical) {
                    hasPhysical = true;
                }

                const itemDiv = document.createElement('div');
                itemDiv.className = 'bg-white/50 p-6 rounded-[2rem] border border-slate-200 shadow-sm mb-4';
                const codeLabel = window.t('cart_item_code', '產品代號: {id}').replace('{id}', id);
                const removeLabel = window.t('cart_item_remove', '移除');
                const currencyUnit = itemCurrency || window.t('currency_unit', isEn ? 'USD' : '元');
                itemDiv.innerHTML = `
                    <div class="flex items-start justify-between gap-4">
                        <div class="min-w-0 flex-1">
                            <p class="font-semibold text-gray-800">${item.name}</p>
                            <p class="text-xs text-gray-500">${codeLabel}</p>
                        </div>
                        <div class="text-right shrink-0">
                             <p class="font-bold text-indigo-600">${itemTotal.toLocaleString()} ${currencyUnit}</p>
                             <button class="remove-cart-item-btn text-sm text-rose-500 hover:text-rose-600 mt-2" data-product-id="${id}">${removeLabel}</button>
                        </div>
                    </div>
                `;
                unpaidItemsContainer.appendChild(itemDiv);
            }

            let shippingFeeText = '';
            if (hasPhysical) {
                const shippingFee = isEn ? 15 : 450;
                total += shippingFee;
                const feeUnit = isEn ? 'USD' : 'TWD';
                shippingFeeText = ` (含運費 ${shippingFee.toLocaleString()} ${feeUnit})`;
            }

            const mainCurrencyUnit = isEn ? 'USD' : 'TWD';
            cartTotalElement.textContent = `${mainCurrencyUnit} ${total.toLocaleString()}${shippingFeeText}`;
            checkoutBtn.disabled = (total === 0) || currencyMismatch;
            if (currencyMismatch) {
                cartPrefillStatus.textContent = isEn
                    ? 'This cart contains mixed currencies. Please keep a single region/language price set.'
                    : '購物車包含不同幣別的商品，請改用同一地區的價格設定。';
                cartPrefillStatus.className = 'rounded-lg border px-4 py-3 mb-4 text-sm bg-amber-50 border-amber-200 text-amber-700';
                cartPrefillStatus.classList.remove('hidden');
            }

            document.querySelectorAll('.remove-cart-item-btn').forEach(button => {
                button.addEventListener('click', (event) => {
                    removeFromCart(event.currentTarget.dataset.productId);
                });
            });

        }

        renderCartItems();

        // ===============================================
        // A-2. 物流與實體商品邏輯 (新增)
        // ===============================================
        const shippingSection = document.getElementById('shipping-info-section');
        const receiverNameInput = document.getElementById('receiver-name');
        const receiverPhoneInput = document.getElementById('receiver-phone');
        const storeDisplay = document.getElementById('store-display');
        const storeIdInput = document.getElementById('store-id');
        const storeNameInput = document.getElementById('store-name');
        const storeAddressInput = document.getElementById('store-address');

        // 1. 檢查是否包含實體商品
        function checkPhysicalItems() {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            let hasPhysical = false;
            for (const item of Object.values(cart)) {
                if (item.isPhysical) {
                    hasPhysical = true;
                    break;
                }
            }

            if (hasPhysical) {
                shippingSection.classList.remove('hidden');
                
                const storedLocale = localStorage.getItem('vibe_user_locale') || '';
                const isEn = storedLocale.startsWith('en');
                const cvsContainer = document.getElementById('cvs-shipping-container');
                const intlContainer = document.getElementById('intl-shipping-container');
                
                if (isEn) {
                    if (cvsContainer) cvsContainer.classList.add('hidden');
                    if (intlContainer) intlContainer.classList.remove('hidden');
                } else {
                    if (cvsContainer) cvsContainer.classList.remove('hidden');
                    if (intlContainer) intlContainer.classList.add('hidden');
                }
            } else {
                shippingSection.classList.add('hidden');
            }
            return hasPhysical;
        }

        // 頁面載入時檢查
        const hasPhysicalGoods = checkPhysicalItems();

        // 2. 處理從 Map 返回的參數
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            if (action === 'storeSelected') {
                const sId = urlParams.get('storeId');
                const sName = urlParams.get('storeName');
                const sAddr = urlParams.get('address');

                if (sId) {
                    storeIdInput.value = sId;
                    storeNameInput.value = sName;
                    storeAddressInput.value = sAddr;
                    storeDisplay.textContent = `[${sId}] ${sName} - ${sAddr}`;
                    storeDisplay.classList.add('text-green-700', 'font-bold');

                    // 恢復顯示 (因為重整後 JS 會重新執行 checkPhysicalItems)
                    // 但我們需要確保 cart 還有東西
                    checkPhysicalItems();
                }
            }
        });

        // 3. 開啟電子地圖 (修正版：從後端取得加密參數)
        window.openMap = async function (logisticsSubType) {
            try {
                // 呼叫後端 Function 取得參數
                const getLogisticsMapParams = httpsCallable(functions, 'getLogisticsMapParams');
                const response = await getLogisticsMapParams({
                    logisticsSubType: logisticsSubType,
                    isCollection: 'N'
                });

                const data = response.data;
                if (!data || !data.params) {
                    throw new Error('無法取得物流參數');
                }

                const params = data.params;
                const apiUrl = data.apiUrl || 'https://logistics.ecpay.com.tw/Express/map';

                // 建立 Form POST 到綠界 Map
                const mapForm = document.createElement('form');
                mapForm.method = 'POST';
                mapForm.action = apiUrl;

                for (const key in params) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = params[key];
                    mapForm.appendChild(input);
                }

                document.body.appendChild(mapForm);
                mapForm.submit();
            } catch (error) {
                console.error("開啟地圖失敗:", error);
                alert(window.t('alert_map_failed', "開啟電子地圖失敗，請稍後再試。"));
            }
        };

        // ===============================================
        // B-2. 老師作業連結 / 推薦連結邏輯
        // ===============================================
        const DEFAULT_MENTOR = 'info@vibe-coding.tw';
        const ASSIGNMENT_INVITE_RE = /^https:\/\/classroom\.github\.com\/a\/[A-Za-z0-9_-]+\/?$/;

        function normalizeAssignmentInviteUrl(raw = '') {
            try {
                const url = new URL(String(raw).trim());
                if (url.hostname !== 'classroom.github.com') return String(raw).trim();
                return `${url.origin}${url.pathname}`.replace(/\/+$/, '');
            } catch (_) {
                return String(raw).trim();
            }
        }

        function isAssignmentInviteUrl(raw = '') {
            return ASSIGNMENT_INVITE_RE.test(String(raw).trim());
        }

        async function applyReferralLink(code, options = {}) {
            const lowerCode = (code || '').toLowerCase();
            const isUrl = lowerCode.includes('github.com/classroom/') || lowerCode.includes('classroom.github.com/');
            // URLs should NOT be forced to uppercase
            const normalizedCode = isUrl ? normalizeAssignmentInviteUrl(code.trim()) : (code || '').trim().toUpperCase();

            const {
                silent = false,
                keepEditable = false,
                targetItemId = null,
                inputElement = null,
                statusElement = null,
                buttonElement = null
            } = options;

            if (!normalizedCode) {
                if (targetItemId && inputElement) {
                    const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
                    inputElement.value = cart[targetItemId]?.referralLink || '';
                }
                if (statusElement) {
                    statusElement.textContent = window.t('referral_unchanged', '未變更綁定：可先留白，或輸入有效作業連結再套用。');
                    statusElement.className = 'item-promo-status mt-2 text-sm text-slate-500';
                    statusElement.classList.remove('hidden');
                }
                return { success: true, message: 'unchanged' };
            }
            if (isUrl) {
                const normalizedInvite = normalizeAssignmentInviteUrl(normalizedCode);
                if (!isAssignmentInviteUrl(normalizedInvite)) {
                    const msg = window.t('referral_url_invalid', '連結格式錯誤，請使用有效的作業連結。');
                    if (statusElement) {
                        statusElement.textContent = `❌ ${msg}`;
                        statusElement.className = 'item-promo-status mt-2 text-sm text-red-600';
                        statusElement.classList.remove('hidden');
                    }
                    return { success: false, message: msg };
                }
                // [V16.2] Client-side pre-check removed to allow dynamic referral_links lookup via Cloud Function
                // This prevents issues where new tutor links aren't yet in the static metadata_lessons cache.

            }

            if (inputElement) inputElement.value = normalizedCode;
            if (buttonElement) {
                buttonElement.disabled = true;
                buttonElement.textContent = window.t('referral_verification_loading', '驗證中...');
            }
            if (statusElement) statusElement.classList.add('hidden');

            try {
                const verifyReferralLink = httpsCallable(functions, 'verifyReferralLink');
                
                // [V15.1] Pass cartItems for qualification check
                const result = await verifyReferralLink({ 
                    referralLink: normalizedCode,
                    cartItems: targetItemId ? [{ id: targetItemId }] : []
                });
                
                if (result.data && result.data.success) {
                    const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
                    const resolvedItemId = await resolveReferralTargetItemId(cart, result.data.courseId);
                    if (!resolvedItemId) {
                        throw new Error(window.t('referral_item_not_in_cart', '此老師作業連結對應的課程/單元不在目前購物車中'));
                    }
                    if (targetItemId && resolvedItemId !== targetItemId) {
                        throw new Error(window.t('referral_item_mismatch', '此老師作業連結不屬於目前這個課程項目'));
                    }

                    const finalItemId = targetItemId || resolvedItemId;

                    const existingItem = cart[finalItemId] || {};
                    cart[finalItemId] = {
                        ...existingItem,
                        referralLink: normalizedCode,
                        referredTutorEmail: result.data.referredTutorEmail,
                        referredTutorName: result.data.referredTutorName || result.data.referredTutorEmail,
                        sourceUnitId: existingItem.sourceUnitId || result.data.courseId || null
                    };
                    localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
                    renderCartItems();

                    if (statusElement) {
                        const successMsg = window.t('referral_applied_success', '✅ 已套用老師作業連結：{name}').replace('{name}', result.data.referredTutorName || result.data.referredTutorEmail);
                        statusElement.textContent = successMsg;
                        statusElement.className = 'item-promo-status mt-2 text-sm text-green-600 font-bold';
                    }
                    return {
                        success: true,
                        tutor: result.data.referredTutorEmail,
                        tutorName: result.data.referredTutorName || result.data.referredTutorEmail,
                        courseId: result.data.courseId || '',
                        itemId: finalItemId
                    };
                } else {
                    throw new Error(result.data.message || '無效的代碼');
                }
            } catch (err) {
                if (statusElement) {
                    statusElement.textContent = `❌ ${err.message}`;
                    statusElement.className = 'item-promo-status mt-2 text-sm text-red-600';
                }
                return { success: false, message: err.message };
            } finally {
                if (statusElement && (!silent || statusElement.textContent)) {
                    statusElement.classList.remove('hidden');
                }
                if (buttonElement) {
                    buttonElement.disabled = false;
                    buttonElement.textContent = window.t('referral_btn_apply', '套用連結');
                }
            }
        }

        async function hydrateCartFromInviteLink() {
            const url = new URL(window.location.href);
            const params = url.searchParams;
            if (params.get('action') !== 'addInviteItem') return;

            const courseId = params.get('courseId');
            const unitId = params.get('unitId') || courseId;
            const rawReferral = (params.get('referralLink') || params.get('promoCode') || '').trim();
            const isUrl = rawReferral.toLowerCase().includes('github.com/classroom/') || rawReferral.toLowerCase().includes('classroom.github.com/');
            const referralLink = isUrl ? normalizeAssignmentInviteUrl(rawReferral) : rawReferral;
            const fallbackName = params.get('courseName') || courseId;
            const fallbackPrice = parseInt(params.get('coursePrice') || '0', 10) || 0;
            const fallbackPhysical = params.get('isPhysical') === 'true';

            if (!courseId) {
                setPrefillStatus(window.t('prefill_invite_missing', '推薦連結缺少課程資訊，無法自動加入購物車。'), 'error');
                return;
            }

            let courseMeta = null;
            try {
                const lessonsResponse = await getLessonsMetadata({});
                const lessons = lessonsResponse.data?.lessons || [];
                courseMeta = lessons.find(lesson => lesson.courseId === courseId) ||
                    lessons.find(lesson => Array.isArray(lesson.courseUnits) && lesson.courseUnits.includes(unitId)) ||
                    null;
            } catch (error) {
                console.warn('Failed to fetch lessons metadata for invite link:', error);
            }

            const productName = courseMeta?.title || courseMeta?.courseName || fallbackName;
            const priceEntry = pricingApi.resolveCartPrice(
                courseMeta && typeof courseMeta === 'object'
                    ? courseMeta
                    : { price: fallbackPrice, currency: localStorage.getItem('vibe_user_locale')?.startsWith('en') ? 'USD' : 'TWD' },
                localStorage.getItem('vibe_user_locale')?.startsWith('en') ? 'en' : 'zh-TW'
            );
            const productPrice = Number(priceEntry?.amount ?? fallbackPrice) || 0;
            const productCurrency = String(priceEntry?.currency || '').toUpperCase();
            const isPhysical = courseMeta?.isPhysical === true || fallbackPhysical;
            const itemAdded = addCartItem(courseId, productName, productPrice, isPhysical, {
                unitId,
                sourceUnitId: unitId,
                currency: productCurrency,
                priceCurrency: productCurrency
            });

            renderCartItems();
            checkPhysicalItems();

            let statusMessage = itemAdded
                ? window.t('prefill_invite_added', '已將「{name}」加入購物車，您可以直接前往結帳。').replace('{name}', productName)
                : window.t('prefill_invite_exists', '「{name}」原本已在購物車中，已保留現有品項。').replace('{name}', productName);

            if (referralLink) statusMessage += window.t('prefill_invite_referral_ignored', '（已忽略推薦碼/連結參數，綁定導師請在作業頁輸入 Promotion code）');

            setPrefillStatus(statusMessage, 'success');

            [
                'action', 'courseId', 'unitId', 'referralLink', 'promoCode',
                'courseName', 'coursePrice', 'isPhysical'
            ].forEach(key => params.delete(key));
            history.replaceState({}, '', `${url.pathname}${params.toString() ? `?${params.toString()}` : ''}`);
        }

        // ===============================================
        // B. 身份驗證邏輯
        // ===============================================

        async function handleLogin() {
            if (typeof window.vibeStartGoogleLogin === 'function') {
                await window.vibeStartGoogleLogin();
                return;
            }
            const provider = new GoogleAuthProvider();
            try {
                // Try popup login first in all environments. This is much more reliable
                // on custom domains under modern browser privacy restrictions (blocking third-party cookies).
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.warn("Google popup login failed or blocked, trying redirect...", error);
                try {
                    await signInWithRedirect(auth, provider);
                } catch (redirectError) {
                    console.error("Google redirect login failed:", redirectError);
                }
            }
        }

        async function handleLogout() {
            await signOut(auth);
            onAuthStateChanged(auth, () => { });
        }

        onAuthStateChanged(auth, (user) => {
            const userDisplay = document.getElementById('user-display');
            const loginBtn = document.getElementById('login-btn');

            if (user) {
                userDisplay.textContent = window.t('user_hello', '您好, {user}').replace('{user}', user.displayName || user.email);
                loginBtn.textContent = window.t('nav_logout', '登出');
                loginBtn.onclick = handleLogout;
            } else {
                userDisplay.textContent = window.t('user_guest', '訪客模式');
                loginBtn.textContent = window.t('nav_login', '登入 / 註冊');
                loginBtn.onclick = handleLogin;
            }
        });

        hydrateCartFromInviteLink();

        // ===============================================
        // C. 付款按鈕邏輯 (已針對新金流修正)
        // ===============================================

        checkoutBtn.addEventListener('click', () => {
            const cartItems = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            if (Object.keys(cartItems).length === 0) {
                alert(window.t('alert_cart_empty', "購物車為空，無法結帳。"));
                return;
            }

            if (!auth.currentUser) {
                alert(window.t('alert_login_required', "請先登入才能進行付款！請點擊右上角按鈕登入。"));
                return;
            }

            const user = auth.currentUser;
            handlePaymentCheckout(user, cartItems);
        });

        // ... (前面的程式碼不變)

        /**
         * 處理付款結帳流程 (雙通道版：綠界與 Stripe 路由)
         */
        async function handlePaymentCheckout(user, cartItems) {
            const storedLocale = localStorage.getItem('vibe_user_locale') || '';
            const isEn = storedLocale.startsWith('en');

            // [NEW] 驗證實體商品欄位
            const hasPhysical = checkPhysicalItems();
            let logisticsInfo = null;

            if (hasPhysical) {
                const rName = receiverNameInput.value.trim();
                const rPhone = receiverPhoneInput.value.trim();

                if (!rName || !rPhone) {
                    alert(window.t('alert_shipping_required', '請完整填寫收件人姓名與手機號碼！'));
                    return;
                }

                if (isEn) {
                    const country = document.getElementById('shipping-country').value;
                    const state = document.getElementById('shipping-state').value.trim();
                    const city = document.getElementById('shipping-city').value.trim();
                    const line1 = document.getElementById('shipping-line1').value.trim();
                    const zip = document.getElementById('shipping-zip').value.trim();
                    const line2 = document.getElementById('shipping-line2').value.trim();

                    if (!country || !city || !line1 || !zip) {
                        alert(window.t('alert_intl_address_required', 'Please fill in Country, City, Address Line 1, and ZIP code!'));
                        return;
                    }

                    logisticsInfo = {
                        receiverName: rName,
                        receiverPhone: rPhone,
                        isInternational: true,
                        address: {
                            country: country,
                            state: state,
                            city: city,
                            line1: line1,
                            line2: line2,
                            postalCode: zip
                        }
                    };
                } else {
                    const sId = storeIdInput.value;
                    if (!sId) {
                        alert(window.t('alert_shipping_required', '請選擇取貨門市！'));
                        return;
                    }
                    logisticsInfo = {
                        receiverName: rName,
                        receiverPhone: rPhone,
                        storeId: sId,
                        storeName: storeNameInput.value,
                        storeAddress: storeAddressInput.value
                    };
                }
            }

            // 計算結帳金額
            let calculatedTotal = 0;
            let checkoutCurrency = isEn ? 'USD' : 'TWD';
            for (const item of Object.values(cartItems)) {
                const resolvedPrice = pricingApi.resolveCartPrice(item, isEn ? 'en' : 'zh-TW');
                const price = Number(resolvedPrice.amount || 0);
                const itemCurrency = String(resolvedPrice.currency || '').toUpperCase();
                if (itemCurrency && checkoutCurrency && itemCurrency !== checkoutCurrency) {
                    alert(isEn
                        ? 'Mixed currencies are not supported in a single checkout.'
                        : '單筆結帳不支援混合幣別，請先整理購物車。');
                    checkoutBtn.disabled = false;
                    checkoutBtn.textContent = window.t('checkout_btn_pay', '💳 前往付款');
                    return;
                }
                const quantity = parseInt(item.quantity) || 1;
                calculatedTotal += price * quantity;
            }
            if (hasPhysical) {
                calculatedTotal += isEn ? 15 : 450;
            }

            checkoutBtn.disabled = true;
            checkoutBtn.textContent = isEn 
                ? '🔒 Connecting to payment gateway...' 
                : window.t('checkout_btn_ecpay', '🔒 正在連接綠界金流...');

            try {
                const response = await initiatePayment({
                    amount: calculatedTotal,
                    userId: user.uid,
                    cartDetails: cartItems,
                    logistics: logisticsInfo,
                    referralLink: null,
                    referredTutorEmail: null,
                    gateway: isEn ? "STRIPE" : "ECPAY",
                    locale: isEn ? "en" : "zh-TW",
                    // 設定交易完成後的返回網址
                    returnUrl: window.location.origin + '/payment-return.html'
                });

                const data = response.data;

                if (data && data.result) {
                    const resData = data.result;
                    if (resData.gateway === "STRIPE") {
                        console.log("Stripe Checkout URL received, redirecting...");
                        checkoutBtn.textContent = '🚀 Redirecting to Stripe...';
                        window.location.href = resData.sessionUrl;
                    } else if (resData.paymentParams) {
                        console.log("取得綠界參數成功，正在跳轉...");
                        checkoutBtn.textContent = window.t('checkout_btn_redirect', '🚀 前往付款頁面...');
                        submitECPayForm(resData.paymentParams, resData.apiUrl);
                    } else {
                        throw new Error('無法取得交易參數。');
                    }
                } else {
                    throw new Error('金流伺服器回傳格式不正確。');
                }

            } catch (error) {
                console.error("結帳失敗:", error);
                alert(window.t('alert_checkout_failed', '結帳失敗：') + error.message);
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = window.t('checkout_btn_pay', '💳 前往付款');
            }
        }

        /**
         * 建立並送出綠界 (ECPay) 表單
         */
        function submitECPayForm(params, apiUrl) {
            const form = document.createElement('form');
            form.method = 'post';
            form.action = apiUrl; // 綠界的 API 網址

            // 將後端回傳的所有參數轉為 hidden input
            for (const key in params) {
                if (params.hasOwnProperty(key)) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = params[key];
                    form.appendChild(input);
                }
            }

            paymentFormContainer.appendChild(form);
            form.submit();
        }
    </script>
