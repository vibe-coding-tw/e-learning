<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding 待結帳項目</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    <div id="nav-placeholder"></div>
    <script src="js/nav-component.js?v=3"></script>
    <script>
        renderNav('.', { showAuth: true });
    </script>

    <main class="max-w-4xl mx-auto p-6">
        <section class="bg-white p-6 rounded-lg shadow-xl mb-10">
            <h2 class="text-3xl font-extrabold text-gray-800 border-b pb-4 mb-6">待結帳項目</h2>

            <div id="auth-error-message" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4"
                role="alert">
                <p class="font-bold">登入失敗通知</p>
                <p id="error-details">您的登入嘗試失敗，原因可能為瀏覽器阻擋。我們已切換到「頁面重新導向」方式，請重新點擊登入。</p>
            </div>

            <div id="unpaid-items" class="space-y-4">
            </div>
            <p id="empty-cart-msg" class="text-gray-500 italic text-center pt-4">購物車是空的！請回到課程頁面選購。</p>

            <div id="cart-summary" class="mt-8 pt-4 border-t-2 border-dashed border-gray-200">
                <div class="flex justify-between items-center text-2xl font-bold text-gray-800">
                    <span>總金額 (TWD):</span>
                    <span id="cart-total">0</span>
                </div>
                <div id="payment-form-container" class="hidden"></div>

                <!-- [NEW] Shipping Information Section -->
                <div id="shipping-info-section" class="hidden mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                    <h3 class="text-lg font-bold text-gray-800 mb-3">📦 收件與物流資訊 (實體商品必填)</h3>

                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">收件人姓名</label>
                            <input type="text" id="receiver-name"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2"
                                placeholder="請輸入真實姓名 (需核對證件)">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">收件人手機</label>
                            <input type="tel" id="receiver-phone"
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2"
                                placeholder="09xxxxxxxx">
                        </div>

                        <div class="pt-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">取貨門市</label>
                            <div id="store-display" class="bg-white p-3 border rounded-md mb-2 text-sm text-gray-600">
                                尚未選擇門市
                            </div>
                            <input type="hidden" id="store-id">
                            <input type="hidden" id="store-name">
                            <input type="hidden" id="store-address">

                            <div class="flex gap-2">
                                <button onclick="openMap('UNIMARTC2C')"
                                    class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">選擇
                                    7-11</button>
                                <button onclick="openMap('FAMIC2C')"
                                    class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">選擇
                                    全家</button>
                                <button onclick="openMap('HILIFEC2C')"
                                    class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">選擇
                                    萊爾富</button>
                                <button onclick="openMap('OKMARTC2C')"
                                    class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">選擇
                                    OK</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- [NEW] Promotion Code Section -->
                <div class="mt-6 p-4 bg-purple-50 border border-purple-200 rounded-lg">
                    <h3 class="text-lg font-bold text-gray-800 mb-3">🎟️ 優惠代碼 (或指導老師代碼)</h3>
                    <div class="flex gap-2">
                        <input type="text" id="promo-code"
                            class="flex-1 border-gray-300 rounded-md shadow-sm p-2 uppercase"
                            placeholder="請輸入代碼">
                        <button id="verify-promo-btn"
                            class="bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700 transition">
                            驗證
                        </button>
                    </div>
                    <p id="promo-status" class="mt-2 text-sm hidden"></p>
                </div>

                <button id="checkout-btn"
                    class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white text-lg py-3 rounded-lg disabled:opacity-50"
                    disabled>
                    💳 前往付款
                </button>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 py-8 border-t border-gray-700 mt-10">
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center space-x-6 mb-6 text-gray-400">
                <a href="prepare.html" class="hover:text-white">課前準備</a>
                <a href="started.html" class="hover:text-white">入門課程</a>
                <a href="basic.html" class="hover:text-white">基礎實作</a>
                <a href="advanced.html" class="hover:text-white">進階應用</a>
            </div>

            <div class="border-t border-gray-700 pt-6">
                <p class="text-gray-500 text-sm mb-2">&copy; 2025 Vibe Coding. All rights reserved.</p>
                <div class="flex flex-col md:flex-row justify-center items-center gap-2 md:gap-6 text-sm text-gray-400">
                    <span>營業人名稱：腳丫健康科技有限公司</span>
                    <span class="hidden md:inline">|</span>
                    <span>統一編號：80187668</span>
                    <span class="hidden md:inline">|</span>
                    <span>課程合作洽談：info@vibe-coding.tw</span>
                </div>
            </div>
        </div>
    </footer>



    <script type="module">
        // 1. 匯入必要的 Firebase 函式
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";

        // 2. Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyCO6Y6Pa7b7zbieJIErysaNF6-UqbT8KJw",
            authDomain: "e-learning-942f7.firebaseapp.com",
            projectId: "e-learning-942f7",
            storageBucket: "e-learning-942f7.firebasestorage.app",
            messagingSenderId: "878397058574",
            appId: "1:878397058574:web:28aaa07a291ee3baab165f"
        };

        // 3. 初始化 Firebase 服務
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const functions = getFunctions(app, 'asia-east1');

        // 修改為通用的付款請求 Function (後端需配合修改)
        const initiatePayment = httpsCallable(functions, 'initiatePayment');

        // 您的商店代號 (公開資訊可放在前端)
        const MERCHANT_ID = "3271550";
        // 注意：HashKey 和 HashIV 請務必設定在 Firebase Cloud Functions 的環境變數中，不要寫在這裡！

        // ===============================================
        // A. 購物車項目渲染邏輯
        // ===============================================

        const unpaidItemsContainer = document.getElementById('unpaid-items');
        const emptyMsg = document.getElementById('empty-cart-msg');
        const cartTotalElement = document.getElementById('cart-total');
        const checkoutBtn = document.getElementById('checkout-btn');
        const paymentFormContainer = document.getElementById('payment-form-container');

        function removeFromCart(productId) {
            let cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            delete cart[productId];
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            renderCartItems();
        }

        function renderCartItems() {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            let total = 0;

            unpaidItemsContainer.innerHTML = '';

            if (Object.keys(cart).length === 0) {
                emptyMsg.style.display = 'block';
                cartTotalElement.textContent = '0';
                checkoutBtn.disabled = true;
                return;
            } else {
                emptyMsg.style.display = 'none';
            }

            for (const [id, item] of Object.entries(cart)) {
                const price = parseFloat(item.price) || 0;
                const quantity = parseInt(item.quantity) || 1;
                const itemTotal = price * quantity;
                total += itemTotal;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex justify-between items-center bg-gray-50 p-3 rounded-md border';
                itemDiv.innerHTML = `
                    <div>
                        <p class="font-semibold text-gray-800">${item.name}</p>
                        <p class="text-xs text-gray-500">產品代號: ${id}</p>
                    </div>
                    <div class="text-right">
                         <p class="font-bold text-indigo-600">${itemTotal.toLocaleString()} 元</p>
                         <button class="remove-cart-item-btn" data-product-id="${id}">移除</button>
                    </div>
                `;
                unpaidItemsContainer.appendChild(itemDiv);
            }

            cartTotalElement.textContent = total.toLocaleString();
            checkoutBtn.disabled = (total === 0);

            document.querySelectorAll('.remove-cart-item-btn').forEach(button => {
                button.addEventListener('click', (event) => {
                    removeFromCart(event.currentTarget.dataset.productId);
                });
            });
        }

        renderCartItems();

        // ===============================================
        // A-2. 物流與實體商品邏輯 (新增)
        // ===============================================
        const shippingSection = document.getElementById('shipping-info-section');
        const receiverNameInput = document.getElementById('receiver-name');
        const receiverPhoneInput = document.getElementById('receiver-phone');
        const storeDisplay = document.getElementById('store-display');
        const storeIdInput = document.getElementById('store-id');
        const storeNameInput = document.getElementById('store-name');
        const storeAddressInput = document.getElementById('store-address');

        // 1. 檢查是否包含實體商品
        function checkPhysicalItems() {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            let hasPhysical = false;
            for (const item of Object.values(cart)) {
                if (item.isPhysical) {
                    hasPhysical = true;
                    break;
                }
            }

            if (hasPhysical) {
                shippingSection.classList.remove('hidden');
            } else {
                shippingSection.classList.add('hidden');
            }
            return hasPhysical;
        }

        // 頁面載入時檢查
        const hasPhysicalGoods = checkPhysicalItems();

        // 2. 處理從 Map 返回的參數
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            if (action === 'storeSelected') {
                const sId = urlParams.get('storeId');
                const sName = urlParams.get('storeName');
                const sAddr = urlParams.get('address');

                if (sId) {
                    storeIdInput.value = sId;
                    storeNameInput.value = sName;
                    storeAddressInput.value = sAddr;
                    storeDisplay.textContent = `[${sId}] ${sName} - ${sAddr}`;
                    storeDisplay.classList.add('text-green-700', 'font-bold');

                    // 恢復顯示 (因為重整後 JS 會重新執行 checkPhysicalItems)
                    // 但我們需要確保 cart 還有東西
                    checkPhysicalItems();
                }
            }
        });

        // 3. 開啟電子地圖 (修正版：從後端取得加密參數)
        window.openMap = async function (logisticsSubType) {
            try {
                // 呼叫後端 Function 取得參數
                const getLogisticsMapParams = httpsCallable(functions, 'getLogisticsMapParams');
                const response = await getLogisticsMapParams({
                    logisticsSubType: logisticsSubType,
                    isCollection: 'N'
                });

                const data = response.data;
                if (!data || !data.params) {
                    throw new Error('無法取得物流參數');
                }

                const params = data.params;
                const apiUrl = data.apiUrl || 'https://logistics.ecpay.com.tw/Express/map';

                // 建立 Form POST 到綠界 Map
                const mapForm = document.createElement('form');
                mapForm.method = 'POST';
                mapForm.action = apiUrl;

                for (const key in params) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = params[key];
                    mapForm.appendChild(input);
                }

                document.body.appendChild(mapForm);
                mapForm.submit();
            } catch (error) {
                console.error("開啟地圖失敗:", error);
                alert("開啟電子地圖失敗，請稍後再試。");
            }
        };

        // ===============================================
        // B-2. 優惠券 / 推薦代碼邏輯 (新增)
        // ===============================================
        const promoInput = document.getElementById('promo-code');
        const verifyPromoBtn = document.getElementById('verify-promo-btn');
        const promoStatus = document.getElementById('promo-status');
        const DEFAULT_MENTOR = 'info@vibe-coding.tw';
        let verifiedTutor = DEFAULT_MENTOR;

        verifyPromoBtn.addEventListener('click', async () => {
            const code = promoInput.value.trim().toUpperCase();
            if (!code) return;

            verifyPromoBtn.disabled = true;
            verifyPromoBtn.textContent = '驗證中...';
            promoStatus.classList.add('hidden');

            try {
                const verifyPromoCode = httpsCallable(functions, 'verifyPromoCode');
                const result = await verifyPromoCode({ promoCode: code });
                
                if (result.data && result.data.success) {
                    verifiedTutor = result.data.tutor;
                    promoStatus.textContent = `✅ 已套用：${result.data.tutorName || verifiedTutor} 的推薦`;
                    promoStatus.className = 'mt-2 text-sm text-green-600 font-bold';
                    promoInput.readOnly = true;
                    verifyPromoBtn.classList.add('hidden');
                } else {
                    throw new Error(result.data.message || '無效的代碼');
                }
            } catch (err) {
                promoStatus.textContent = `❌ ${err.message}`;
                promoStatus.className = 'mt-2 text-sm text-red-600';
                verifiedTutor = DEFAULT_MENTOR; // FALLBACK
            } finally {
                promoStatus.classList.remove('hidden');
                verifyPromoBtn.disabled = false;
                verifyPromoBtn.textContent = '驗證代碼';
            }
        });

        // ===============================================
        // B. 身份驗證邏輯
        // ===============================================

        async function handleLogin() {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("登入失敗:", error);
            }
        }

        async function handleLogout() {
            await signOut(auth);
            onAuthStateChanged(auth, () => { });
        }

        onAuthStateChanged(auth, (user) => {
            const userDisplay = document.getElementById('user-display');
            const loginBtn = document.getElementById('login-btn');

            if (user) {
                userDisplay.textContent = `您好, ${user.displayName || user.email}`;
                loginBtn.textContent = '登出';
                loginBtn.onclick = handleLogout;
            } else {
                userDisplay.textContent = '訪客模式';
                loginBtn.textContent = '登入 / 註冊';
                loginBtn.onclick = handleLogin;
            }
        });

        // ===============================================
        // C. 付款按鈕邏輯 (已針對新金流修正)
        // ===============================================

        checkoutBtn.addEventListener('click', () => {
            const totalText = cartTotalElement.textContent.replace(/,/g, '').trim();
            const total = parseInt(totalText);

            if (total <= 0) {
                alert("購物車為空，無法結帳。");
                return;
            }

            if (!auth.currentUser) {
                alert("請先登入才能進行付款！請點擊右上角按鈕登入。");
                return;
            }

            const cartItems = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            const user = auth.currentUser;

            // 呼叫處理新金流 (藍新) 的函式
            handlePaymentCheckout(user, total, cartItems);
        });

        // ... (前面的程式碼不變)

        /**
         * 處理付款結帳流程 (綠界版)
         */
        async function handlePaymentCheckout(user, total, cartItems) {

            // [NEW] 驗證實體商品欄位
            const hasPhysical = checkPhysicalItems();
            let logisticsInfo = null;

            if (hasPhysical) {
                const rName = receiverNameInput.value.trim();
                const rPhone = receiverPhoneInput.value.trim();
                const sId = storeIdInput.value;

                if (!rName || !rPhone || !sId) {
                    alert('請完整填寫收件人姓名、手機並選擇取貨門市！');
                    return;
                }
                logisticsInfo = {
                    receiverName: rName,
                    receiverPhone: rPhone,
                    storeId: sId,
                    storeName: storeNameInput.value,
                    storeAddress: storeAddressInput.value
                };
            }

            checkoutBtn.disabled = true;
            checkoutBtn.textContent = '🔒 正在連接綠界金流...';

            try {
                const response = await initiatePayment({
                    amount: total,
                    userId: user.uid,
                    cartDetails: cartItems,
                    logistics: logisticsInfo,
                    promoCode: promoInput.value.trim().toUpperCase(), // [NEW] Pass promo code
                    referralTutor: verifiedTutor, // [NEW] Pass verified tutor email
                    // 設定交易完成後的返回網址
                    returnUrl: window.location.origin + '/payment-return.html'
                });

                const data = response.data;

                if (data && data.paymentParams) {
                    console.log("取得綠界參數成功，正在跳轉...");
                    checkoutBtn.textContent = '🚀 前往付款頁面...';

                    // 執行綠界表單提交
                    submitECPayForm(data.paymentParams, data.apiUrl);
                } else {
                    throw new Error('無法取得交易參數。');
                }

            } catch (error) {
                console.error("結帳失敗:", error);
                alert(`結帳失敗：${error.message}`);
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = '💳 前往付款';
            }
        }

        /**
         * 建立並送出綠界 (ECPay) 表單
         */
        function submitECPayForm(params, apiUrl) {
            const form = document.createElement('form');
            form.method = 'post';
            form.action = apiUrl; // 綠界的 API 網址

            // 將後端回傳的所有參數轉為 hidden input
            for (const key in params) {
                if (params.hasOwnProperty(key)) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = params[key];
                    form.appendChild(input);
                }
            }

            paymentFormContainer.appendChild(form);
            form.submit();
        }
    </script>
</body>

</html>
