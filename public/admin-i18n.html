<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>課程雙語內容管理 — Vibe Coding Admin</title>
  <meta name="description" content="Vibe Coding 管理後台：維護課程英文多語系欄位" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --bg2: #161b27;
      --bg3: #1e2535;
      --border: #2a3347;
      --border2: #3a4560;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #6366f1;
      --accent2: #818cf8;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --cyan: #06b6d4;
      --radius: 12px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Top Bar ── */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; color: var(--text);
    }
    .topbar-brand span { color: var(--accent2); }
    .topbar-right {
      display: flex; align-items: center; gap: 16px;
    }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 14px;
      font-size: 13px; color: var(--text2);
    }
    .user-chip i { color: var(--accent2); font-size: 11px; }

    /* ── Main Layout ── */
    .main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
    .page-header { margin-bottom: 32px; }
    .page-title {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .page-subtitle { font-size: 14px; color: var(--text3); }

    /* ── Stats Bar ── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px;
    }
    .stat-num { font-size: 28px; font-weight: 800; margin-bottom: 2px; }
    .stat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-num.total { color: var(--accent2); }
    .stat-num.done { color: var(--green); }
    .stat-num.partial { color: var(--yellow); }
    .stat-num.missing { color: var(--red); }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .filter-label { font-size: 13px; color: var(--text3); }
    .filter-btn {
      padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border); background: var(--bg2); color: var(--text2);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .search-input {
      margin-left: auto;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 7px 14px;
      font-size: 13px; font-family: inherit; min-width: 200px;
    }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .search-input::placeholder { color: var(--text3); }

    /* ── Course Card ── */
    .courses-list { display: flex; flex-direction: column; gap: 16px; }
    .course-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color 0.15s;
    }
    .course-item:hover { border-color: var(--border2); }
    .course-item.expanded { border-color: var(--accent); }

    /* Header row */
    .course-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px; cursor: pointer; user-select: none;
    }
    .course-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .course-meta { flex: 1; min-width: 0; }
    .course-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .course-id { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
    .progress-wrap {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .progress-bar-bg {
      width: 80px; height: 6px; background: var(--bg3);
      border-radius: 3px; overflow: hidden;
    }
    .progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .progress-pct { font-size: 12px; font-weight: 600; min-width: 32px; text-align: right; }
    .status-badge {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
      white-space: nowrap;
    }
    .badge-done { background: rgba(16,185,129,0.15); color: var(--green); }
    .badge-partial { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-missing { background: rgba(239,68,68,0.12); color: var(--red); }
    .chevron { color: var(--text3); transition: transform 0.2s; font-size: 13px; }
    .expanded .chevron { transform: rotate(180deg); }

    /* Editor */
    .course-editor {
      display: none; border-top: 1px solid var(--border);
      padding: 24px;
    }
    .expanded .course-editor { display: block; }
    .editor-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 800px) { .editor-grid { grid-template-columns: 1fr; } }

    .editor-col-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .editor-col-label.zh { color: var(--text3); }
    .editor-col-label.en { color: var(--accent2); }

    .field-group { margin-bottom: 18px; }
    .field-label {
      font-size: 12px; color: var(--text3); margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .field-label i { font-size: 10px; }
    .field-required { color: var(--red); font-size: 10px; }

    /* Read-only (Chinese) */
    .field-readonly {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: var(--text2); line-height: 1.5;
      min-height: 40px; white-space: pre-wrap; word-break: break-word;
    }
    .field-readonly.empty { color: var(--text3); font-style: italic; }

    /* Editable (English) */
    .field-input, .field-textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: var(--text); line-height: 1.5;
      font-family: inherit; transition: border-color 0.15s;
      resize: vertical;
    }
    .field-input:focus, .field-textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .field-input::placeholder, .field-textarea::placeholder { color: var(--text3); }
    .field-textarea { min-height: 80px; }

    /* Core content list */
    .core-content-list { display: flex; flex-direction: column; gap: 6px; }
    .core-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 13px; color: var(--text2); line-height: 1.4;
    }
    .core-item::before { content: "•"; color: var(--text3); flex-shrink: 0; margin-top: 1px; }

    .core-en-area {
      display: flex; flex-direction: column; gap: 6px;
    }
    .core-en-row {
      display: flex; gap: 6px; align-items: flex-start;
    }
    .core-en-input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      font-size: 13px; color: var(--text); font-family: inherit;
      transition: border-color 0.15s;
    }
    .core-en-input:focus { outline: none; border-color: var(--accent); }
    .core-en-input::placeholder { color: var(--text3); }
    .btn-icon {
      width: 34px; height: 34px; border-radius: 7px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; transition: all 0.15s; flex-shrink: 0;
    }
    .btn-icon:hover { border-color: var(--border2); color: var(--text); }
    .btn-icon.remove:hover { border-color: var(--red); color: var(--red); }
    .btn-add-row {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 12px; border-radius: 8px;
      background: transparent; border: 1px dashed var(--border2);
      color: var(--text3); font-size: 12px; cursor: pointer;
      transition: all 0.15s; width: fit-content;
    }
    .btn-add-row:hover { border-color: var(--accent); color: var(--accent2); }

    /* Action bar */
    .editor-actions {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 12px; margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .btn-save {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 24px; border-radius: 8px;
      background: var(--accent); border: none;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .btn-save:hover { background: #5558e8; transform: translateY(-1px); }
    .btn-save:active { transform: translateY(0); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-save.success { background: var(--green); }
    .btn-save.error { background: var(--red); }
    .save-status { font-size: 12px; color: var(--text3); }

    /* Divider */
    .divider-label {
      text-align: center; position: relative; margin: 8px 0;
      font-size: 11px; color: var(--text3);
    }

    /* Loading / Auth overlay */
    #loading-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #auth-error {
      display: none; position: fixed; inset: 0; background: var(--bg);
      align-items: center; justify-content: center; flex-direction: column;
      z-index: 9998; gap: 16px;
    }
    .auth-error-box {
      background: var(--bg2); border: 1px solid var(--red);
      border-radius: var(--radius); padding: 32px 40px; text-align: center;
    }
    .auth-error-box h2 { font-size: 20px; margin-bottom: 8px; color: var(--red); }
    .auth-error-box p { font-size: 14px; color: var(--text2); }
    .auth-meta {
      margin: 16px auto 18px;
      width: min(100%, 420px);
      text-align: left;
      border: 1px solid var(--border);
      background: var(--bg3);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text2);
    }
    .auth-meta code {
      display: block;
      margin-top: 4px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
      user-select: all;
    }
    .auth-meta .muted { color: var(--text3); font-size: 12px; margin-top: 6px; }
    #auth-error.show { display: flex; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text3);
    }
    .empty-state i { font-size: 40px; margin-bottom: 16px; display: block; }

    /* Translate hint */
    .translate-hint {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text3);
      padding: 8px 12px; background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 8px; margin-bottom: 16px;
    }
    .translate-hint a {
      color: var(--accent2); text-decoration: none;
    }
    .translate-hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p style="color:var(--text3);font-size:14px;">驗證中...</p>
</div>
<div id="auth-error">
  <div class="auth-error-box">
    <h2><i class="fa-solid fa-shield-halved"></i> 存取被拒</h2>
    <p>此頁面僅限 Admin 帳號使用。<br><a href="index.html" style="color:var(--accent2);">返回首頁</a></p>
    <div class="auth-meta">
      <div><strong>目前登入帳號</strong></div>
      <div>Email: <span id="auth-email">—</span></div>
      <div>UID:</div>
      <code id="auth-uid">—</code>
      <div>Firestore role: <span id="auth-role">—</span></div>
      <div class="muted">若你確定自己是 admin，請確認 `users/{uid}.role` 是否已設為 `admin`。</div>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="topbar">
    <div class="topbar-brand">
      🚀 Vibe Coding <span>Admin</span> &nbsp;/&nbsp; 雙語內容管理
    </div>
    <div class="topbar-right">
      <a href="admin-courses.html" style="color:var(--text3);font-size:13px;text-decoration:none;">
        <i class="fa-solid fa-layer-group"></i> 課程管理
      </a>
      <div class="user-chip">
        <i class="fa-solid fa-user-shield"></i>
        <span id="admin-email">—</span>
      </div>
      <a href="index.html" style="color:var(--text3);font-size:13px;text-decoration:none;">
        <i class="fa-solid fa-arrow-left"></i> 返回
      </a>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <h1 class="page-title"><i class="fa-solid fa-language"></i> 課程雙語內容管理</h1>
      <p class="page-subtitle">為每門課程填入英文版標題、摘要與核心內容，英文使用者即可在課程目錄看到正確資訊。</p>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-num total" id="stat-total">—</div>
        <div class="stat-label">Total Courses</div>
      </div>
      <div class="stat-card">
        <div class="stat-num done" id="stat-done">—</div>
        <div class="stat-label">✅ 完成 (全部英文欄位)</div>
      </div>
      <div class="stat-card">
        <div class="stat-num partial" id="stat-partial">—</div>
        <div class="stat-label">⚠️ 部分 (有些欄位)</div>
      </div>
      <div class="stat-card">
        <div class="stat-num missing" id="stat-missing">—</div>
        <div class="stat-label">❌ 缺少英文內容</div>
      </div>
    </div>

    <!-- Filter + Search -->
    <div class="filter-bar">
      <span class="filter-label">篩選：</span>
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" data-filter="missing" onclick="setFilter('missing')">❌ 缺少英文</button>
      <button class="filter-btn" data-filter="partial" onclick="setFilter('partial')">⚠️ 部分</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done')">✅ 已完成</button>
      <input class="search-input" id="search-input" placeholder="🔍 搜尋課程名稱..." oninput="applyFilter()" />
    </div>

    <!-- Course List -->
    <div class="courses-list" id="courses-list">
      <div class="empty-state">
        <i class="fa-solid fa-circle-notch fa-spin"></i>
        載入課程資料中...
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";
import { firebaseConfig, connectFirebaseEmulators } from "./js/firebase-local.js?v=3";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const functions = getFunctions(app, "asia-east1");
connectFirebaseEmulators({ auth, db, functions });

const getLessonsMetadata = httpsCallable(functions, "getLessonsMetadata");
const updateLessonI18n = httpsCallable(functions, "updateLessonI18n");

// i18n 必填欄位列表
const EN_FIELDS = ['titleEn', 'summaryEn', 'coreContentEn', 'lessonLabelEn'];
const EN_FIELDS_TOTAL = EN_FIELDS.length;

let allLessons = [];
let currentFilter = 'all';

/** 計算課程完成度 */
function getCompletion(lesson) {
  let filled = 0;
  if (lesson.titleEn && lesson.titleEn.trim()) filled++;
  if (lesson.summaryEn && lesson.summaryEn.trim()) filled++;
  if (Array.isArray(lesson.coreContentEn) && lesson.coreContentEn.length > 0) filled++;
  if (lesson.lessonLabelEn && lesson.lessonLabelEn.trim()) filled++;
  return { filled, total: EN_FIELDS_TOTAL };
}

/** 取得狀態分類 */
function getStatus(lesson) {
  const { filled, total } = getCompletion(lesson);
  if (filled === 0) return 'missing';
  if (filled >= total) return 'done';
  return 'partial';
}

/** 更新統計欄位 */
function updateStats(lessons) {
  const total = lessons.length;
  let done = 0, partial = 0, missing = 0;
  lessons.forEach(l => {
    const s = getStatus(l);
    if (s === 'done') done++;
    else if (s === 'partial') partial++;
    else missing++;
  });
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-partial').textContent = partial;
  document.getElementById('stat-missing').textContent = missing;
}

/** 篩選 */
window.setFilter = function(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  applyFilter();
};

window.applyFilter = function() {
  const query = (document.getElementById('search-input').value || '').toLowerCase();
  const items = document.querySelectorAll('.course-item');
  items.forEach(item => {
    const status = item.dataset.status;
    const name = (item.dataset.name || '').toLowerCase();
    const matchFilter = currentFilter === 'all' || status === currentFilter;
    const matchSearch = !query || name.includes(query) || (item.dataset.id || '').toLowerCase().includes(query);
    item.style.display = (matchFilter && matchSearch) ? '' : 'none';
  });
};

/** 展開/收合 */
window.toggleCourse = function(id) {
  const el = document.getElementById(`course-${id}`);
  if (el) el.classList.toggle('expanded');
};

/** 新增 core content 列 */
window.addCoreRow = function(id) {
  const list = document.getElementById(`core-en-${id}`);
  if (!list) return;
  const row = document.createElement('div');
  row.className = 'core-en-row';
  row.innerHTML = `
    <input class="core-en-input" type="text" placeholder="English core content item..." />
    <button class="btn-icon remove" onclick="this.parentElement.remove()" title="移除">
      <i class="fa-solid fa-trash-can"></i>
    </button>
  `;
  list.appendChild(row);
};

/** 儲存單一課程 */
window.saveLessonI18n = async function(safeId, btnEl) {
  const container = document.getElementById(`course-${safeId}`);
  if (!container) return;

  // 從 data-id 讀取真正的 Firestore courseId（非 safeId）
  const courseId = container.dataset.id || safeId;

  const titleEn = container.querySelector('.input-titleEn')?.value?.trim() || '';
  const summaryEn = container.querySelector('.input-summaryEn')?.value?.trim() || '';
  const descriptionEn = container.querySelector('.input-descriptionEn')?.value?.trim() || '';
  const lessonLabelEn = container.querySelector('.input-lessonLabelEn')?.value?.trim() || '';
  const coreInputs = Array.from(container.querySelectorAll('.core-en-input'));
  const coreContentEn = coreInputs.map(i => i.value.trim()).filter(Boolean);

  const statusEl = container.querySelector('.save-status');
  btnEl.disabled = true;
  btnEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
  if (statusEl) statusEl.textContent = '';

  try {
    await updateLessonI18n({ courseId, titleEn, summaryEn, descriptionEn, coreContentEn, lessonLabelEn });

    // 更新本地 lesson 資料（用真正的 courseId 查找）
    const lesson = allLessons.find(l => l.id === courseId || l.docId === courseId || l.courseId === courseId);
    if (lesson) {
      lesson.titleEn = titleEn;
      lesson.summaryEn = summaryEn;
      lesson.descriptionEn = descriptionEn;
      lesson.coreContentEn = coreContentEn;
      lesson.lessonLabelEn = lessonLabelEn;
      updateCourseItemStatus(safeId, lesson);
    }

    btnEl.innerHTML = '<i class="fa-solid fa-check"></i> 已儲存';
    btnEl.classList.add('success');
    if (statusEl) statusEl.textContent = `已儲存 ${new Date().toLocaleTimeString()}`;
    setTimeout(() => {
      btnEl.disabled = false;
      btnEl.classList.remove('success');
      btnEl.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> 儲存';
    }, 2500);
  } catch (e) {
    console.error('[admin-i18n] Save failed:', e);
    btnEl.innerHTML = '<i class="fa-solid fa-xmark"></i> 失敗';
    btnEl.classList.add('error');
    if (statusEl) statusEl.textContent = '儲存失敗：' + (e.message || '');
    setTimeout(() => {
      btnEl.disabled = false;
      btnEl.classList.remove('error');
      btnEl.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> 儲存';
    }, 3000);
  }
};

/** 更新單一課程的完成度顯示（safeId = DOM 元素 ID，lesson = 原始資料物件）*/
function updateCourseItemStatus(safeId, lesson) {
  const el = document.getElementById(`course-${safeId}`);
  if (!el) return;
  const { filled, total } = getCompletion(lesson);
  const pct = Math.round((filled / total) * 100);
  const status = getStatus(lesson);
  el.dataset.status = status;
  const fill = el.querySelector('.progress-bar-fill');
  const pctEl = el.querySelector('.progress-pct');
  const badge = el.querySelector('.status-badge');
  if (fill) {
    fill.style.width = pct + '%';
    fill.style.background = status === 'done' ? 'var(--green)' : status === 'partial' ? 'var(--yellow)' : 'var(--red)';
  }
  if (pctEl) { pctEl.textContent = pct + '%'; pctEl.style.color = status === 'done' ? 'var(--green)' : status === 'partial' ? 'var(--yellow)' : 'var(--red)'; }
  if (badge) {
    badge.className = 'status-badge badge-' + status;
    badge.textContent = status === 'done' ? '✅ 完成' : status === 'partial' ? '⚠️ 部分' : '❌ 缺少';
  }
  updateStats(allLessons);
  applyFilter();
}

/** 渲染課程列表 */
function renderLessons(lessons) {
  const list = document.getElementById('courses-list');
  if (!lessons.length) {
    list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-box-open"></i>沒有找到課程</div>';
    return;
  }

  list.innerHTML = lessons.map(lesson => {
    const { filled, total } = getCompletion(lesson);
    const pct = Math.round((filled / total) * 100);
    const status = getStatus(lesson);
    const barColor = status === 'done' ? 'var(--green)' : status === 'partial' ? 'var(--yellow)' : 'var(--red)';
    const pctColor = barColor;
    const badgeClass = 'badge-' + status;
    const badgeText = status === 'done' ? '✅ 完成' : status === 'partial' ? '⚠️ 部分' : '❌ 缺少';
    const icon = lesson.cardIcon || lesson.icon || '📘';
    const canonicalId = lesson.id || lesson.docId || lesson.courseId || '';
    const safeId = String(canonicalId).replace(/[^a-zA-Z0-9_-]/g, '_');

    // Build core content readonly display
    const coreZh = Array.isArray(lesson.coreContent) ? lesson.coreContent : [];
    const coreEnArr = Array.isArray(lesson.coreContentEn) ? lesson.coreContentEn : [];

    // Google Translate helper URL
    const zhTitle = encodeURIComponent(lesson.title || '');
    const translateUrl = `https://translate.google.com/?sl=zh-TW&tl=en&text=${zhTitle}&op=translate`;

    return `
    <div class="course-item" id="course-${safeId}" data-status="${status}" data-name="${(lesson.title||'').toLowerCase()}" data-id="${canonicalId}">
      <div class="course-header" onclick="toggleCourse('${safeId}')">
        <div class="course-icon">${icon}</div>
        <div class="course-meta">
          <div class="course-title">${lesson.title || canonicalId || 'Untitled'}</div>
          <div class="course-id">${canonicalId || ''} ${lesson.courseKey ? '· ' + lesson.courseKey : ''}</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${pct}%;background:${barColor};"></div>
          </div>
          <span class="progress-pct" style="color:${pctColor};">${pct}%</span>
          <span class="status-badge ${badgeClass}">${badgeText}</span>
        </div>
        <i class="fa-solid fa-chevron-down chevron"></i>
      </div>
      <div class="course-editor">
        <div class="translate-hint">
          <i class="fa-solid fa-wand-magic-sparkles"></i>
          翻譯參考：
          <a href="${translateUrl}" target="_blank" rel="noopener">
            在 Google Translate 中查看「${lesson.title || ''}」的英文 →
          </a>
        </div>
        <div class="editor-grid">
          <!-- 中文（唯讀）-->
          <div>
            <div class="editor-col-label zh"><i class="fa-solid fa-lock"></i> 中文（唯讀）</div>
            <div class="field-group">
              <div class="field-label"><i class="fa-solid fa-heading"></i> 標題</div>
              <div class="field-readonly">${lesson.title || '<span class="empty">（無）</span>'}</div>
            </div>
            <div class="field-group">
              <div class="field-label"><i class="fa-solid fa-align-left"></i> 摘要</div>
              <div class="field-readonly ${!(lesson.summary || lesson.tagText) ? 'empty' : ''}">${lesson.summary || lesson.tagText || '（無）'}</div>
            </div>
            <div class="field-group">
              <div class="field-label"><i class="fa-solid fa-tag"></i> 課程標籤</div>
              <div class="field-readonly ${!(lesson.lessonLabel || lesson.tagText) ? 'empty' : ''}">${lesson.lessonLabel || lesson.tagText || '（無）'}</div>
            </div>
            <div class="field-group">
              <div class="field-label"><i class="fa-solid fa-list-check"></i> 核心內容</div>
              <div class="field-readonly ${!coreZh.length ? 'empty' : ''}">
                ${coreZh.length ? `<div class="core-content-list">${coreZh.map(c => `<div class="core-item">${c}</div>`).join('')}</div>` : '（無）'}
              </div>
            </div>
          </div>

          <!-- 英文（可編輯）-->
          <div>
            <div class="editor-col-label en"><i class="fa-solid fa-pen-to-square"></i> 英文（可編輯）</div>
            <div class="field-group">
              <div class="field-label">
                <i class="fa-solid fa-heading"></i> Title (EN)
                <span class="field-required">必填</span>
              </div>
              <input class="field-input input-titleEn" type="text"
                placeholder="e.g. Preparation Course"
                value="${lesson.titleEn || ''}" />
            </div>
            <div class="field-group">
              <div class="field-label"><i class="fa-solid fa-align-left"></i> Summary (EN)</div>
              <textarea class="field-textarea input-summaryEn"
                placeholder="One-sentence English summary...">${lesson.summaryEn || ''}</textarea>
            </div>
            <div class="field-group">
              <div class="field-label"><i class="fa-solid fa-tag"></i> Lesson Label (EN)</div>
              <input class="field-input input-lessonLabelEn" type="text"
                placeholder="e.g. Starter Course"
                value="${lesson.lessonLabelEn || ''}" />
            </div>
            <div class="field-group">
              <div class="field-label"><i class="fa-solid fa-list-check"></i> Core Content (EN)</div>
              <div class="core-en-area" id="core-en-${safeId}">
                ${coreEnArr.length
                  ? coreEnArr.map(c => `
                    <div class="core-en-row">
                      <input class="core-en-input" type="text" value="${c.replace(/"/g,'&quot;')}" placeholder="English content item..." />
                      <button class="btn-icon remove" onclick="this.parentElement.remove()" title="移除">
                        <i class="fa-solid fa-trash-can"></i>
                      </button>
                    </div>`).join('')
                  : (coreZh.length
                    ? coreZh.map(() => `
                      <div class="core-en-row">
                        <input class="core-en-input" type="text" value="" placeholder="English translation..." />
                        <button class="btn-icon remove" onclick="this.parentElement.remove()" title="移除">
                          <i class="fa-solid fa-trash-can"></i>
                        </button>
                      </div>`).join('')
                    : ''
                  )
                }
              </div>
              <button class="btn-add-row" onclick="addCoreRow('${safeId}')">
                <i class="fa-solid fa-plus"></i> 新增項目
              </button>
            </div>
            <!-- Optional: Description -->
            <div class="field-group">
              <div class="field-label"><i class="fa-solid fa-file-lines"></i> Description (EN) <span style="color:var(--text3);font-size:10px;">選填</span></div>
              <textarea class="field-textarea input-descriptionEn" rows="3"
                placeholder="Longer English description (optional)...">${lesson.descriptionEn || ''}</textarea>
            </div>
          </div>
        </div>

        <div class="editor-actions">
          <span class="save-status"></span>
          <button class="btn-save" onclick="saveLessonI18n('${safeId}', this)">
            <i class="fa-solid fa-floppy-disk"></i> 儲存
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  applyFilter();
}

// ── Auth Check ──
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('auth-error').classList.add('show');
    return;
  }

  try {
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    const userData = userDoc.exists() ? (userDoc.data() || {}) : {};
    document.getElementById('auth-email').textContent = user.email || user.uid;
    document.getElementById('auth-uid').textContent = user.uid;
    document.getElementById('auth-role').textContent = userData.role || '(missing)';
    if (userData.role !== 'admin') {
      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('auth-error').classList.add('show');
      return;
    }

    document.getElementById('admin-email').textContent = user.email || user.uid;

    // 載入課程
    const res = await getLessonsMetadata({});
    const rawLessons = Array.isArray(res?.data?.lessons) ? res.data.lessons : [];

    // 只顯示 catalog courses（非 hidden，非 physical hardware）
    allLessons = rawLessons.filter(l => {
      if (l.hiddenFromCatalog === true) return false;
      if (l.isDeprecated === true) return false;
      const mt = String(l.metadataType || '').toLowerCase();
      if (mt === 'legacy_product') return false;
      return true;
    });

    // 排序：缺少英文的優先
    allLessons.sort((a, b) => {
      const sa = getStatus(a) === 'missing' ? 0 : getStatus(a) === 'partial' ? 1 : 2;
      const sb = getStatus(b) === 'missing' ? 0 : getStatus(b) === 'partial' ? 1 : 2;
      return sa - sb;
    });

    updateStats(allLessons);
    renderLessons(allLessons);

    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch (e) {
    console.error('[admin-i18n] Init error:', e);
    document.getElementById('loading-overlay').innerHTML = `
      <p style="color:var(--red);font-size:14px;">載入失敗：${e.message || ''}</p>
      <a href="index.html" style="color:var(--accent2);margin-top:12px;font-size:13px;">返回首頁</a>
    `;
  }
});
</script>
