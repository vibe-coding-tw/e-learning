<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Classroom & Vibe Coding 實務 - Vibe Coding</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>

<body id="page-github-classroom" class="bg-gray-50 flex flex-col min-h-screen font-[Inter]">

    <!-- Navigation (Shared) -->
    <div id="nav-placeholder"></div>
    <script src="/js/nav-component.js"></script>
    <script>
        renderNav('/');
    </script>

    <!-- Tab Navigation Bar -->
    <div class="unit-tabs-wrapper">
        <div class="unit-tabs-container">
            <div class="unit-tabs-flex" id="course-tabs-container">
                <button onclick="switchTab('vibe')" id="tab-vibe" class="unit-tab-btn active">
                    <span>🎬</span> Vibe Coding 哲學
                </button>
                <button onclick="switchTab('workflow')" id="tab-workflow" class="unit-tab-btn">
                    <span>⚙️</span> Classroom 工作流
                </button>
                <button onclick="switchTab('teacher')" id="tab-teacher" class="unit-tab-btn">
                    <span>👩‍🏫</span> 導師能力矩陣
                </button>
            </div>
        </div>
    </div>

    <!-- Content Area (Iframe) -->
    <div class="flex-grow w-full relative">
        <iframe id="content-frame" src="" class="w-full h-full border-0 absolute inset-0 bg-gray-50 opacity-0 transition-opacity duration-300"
            onload="this.style.opacity='1'"></iframe>
    </div>

    <script>
        const iframe = document.getElementById('content-frame');
        const tabs = {
            vibe: { btn: document.getElementById('tab-vibe'), url: '00-unit-vibe-coding-intro.html' },
            workflow: { btn: document.getElementById('tab-workflow'), url: '00-unit-classroom-workflow.html' },
            teacher: { btn: document.getElementById('tab-teacher'), url: '00-unit-teacher-matrix.html' }
        };

        // Initial Load
        loadContent(tabs.vibe.url);

        function switchTab(tabKey) {
            // Reset all tabs
            Object.values(tabs).forEach(t => t.btn.classList.remove('active'));

            // Activate current tab
            const target = tabs[tabKey];
            if (target) {
                target.btn.classList.add('active');
                loadContent(target.url);
            }
        }

        function loadContent(url) {
            iframe.style.opacity = '0';
            setTimeout(() => {
                const separator = url.includes('?') ? '&' : '?';
                const query = window.location.search.substring(1);
                iframe.src = query ? `${url}${separator}${query}` : url;
            }, 300);
        }
    </script>

    <script type="module" src="/js/master-nav.js?v=13"></script>
</body>

</html>
