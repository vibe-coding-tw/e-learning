<head>
    <meta charset="UTF-8">

<body id="page-basic" class="flex flex-col min-h-screen">

    <script type="module" src="/js/nav-component.js?v2026.04.06.FINAL_V14.8.4_AI_STABLE"></script>
    <script src="js/course-shared.js?v2026.04.06.FINAL_V14.8.4_AI_STABLE"></script> <!-- Added Shared Logic -->
    

    <div class="container mx-auto px-4 py-8 flex-grow">
        <div class="page-header text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-800">⚙️ 基礎課程：馬達控制、通訊與 OTA 實作</h1>
            <div class="section-title-underline"></div>
        </div>

        <div id="lesson-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-6">
        </div>

        <!-- #video-overlay removed (handled by course-shared.js?v=2026.04.05.FINAL_V6) -->
    </div>

    <footer class="bg-gray-800 py-8 border-t border-gray-700 mt-10">
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center space-x-6 mb-6 text-gray-400">
                <a href="prepare.html" class="hover:text-white">課前準備</a>
                <a href="started.html" class="hover:text-white">入門課程</a>
                <a href="basic.html" class="hover:text-white">基礎實作</a>
                <a href="advanced.html" class="hover:text-white">進階應用</a>
            </div>

            <div class="border-t border-gray-700 pt-6">
                <p class="text-gray-500 text-sm mb-2">&copy; 2025 Vibe Coding. All rights reserved.</p>
                <div class="flex flex-col md:flex-row justify-center items-center gap-2 md:gap-6 text-sm text-gray-400">
                    <span>營業人名稱：腳丫健康科技有限公司</span>
                    <span class="hidden md:inline">|</span>
                    <span>統一編號：80187668</span>
                    <span class="hidden md:inline">|</span>
                    <span>課程合作洽談：info@vibe-coding.tw</span>
                </div>
            </div>
        </div>
    </footer>

    

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO6Y6Pa7b7zbieJIErysaNF6-UqbT8KJw",
            authDomain: "e-learning-942f7.firebaseapp.com",
            projectId: "e-learning-942f7",
            storageBucket: "e-learning-942f7.firebasestorage.app",
            messagingSenderId: "878397058574",
            appId: "1:878397058574:web:28aaa07a291ee3baab165f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const functions = getFunctions(app, 'asia-east1');

        // Expose to window for course-shared.js?v=2026.04.05.FINAL_V6 vibeFetchLessons
        window.vibeApp = app;
        window.getFunctions = getFunctions;
        window.httpsCallable = httpsCallable;

        const checkAuthFunction = httpsCallable(functions, 'checkPaymentAuthorization');
        const CART_URL = 'cart.html';
        const AUTH_URL = '/auth.html?v=' + new Date().getTime(); // Prevent cache

        // 購物車邏輯
        function addToCart(productId, productName, productPrice, isPhysical) {
            let cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            if (cart[productId]) return { success: false };
            cart[productId] = { name: productName, price: parseInt(productPrice, 10), quantity: 1, isPhysical: !!isPhysical };
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            return { success: true };
        }

        window.handleAddToCartConfirmation = function (courseId, courseName, coursePrice, isPhysical) {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            if (cart[courseId]) { alert(`⚠️ 「${courseName}」已在購物車中！`); return; }
            if (confirm(`您確定要將課程「${courseName}」加入購物車嗎？`)) {
                addToCart(courseId, courseName, coursePrice, isPhysical);
                // ★★★ 移除 Alert，直接跳轉 ★★★
                window.location.href = CART_URL;
            }
        }

        window.handleLogin = async () => { await signInWithPopup(auth, new GoogleAuthProvider()); };
        window.handleLogout = async () => { await signOut(auth); };

        function updateCardAction(cardElement, status) {
            const btn = cardElement.querySelector('.action-btn');
            if (!btn) return;

            const courseId = cardElement.dataset.courseId;
            const courseName = cardElement.dataset.courseName;
            const coursePrice = cardElement.dataset.coursePrice;
            const isPhysical = cardElement.dataset.isPhysical === 'true';
            const classroomUrl = cardElement.dataset.classroomUrl;
            const isPricedPhysicalProduct = isPhysical && parseInt(coursePrice || "0", 10) > 0;

            // 確保按鈕寬度邏輯正確
            const buttonGroup = cardElement.querySelector('.button-group');
            const hasVideoButton = buttonGroup && buttonGroup.children.length > 1;
            const widthClass = hasVideoButton ? 'flex-1' : 'w-full';

            btn.onclick = null;
            btn.disabled = false;

            if (isPricedPhysicalProduct) {
                btn.textContent = `🛒 加入購物車`;
                btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
                btn.onclick = () => window.handleAddToCartConfirmation(courseId, courseName, coursePrice, isPhysical);
            } else if (status === 'AUTHORIZED') {
                btn.textContent = '✅ 進入課程內容';
                btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-green-600 hover:bg-green-700 text-white font-medium transition`;
                btn.onclick = () => { 
                    if (!classroomUrl) {
                        alert("⚠️ 課程連結尚未備妥，請聯繫客服。");
                        return;
                    }
                    window.location.href = `${AUTH_URL}&url=${encodeURIComponent(classroomUrl)}&id=${courseId}&price=${coursePrice}`; 
                };
            } else if (status === 'NOT_LOGGED_IN' || status === 'UNAUTHORIZED' || status === 'ERROR') {
                btn.textContent = `🛒 加入購物車`;
                btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
                btn.onclick = () => window.handleAddToCartConfirmation(courseId, courseName, coursePrice, isPhysical);

            } else if (status === 'LOADING') {
                btn.textContent = '載入中...';
                btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-gray-400 text-white font-medium cursor-not-allowed`;
                btn.disabled = true;
            }
        }

        async function checkLessonAuthorization(cardElement, user) {
            updateCardAction(cardElement, 'LOADING');
            const courseId = cardElement.dataset.courseId;
            const classroomUrl = cardElement.dataset.classroomUrl;

            // [V13.0.13] Standardized Tutor Mode Integration
            const tutorModeActive = localStorage.getItem('adminTutorMode') === 'true';

            try {
                // 傳送 pageId 與 tutorMode 狀態
                const result = await checkAuthFunction({ 
                    pageId: courseId,
                    tutorMode: tutorModeActive
                });

                // ★★★ 判斷 authorized 布林值 ★★★
                if (result.data && result.data.authorized) {
                    updateCardAction(cardElement, 'AUTHORIZED');
                } else {
                    updateCardAction(cardElement, 'UNAUTHORIZED');
                }

            } catch (error) {
                console.error(`授權檢查失敗:`, error);
                // 即使失敗，也要顯示購物車按鈕，避免卡住
                updateCardAction(cardElement, 'UNAUTHORIZED');
            }
        }

        function renderLessons(lessons, filterCategory) {
            const container = document.getElementById('lesson-container');
            if (!container) return;

            const targetLessons = filterCategory === 'all'
                ? lessons
                : lessons.filter(item => item.category === filterCategory);

            if (targetLessons.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 w-full col-span-3 py-12">目前此分類尚無課程。</p>`;
                return;
            }

            const html = targetLessons.map(lesson => {
                const contentListHtml = (lesson.coreContent || []).map(item => `<li>${item}</li>`).join('');
                const priceDisplay = parseInt(lesson.price) === 0
                    ? '免費'
                    : `NT$ ${parseInt(lesson.price).toLocaleString()}`;

                const videoButtonHtml = lesson.videoId ? `
                    <button onclick="enterMediaMode('video', 'https://www.youtube.com/embed/${lesson.videoId}?autoplay=1&enablejsapi=1')" 
                        class="flex-1 py-2 px-3 rounded-md border border-red-500 text-red-600 font-medium hover:bg-red-50 transition-colors flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                        課程預覽
                    </button>` : '';

                const loadButtonClass = lesson.videoId ? 'flex-1' : 'w-full';

                return `
                    <div class="lesson-card"
                         data-course-id="${lesson.courseId}" 
                         data-course-name="${lesson.title}" 
                         data-course-price="${lesson.price}" 
                         data-is-physical="${lesson.isPhysical || false}"
                         data-classroom-url="${lesson.classroomUrl}">
                
                        <div class="lesson-header mb-4 border-b pb-3">
                            <h2 class="text-xl font-bold text-gray-800 flex justify-between items-start gap-2">
                                <span>${lesson.lessonLabel}：${lesson.title}</span>
                                <span class="shrink-0 text-sm font-medium text-gray-500 bg-gray-100 px-2 py-1 rounded">(${lesson.duration})</span>
                            </h2>
                        </div>

                        <div class="lesson-body flex flex-col h-full">
                            <div class="flex items-center gap-3 mb-4"> 
                                <div class="lesson-icon text-4xl bg-indigo-50 p-2 rounded-lg">${lesson.icon}</div>                        
                                <span class="phase-tag bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-1 rounded">
                                    ${lesson.tagText}
                                </span>
                            </div>

                            <div class="core-content text-sm text-gray-600 flex-grow">
                                <strong class="text-gray-900 block mb-1">核心內容：</strong>
                                <ul class="list-disc pl-4 space-y-1">
                                    ${contentListHtml}
                                </ul>
                            </div>
                            
                            <div class="mt-4 pt-2 border-t border-gray-100 text-center">
                                <span class="text-2xl font-bold text-blue-600 tracking-tight">${priceDisplay}</span>
                            </div>

                            <div class="flex gap-2 mt-3 button-group">
                                ${videoButtonHtml}
                                <button class="action-btn ${loadButtonClass} py-2 px-3 rounded-md bg-gray-300 text-gray-500 font-medium cursor-not-allowed" disabled>
                                    載入中...
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;

            if (typeof window.updateAuthUI === 'function') {
                window.updateAuthUI();
            }
        }

        vibeFetchLessons()
            .then(data => {
                renderLessons(data, 'basic');
            })
            .catch(error => console.error('資料讀取失敗:', error));

        window.updateAuthUI = function () {
            const currentCards = document.querySelectorAll('.lesson-card');
            const user = auth.currentUser;

            currentCards.forEach(card => {
                if (user) {
                    checkLessonAuthorization(card, user);
                } else {
                    updateCardAction(card, 'NOT_LOGGED_IN');
                }
            });
        }

        onAuthStateChanged(auth, (user) => {
            window.updateAuthUI();
        });
    </script>
</body>

</html>
