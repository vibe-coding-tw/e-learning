    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO6Y6Pa7b7zbieJIErysaNF6-UqbT8KJw",
            authDomain: "e-learning-942f7.firebaseapp.com",
            projectId: "e-learning-942f7",
            storageBucket: "e-learning-942f7.firebasestorage.app",
            messagingSenderId: "878397058574",
            appId: "1:878397058574:web:28aaa07a291ee3baab165f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const functions = getFunctions(app, 'asia-east1');

        // Expose to window for course-shared.js?v=20260404REV vibeFetchLessons
        window.vibeApp = app;
        window.getFunctions = getFunctions;
        window.httpsCallable = httpsCallable;

        const checkAuthFunction = httpsCallable(functions, 'checkPaymentAuthorization');
        const CART_URL = 'cart.html';
        const AUTH_URL = '/auth.html?v=' + new Date().getTime(); // Prevent cache

        // 購物車邏輯
        function addToCart(productId, productName, productPrice, isPhysical) {
            let cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            if (cart[productId]) return { success: false };
            cart[productId] = { name: productName, price: parseInt(productPrice, 10), quantity: 1, isPhysical: !!isPhysical };
            localStorage.setItem('vibeCodingCart', JSON.stringify(cart));
            return { success: true };
        }

        window.handleAddToCartConfirmation = function (courseId, courseName, coursePrice, isPhysical) {
            const cart = JSON.parse(localStorage.getItem('vibeCodingCart') || '{}');
            if (cart[courseId]) { alert(`⚠️ 「${courseName}」已在購物車中！`); return; }
            if (confirm(`您確定要將課程「${courseName}」加入購物車嗎？`)) {
                addToCart(courseId, courseName, coursePrice, isPhysical);
                // ★★★ 移除 Alert，直接跳轉 ★★★
                window.location.href = CART_URL;
            }
        }

        window.handleLogin = async () => { await signInWithPopup(auth, new GoogleAuthProvider()); };
        window.handleLogout = async () => { await signOut(auth); };

        function updateCardAction(cardElement, status) {
            const btn = cardElement.querySelector('.action-btn');
            if (!btn) return;

            const courseId = cardElement.dataset.courseId;
            const courseName = cardElement.dataset.courseName;
            const coursePrice = cardElement.dataset.coursePrice;
            const isPhysical = cardElement.dataset.isPhysical === 'true';
            const classroomUrl = cardElement.dataset.classroomUrl;
            const isPricedPhysicalProduct = isPhysical && parseInt(coursePrice || "0", 10) > 0;

            // 確保按鈕寬度邏輯正確
            const buttonGroup = cardElement.querySelector('.button-group');
            const hasVideoButton = buttonGroup && buttonGroup.children.length > 1;
            const widthClass = hasVideoButton ? 'flex-1' : 'w-full';

            btn.onclick = null;
            btn.disabled = false;

            if (isPricedPhysicalProduct) {
                btn.textContent = `🛒 加入購物車`;
                btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
                btn.onclick = () => window.handleAddToCartConfirmation(courseId, courseName, coursePrice, isPhysical);
            } else if (status === 'AUTHORIZED') {
                btn.textContent = '✅ 進入課程內容';
                btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-green-600 hover:bg-green-700 text-white font-medium transition`;
                btn.onclick = () => { 
                    if (!classroomUrl) {
                        alert("⚠️ 課程連結尚未備妥，請聯繫客服。");
                        return;
                    }
                    window.location.href = `${AUTH_URL}&url=${encodeURIComponent(classroomUrl)}&id=${courseId}&price=${coursePrice}`; 
                };
            } else if (status === 'NOT_LOGGED_IN' || status === 'UNAUTHORIZED' || status === 'ERROR') {
                btn.textContent = `🛒 加入購物車`;
                btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
                btn.onclick = () => window.handleAddToCartConfirmation(courseId, courseName, coursePrice, isPhysical);

            } else if (status === 'LOADING') {
                btn.textContent = '載入中...';
                btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-gray-400 text-white font-medium cursor-not-allowed`;
                btn.disabled = true;
            }
        }

        async function checkLessonAuthorization(cardElement, user) {
            updateCardAction(cardElement, 'LOADING');
            const courseId = cardElement.dataset.courseId;
            const classroomUrl = cardElement.dataset.classroomUrl;

            // [V13.0.13] Standardized Tutor Mode Integration
            const tutorModeActive = localStorage.getItem('adminTutorMode') === 'true';

            try {
                // 傳送 pageId 與 tutorMode 狀態
                const result = await checkAuthFunction({ 
                    pageId: courseId,
                    tutorMode: tutorModeActive
                });

                // ★★★ 判斷 authorized 布林值 ★★★
                if (result.data && result.data.authorized) {
                    updateCardAction(cardElement, 'AUTHORIZED');
                } else {
                    updateCardAction(cardElement, 'UNAUTHORIZED');
                }

            } catch (error) {
                console.error(`授權檢查失敗:`, error);
                // 即使失敗，也要顯示購物車按鈕，避免卡住
                updateCardAction(cardElement, 'UNAUTHORIZED');
            }
        }

        window.updateAuthUI = function () {
            const currentCards = document.querySelectorAll('.lesson-card');
            const user = auth.currentUser;

            currentCards.forEach(card => {
                if (user) {
                    checkLessonAuthorization(card, user);
                } else {
                    updateCardAction(card, 'NOT_LOGGED_IN');
                }
            });
        }

        onAuthStateChanged(auth, (user) => {
            const userDisplay = document.getElementById('user-display');
            const loginBtn = document.getElementById('login-btn');

            if (user) {
                userDisplay.textContent = `您好, ${user.displayName || '使用者'}`;
                userDisplay.classList.remove('hidden');
                loginBtn.textContent = '登出';
                loginBtn.onclick = window.handleLogout;
            } else {
                userDisplay.textContent = '訪客';
                userDisplay.classList.add('hidden');
                loginBtn.textContent = '登入';
                loginBtn.onclick = window.handleLogin;
            }

            window.updateAuthUI();
        });
    </script>
</body>
