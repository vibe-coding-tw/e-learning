<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學習路徑</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./style.f0b432c70be1.css">
</head>
<body class="flex flex-col min-h-screen">
  <div id="nav-placeholder" data-root="." data-show-auth="true"></div>
  <script type="module" src="./js/nav-component.24e7f93d3767.js"></script>
  <script src="./js/course-shared.d2682c3cd3a3.js"></script>

  <div class="container mx-auto px-4 py-8 flex-grow">
    <div class="page-header text-center mb-10">
      <h1 id="page-title" class="text-3xl font-bold text-gray-800">學習路徑</h1>
      <div class="section-title-underline"></div>
    </div>
    <div id="lesson-container" class="p-2"></div>
  </div>

  <div id="footer-placeholder" data-root="."></div>
  <script src="./js/footer-component.592aaceeda6b.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";
    import { firebaseConfig, connectFirebaseEmulators } from "./js/firebase-local.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const functions = getFunctions(app, "asia-east1");
    connectFirebaseEmulators({ auth, db, functions });

    window.vibeApp = app;
    window.getFunctions = getFunctions;
    window.httpsCallable = httpsCallable;

    const checkAuthFunction = httpsCallable(functions, "checkPaymentAuthorization");
    const getLessonsFunc = httpsCallable(functions, "getLessonsMetadata");
    const AUTH_URL = "/auth.html?v=" + Date.now();
    const CART_URL = "cart.html";

    function detectUiLocale() {
      try {
        const stored = localStorage.getItem('vibe_user_locale');
        if (stored) {
          const clean = String(stored).trim().toLowerCase();
          if (clean.startsWith('zh')) return 'zh-TW';
          if (clean.startsWith('en')) return 'en';
        }
      } catch (_) {}

      try {
        const params = new URLSearchParams(window.location.search);
        const queryLang = params.get('lang') || params.get('locale');
        if (queryLang) {
          const clean = String(queryLang).trim().toLowerCase();
          if (clean.startsWith('zh')) return 'zh-TW';
          if (clean.startsWith('en')) return 'en';
        }
      } catch (_) {}

      const htmlLang = String(document.documentElement?.lang || "").toLowerCase();
      const navLang = String(navigator.language || "").toLowerCase();
      const raw = htmlLang || navLang;
      if (raw.startsWith("zh")) return "zh-TW";
      return "en";
    }

    const TRANSLATIONS = {
      "zh-TW": {
        title: "學習路徑",
        hardwareHeader: "硬體設備",
        specsHeader: "電腦規格推薦",
        coreContentLabel: "核心內容：",
        previewBtn: "▶ 課程預覽",
        loadingText: "載入中...",
        loginFreeBtn: "👤 請先登入 (免費)",
        loginBtn: "👤 請先登入",
        addToCartBtn: "🛒 加入購物車",
        enterCourseBtn: "✅ 進入課程內容",
        freeLabel: "免費",
        emptyCategory: "目前此分類尚無課程。",
        addToCartPhysical: "🛒 加入購物車",
        alreadyInCart: "⚠️ 「{name}」已在購物車中！",
        coursesConfigMissing: "⚠️ 課程連結尚未備妥，請聯繫客服。",
        "tw-common": "課前準備",
        "tw-car-starter": "入門課程",
        "tw-car-basic": "基礎課程",
        "tw-car-advanced": "進階課程",
        "en-common": "課前準備",
        "en-car-starter": "入門課程",
        "en-car-basic": "基礎課程",
        "en-car-advanced": "進階課程"
      },
      "en": {
        title: "Learning Path",
        hardwareHeader: "Hardware Kits",
        specsHeader: "Computer Spec Recommendations",
        coreContentLabel: "Core Content:",
        previewBtn: "▶ Course Preview",
        loadingText: "Loading...",
        loginFreeBtn: "👤 Login (Free)",
        loginBtn: "👤 Login",
        addToCartBtn: "🛒 Add to Cart",
        enterCourseBtn: "✅ Enter Course",
        freeLabel: "Free",
        emptyCategory: "No courses available in this category yet.",
        addToCartPhysical: "🛒 Add to Cart",
        alreadyInCart: "⚠️ \"{name}\" is already in your cart!",
        coursesConfigMissing: "⚠️ Course link not ready, please contact customer support.",
        "tw-common": "Preparation",
        "tw-car-starter": "Starter Course",
        "tw-car-basic": "Basic Course",
        "tw-car-advanced": "Advanced Course",
        "en-common": "Preparation",
        "en-car-starter": "Starter Course",
        "en-car-basic": "Basic Course",
        "en-car-advanced": "Advanced Course"
      }
    };

    function normalizeLocaleCode(raw = "") {
      const v = String(raw || "").trim().toLowerCase();
      if (!v) return "tw";
      if (v.startsWith("zh")) return "tw";
      return v.split(/[-_]/)[0] || "en";
    }
    function normalizeLevel(raw = "") {
      const v = String(raw || "").trim().toLowerCase();
      if (!v) return "common";
      if (v === "started" || v === "start") return "starter";
      if (v === "prepare") return "common";
      return v;
    }
    function normalizeTrack(raw = "") {
      const v = String(raw || "").trim().toLowerCase();
      return v || "common";
    }
    function categoryFromLesson(lesson = {}) {
      const locale = normalizeLocaleCode(lesson.locale || "");
      const level = normalizeLevel(lesson.level || lesson.category || "");
      const track = normalizeTrack(lesson.track || "");
      if (level === "common") return `${locale}-common`;
      if (track === "common") return `${locale}-${level}`;
      return `${locale}-${track}-${level}`;
    }
    let categoryLabelsMap = {};
    function titleizeCategoryKey(path = "") {
      return String(path || "")
        .split("-")
        .filter(Boolean)
        .map((part) => part.length <= 3 ? part.toUpperCase() : part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }
    function pickCategoryLabelFromLesson(lesson = {}, uiLocale = "zh-TW") {
      const isZh = uiLocale.startsWith("zh");
      const candidates = [];
      if (isZh) {
        candidates.push(
          lesson.learningPathLabelZhTw,
          lesson.learningPathLabelZh,
          lesson.categoryLabelZhTw,
          lesson.categoryLabelZh,
          lesson.navLabelZhTw,
          lesson.navLabelZh
        );
      } else {
        candidates.push(
          lesson.learningPathLabelEn,
          lesson.categoryLabelEn,
          lesson.navLabelEn
        );
      }
      candidates.push(
        lesson.learningPathLabel,
        lesson.categoryLabel,
        lesson.navLabel
      );
      const hit = candidates.find((v) => typeof v === "string" && v.trim());
      return hit ? hit.trim() : "";
    }
    function deriveCategoryLabels(lessons = [], existingMap = {}, uiLocale = "zh-TW") {
      const derived = { ...(existingMap || {}) };
      (Array.isArray(lessons) ? lessons : []).forEach((lesson) => {
        const key = categoryFromLesson(lesson);
        if (!key || derived[key]) return;
        const label = pickCategoryLabelFromLesson(lesson, uiLocale);
        if (label) derived[key] = label;
      });
      return derived;
    }
    function categoryLabel(path = "") {
      const uiLocale = detectUiLocale();
      const dict = TRANSLATIONS[uiLocale];
      if (dict && dict[path]) return dict[path];
      return categoryLabelsMap[path] || titleizeCategoryKey(path);
    }
    function resolveUnitFile(lesson = {}) {
      const pickFile = (value = "") => String(value || "").split("/").pop().split("?")[0];
      if (Array.isArray(lesson.courseUnits) && lesson.courseUnits.length > 0) {
        const file = pickFile(lesson.courseUnits[0]);
        if (file) return normalizeLegacyUnitFilename(file);
      }
      if (lesson.entryUnitId) {
        const file = pickFile(lesson.entryUnitId);
        if (file) return normalizeLegacyUnitFilename(file);
      }
      if (lesson.contentRef) {
        const file = pickFile(lesson.contentRef);
        if (file) return normalizeLegacyUnitFilename(file);
      }
      if (lesson.classroomUrl && /\.html(?:$|\?)/i.test(lesson.classroomUrl)) {
        const file = pickFile(lesson.classroomUrl);
        if (file) return normalizeLegacyUnitFilename(file);
      }
      return "";
    }

    function normalizeLegacyUnitFilename(file = "") {
      const v = String(file || "").trim();
      if (!v) return "";
      if (/^tw-(common|car-(starter|basic|advanced))-/i.test(v)) return v;
      if (/^start-\d{2}-unit-/i.test(v)) return v.replace(/^start-\d{2}-unit-/i, "tw-car-starter-");
      if (/^basic-\d{2}-unit-/i.test(v)) return v.replace(/^basic-\d{2}-unit-/i, "tw-car-basic-");
      if (/^(adv|advanced)-\d{2}-unit-/i.test(v)) return v.replace(/^(adv|advanced)-\d{2}-unit-/i, "tw-car-advanced-");
      if (/^\d{2}-unit-/i.test(v)) return v.replace(/^\d{2}-unit-/i, "tw-common-");
      return v;
    }

    function resolveEntryUrl(lesson = {}, fallbackUrl = "") {
      if (Array.isArray(lesson.courseUnits) && lesson.courseUnits.length > 0) {
        const firstUnit = normalizeLegacyUnitFilename(String(lesson.courseUnits[0]));
        if (firstUnit) return `/courses/${firstUnit}`;
      }
      const entryUnit = lesson.entryUnitId
        ? normalizeLegacyUnitFilename(String(lesson.entryUnitId))
        : "";
      if (entryUnit) return `/courses/${entryUnit}`;
      const unitFile = resolveUnitFile(lesson);
      if (unitFile) return `/courses/${unitFile}`;
      return lesson.classroomUrl || fallbackUrl || "";
    }

    function addToCart(productId, productName, productPrice, isPhysical) {
      const cart = JSON.parse(localStorage.getItem("vibeCodingCart") || "{}");
      if (cart[productId]) return false;
      cart[productId] = { name: productName, price: Number(productPrice || 0), quantity: 1, isPhysical: !!isPhysical };
      localStorage.setItem("vibeCodingCart", JSON.stringify(cart));
      return true;
    }

    function updateCardAction(card, status) {
      const btn = card.querySelector(".action-btn");
      if (!btn) return;
      const courseId = card.dataset.courseId;
      const authPageId = card.dataset.authPageId || courseId;
      const courseName = card.dataset.courseName;
      const coursePrice = Number(card.dataset.coursePrice || 0);
      const isPhysical = card.dataset.isPhysical === "true";
      const classroomUrl = card.dataset.classroomUrl;
      const hasVideoButton = !!card.querySelector(".video-btn");
      const widthClass = hasVideoButton ? "flex-1 w-full" : "w-full";
      btn.onclick = null;
      btn.disabled = false;

      const uiLocale = detectUiLocale();
      const t = TRANSLATIONS[uiLocale];

      if (isPhysical && coursePrice > 0) {
        btn.textContent = t.addToCartPhysical;
        btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
        btn.onclick = () => {
          if (addToCart(courseId, courseName, coursePrice, isPhysical)) window.location.href = CART_URL;
          else alert(t.alreadyInCart.replace("{name}", courseName));
        };
        return;
      }
      if (status === "AUTHORIZED") {
        btn.textContent = t.enterCourseBtn;
        btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-blue-600 hover:bg-blue-700 text-white font-medium transition`;
        btn.onclick = () => {
          if (!classroomUrl) return alert(t.coursesConfigMissing);
          const langParam = uiLocale === "en" ? "&lang=en" : "";
          window.location.href = `${AUTH_URL}&url=${encodeURIComponent(classroomUrl)}&id=${encodeURIComponent(authPageId)}&price=${coursePrice}${langParam}`;
        };
        return;
      }
      if (status === "NOT_LOGGED_IN") {
        btn.textContent = coursePrice === 0 ? t.loginFreeBtn : t.loginBtn;
        btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
        btn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        return;
      }
      if (status === "UNAUTHORIZED" || status === "ERROR") {
        btn.textContent = t.addToCartBtn;
        btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
        btn.onclick = () => {
          if (addToCart(courseId, courseName, coursePrice, isPhysical)) window.location.href = CART_URL;
          else alert(t.alreadyInCart.replace("{name}", courseName));
        };
        return;
      }
      btn.textContent = t.loadingText;
      btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-gray-400 text-white font-medium cursor-not-allowed`;
      btn.disabled = true;
    }

    async function checkLessonAuthorization(card, user) {
      updateCardAction(card, "LOADING");
      const courseId = card.dataset.courseId;
      const authPageId = card.dataset.authPageId || courseId;
      const isFreeCourse = Number(card.dataset.coursePrice || 0) === 0;
      if (isFreeCourse && user) return updateCardAction(card, "AUTHORIZED");
      const tutorModeActive = localStorage.getItem("adminTutorMode") === "true";
      try {
        const result = await checkAuthFunction({ pageId: authPageId, tutorMode: tutorModeActive });
        updateCardAction(card, result?.data?.authorized ? "AUTHORIZED" : "UNAUTHORIZED");
      } catch (_) {
        updateCardAction(card, "UNAUTHORIZED");
      }
    }

    function isCatalogCourseLesson(lesson = {}) {
      const metadataType = String(lesson?.metadataType || "").toLowerCase();
      if (lesson?.hiddenFromCatalog === true) return false;
      if (lesson?.isPhysical === true) return false;
      if (metadataType === "product" || metadataType === "legacy_product") return false;
      if (metadataType === "course") return true;
      return Array.isArray(lesson?.courseUnits) || String(lesson?.courseId || "").endsWith(".html");
    }

    function toList(value) {
      if (Array.isArray(value)) return value.filter(Boolean).map(String);
      if (typeof value === "string" && value.trim()) return [value.trim()];
      return [];
    }

    function pickImage(lesson = {}) {
      return (
        lesson.cardImageUrl ||
        lesson.imageUrl ||
        lesson.thumbnailUrl ||
        lesson.bannerUrl ||
        ""
      );
    }

    function pickVideo(lesson = {}) {
      if (lesson.videoId) return `https://www.youtube.com/embed/${lesson.videoId}?autoplay=1&enablejsapi=1`;
      if (lesson.videoUrl) return lesson.videoUrl;
      return "";
    }

    function openVideo(url = "") {
      if (!url) return;
      if (typeof window.enterMediaMode === "function") {
        window.enterMediaMode("video", url);
        return;
      }
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function renderSection(title, html) {
      const titleHtml = title ? `<h2 class="text-2xl font-bold text-slate-800 mb-4">${title}</h2>` : "";
      return `
        <section class="mb-10">
          ${titleHtml}
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-2">${html}</div>
        </section>
      `;
    }

    function renderLessons(lessons, pathKey) {
      const uiLocale = detectUiLocale();
      const t = TRANSLATIONS[uiLocale];

      const shouldHideCourse = (lesson = {}) => {
        return lesson.hiddenFromCatalog === true;
      };

      const container = document.getElementById("lesson-container");
      const title = document.getElementById("page-title");
      title.textContent = categoryLabel(pathKey);
      const catalogCourses = lessons.filter(isCatalogCourseLesson);

      let targetPathKey = pathKey;
      const hasDirectCourses = catalogCourses.some((x) => categoryFromLesson(x) === pathKey);
      const hasDirectHardware = lessons.some(
        (x) => x?.isPhysical === true &&
               x?.hiddenFromCatalog !== true &&
               Array.isArray(x?.learningPaths) &&
               x.learningPaths.includes(pathKey)
      );
      if (!hasDirectCourses && !hasDirectHardware && pathKey.startsWith("en-")) {
        targetPathKey = pathKey.replace(/^en-/, "tw-");
      }

      let rows = catalogCourses
        .filter((x) => categoryFromLesson(x) === targetPathKey)
        .filter((x) => !shouldHideCourse(x));
      let hardwareRows = lessons.filter(
        (x) => x?.isPhysical === true &&
               x?.hiddenFromCatalog !== true &&
               Array.isArray(x?.learningPaths) &&
               x.learningPaths.includes(targetPathKey)
      );
      if (!rows.length && !hardwareRows.length && pathKey !== "tw-common") {
        container.innerHTML = `<p class="text-center text-gray-500 w-full col-span-3 py-12">${t.emptyCategory}</p>`;
        return;
      }
      const courseHtml = rows.map((lesson) => {
        const entryUrl = resolveEntryUrl(lesson);
        const unitFile = resolveUnitFile(lesson);
        const price = Number(lesson.price || 0);
        // 英文模式優先讀取 *En 欄位，fallback 到中文欄位
        const isEn = uiLocale === 'en';
        const displayTitle = String((isEn ? (lesson.titleEn || lesson.title) : lesson.title) || lesson.courseId || "");
        const displayKey = isEn ? (lesson.courseKey || lesson.courseId || "").replace(/^tw-/, "en-") : (lesson.courseKey || lesson.courseId || "");
        const contentList = toList(isEn ? (lesson.coreContentEn || lesson.coreContent) : lesson.coreContent).slice(0, 4);
        const summary = String(
          (isEn ? (lesson.summaryEn || lesson.summary || lesson.descriptionEn || lesson.description)
                : (lesson.summary || lesson.description))
          || (isEn ? "Course content loaded dynamically." : "課程內容由系統資料動態載入。")
        );
        const duration = String(lesson.duration || lesson.estimatedDuration || "");
        const lessonLabel = String(
          (isEn ? (lesson.lessonLabelEn || lesson.lessonLabel || lesson.tagText)
                : (lesson.lessonLabel || lesson.tagText))
          || ""
        ).trim();
        const displayLessonLabel = lessonLabel || (isEn ? "Course Unit" : "課程單元");
        const icon = String(lesson.cardIcon || lesson.icon || "📘");
        const imageUrl = pickImage(lesson);
        const videoUrl = pickVideo(lesson);
        const disablePreview = lesson.previewDisabled === true;
        const videoButton = (videoUrl && !disablePreview)
          ? `<button class="video-btn flex-1 w-full py-2 px-3 rounded-md border border-red-500 text-red-600 font-medium hover:bg-red-50 transition-colors">${t.previewBtn}</button>`
          : "";
        const actionButtonClass = videoUrl ? "flex-1 w-full" : "w-full";
        const listHtml = contentList.length
          ? `<ul class="list-disc pl-5 space-y-1">${contentList.map((x) => `<li>${x}</li>`).join("")}</ul>`
          : `<p class="text-sm text-slate-500">${summary}</p>`;
        const imageHtml = imageUrl
          ? `<div class="rounded-xl overflow-hidden border border-slate-200 bg-slate-50 mb-3"><img src="${imageUrl}" alt="${displayTitle || "course"}" class="w-full h-40 object-cover"></div>`
          : "";
        return `
          <div class="lesson-card bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-lg transition"
               data-course-id="${lesson.courseId || ""}"
               data-auth-page-id="${unitFile || lesson.courseId || ""}"
               data-course-name="${lesson.title || ""}"
               data-course-price="${price}"
               data-is-physical="${lesson.isPhysical === true}"
               data-classroom-url="${entryUrl}">
            <div class="flex items-start justify-between gap-3 mb-3">
              <div class="min-w-0 text-xs text-slate-500 truncate">${displayKey}</div>
              ${duration ? `<span class="flex-shrink-0 text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded">${duration}</span>` : ""}
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">${displayTitle || lesson.courseId || "Untitled Course"}</h2>
            <div class="text-xs text-blue-700 bg-blue-50 border border-blue-100 rounded px-2 py-1 inline-block mb-3">${displayLessonLabel}</div>
            ${imageHtml}
            <div class="text-sm text-slate-700 mb-3"><span class="mr-2">${icon}</span>${summary}</div>
            <div class="text-sm text-slate-700 mb-4">
              <strong class="text-slate-900 block mb-1">${t.coreContentLabel}</strong>
              ${listHtml}
            </div>
            <div class="mt-4 pt-3 border-t border-slate-100 text-center">
              <span class="text-2xl font-bold text-blue-600">${price === 0 ? t.freeLabel : (uiLocale === 'en' ? `USD $${Math.round(price / 30)}` : `NT$ ${price.toLocaleString()}`)}</span>
            </div>
            <div class="mt-3 flex flex-col sm:flex-row gap-2">
              ${videoButton}
              <button class="action-btn ${actionButtonClass} py-2 px-3 rounded-md bg-gray-300 text-gray-500 font-medium cursor-not-allowed" disabled>${t.loadingText}</button>
            </div>
          </div>
        `;
      }).join("");

      const hardwareHtml = hardwareRows.map((lesson) => {
        const entryUrl = resolveEntryUrl(lesson);
        const unitFile = resolveUnitFile(lesson);
        const price = Number(lesson.price || 0);
        const isEn = uiLocale === 'en';
        const displayKey = isEn ? (lesson.courseKey || lesson.courseId || "").replace(/^tw-/, "en-") : (lesson.courseKey || lesson.courseId || "");
        const hardwareId = String(lesson.courseId || "").toLowerCase();
        const imageUrl = pickImage(lesson);
        const summary = String(lesson.summary || lesson.description || (uiLocale === "zh-TW" ? "硬體設備推薦" : "Hardware recommendations"));
        const contentList = toList(lesson.coreContent).slice(0, 4);
        const listHtml = contentList.length
          ? `<ul class="list-disc pl-5 space-y-1">${contentList.map((x) => `<li>${x}</li>`).join("")}</ul>`
          : `<p class="text-sm text-slate-500">${summary}</p>`;
        const objectPos = hardwareId === "car-intro" ? "50% 50%" : (hardwareId === "car-advanced" ? "50% 28%" : "50% 50%");
        const objectScale = hardwareId === "car-advanced" ? "scale(1.08)" : (hardwareId === "car-intro" ? "scale(1.02)" : "scale(1)");
        const imageHtml = imageUrl
          ? `<div class="rounded-xl overflow-hidden border border-slate-200 bg-white mb-3 h-56"><img src="${imageUrl}" alt="${lesson.title || "hardware"}" class="w-full h-full object-cover" style="object-position:${objectPos}; transform:${objectScale};"></div>`
          : "";
        return `
          <div class="lesson-card bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-lg transition"
               data-course-id="${lesson.courseId || ""}"
               data-auth-page-id="${unitFile || lesson.courseId || ""}"
               data-course-name="${lesson.title || ""}"
               data-course-price="${price}"
               data-is-physical="true"
               data-classroom-url="${entryUrl}">
            <div class="min-w-0 text-xs text-slate-500 mb-2 truncate">${displayKey}</div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">${lesson.title || (uiLocale === "zh-TW" ? "硬體設備" : "Hardware Kit")}</h3>
            ${imageHtml}
            <div class="text-sm text-slate-700 mb-4">${listHtml}</div>
            <div class="mt-4 pt-3 border-t border-slate-100 text-center">
              <span class="text-2xl font-bold text-blue-600">${price === 0 ? t.freeLabel : (uiLocale === 'en' ? `USD $${Math.round(price / 30)}` : `NT$ ${price.toLocaleString()}`)}</span>
            </div>
            <div class="mt-3">
              <button class="action-btn w-full py-2 px-3 rounded-md bg-gray-300 text-gray-500 font-medium cursor-not-allowed" disabled>${t.loadingText}</button>
            </div>
          </div>
        `;
      }).join("");

      const specsRows = lessons.filter(
        (x) => x?.metadataType === "spec" &&
               Array.isArray(x?.learningPaths) &&
               x.learningPaths.includes(targetPathKey)
      );
      const specsHtml = specsRows.map((spec) => {
        const specImg = pickImage(spec);
        const specSummary = String(spec.summary || spec.description || "");
        const specContentList = toList(spec.coreContent);
        return `
          <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
            ${specImg ? `<div class="rounded-xl overflow-hidden border border-slate-200 bg-slate-50 mb-3"><img src="${specImg}" alt="${spec.title}" class="w-full h-40 object-cover"></div>` : ""}
            <h3 class="text-xl font-bold text-slate-800 mb-2">${spec.title || ""}</h3>
            <p class="text-sm text-slate-600 mb-3">${specSummary}</p>
            <ul class="list-disc pl-5 space-y-1 text-sm text-slate-700">${specContentList.map((x) => `<li>${x}</li>`).join("")}</ul>
          </div>
        `;
      }).join("");

      let pageHtml = "";
      if (courseHtml) pageHtml += renderSection("", courseHtml);
      if (hardwareHtml) pageHtml += renderSection(t.hardwareHeader, hardwareHtml);
      if (specsHtml) pageHtml += renderSection(t.specsHeader, specsHtml);
      container.innerHTML = pageHtml;

      container.querySelectorAll(".video-btn").forEach((btn, i) => {
        const videoUrl = pickVideo(rows[i] || {});
        btn.addEventListener("click", () => openVideo(videoUrl));
      });
    }

    async function init() {
      const uiLocale = detectUiLocale();
      const t = TRANSLATIONS[uiLocale];
      document.title = t.title;

      const pathKey = (new URLSearchParams(location.search).get("path") || (uiLocale === "en" ? "en-common" : "tw-common")).toLowerCase();
      const result = await getLessonsFunc({});
      const lessons = Array.isArray(result?.data?.lessons) ? result.data.lessons : [];
      categoryLabelsMap = deriveCategoryLabels(lessons, result?.data?.categoryLabels || {}, uiLocale);
      renderLessons(lessons, pathKey);
      window.updateAuthUI = function () {
        const cards = document.querySelectorAll(".lesson-card");
        const user = auth.currentUser;
        cards.forEach((card) => {
          if (user) checkLessonAuthorization(card, user);
          else updateCardAction(card, "NOT_LOGGED_IN");
        });
      };
      onAuthStateChanged(auth, () => window.updateAuthUI());
    }
    init();
    window.handleLogout = async () => { await signOut(auth); };
  </script>
</body>
</html>
