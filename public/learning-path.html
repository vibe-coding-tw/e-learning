    function getLocalPreferredDistributorId() {
      return localStorage.getItem('vibe_user_preferred_distributor')
                         || localStorage.getItem('preferredDistributorId')
                         || '';
    }

    function persistLocalPreferredDistributorId(distributorId = '') {
      const normalized = String(distributorId || '').trim();
      if (!normalized) return;
      localStorage.setItem('vibe_user_preferred_distributor', normalized);
      localStorage.setItem('preferredDistributorId', normalized);
    }

    function getScopedTutorModeForUid(uid = "") {
      const cleanUid = String(uid || "").trim();
      if (!cleanUid) return false;
      try {
        const scopedValue = localStorage.getItem(`adminTutorMode:${cleanUid}`);
        return scopedValue === "true";
      } catch (_) {
        return false;
      }
    }

    async function resolveLessonsDistributorId() {
      const localPreferredDistributorId = getLocalPreferredDistributorId();
      const currentUser = auth.currentUser;
      if (!currentUser) return localPreferredDistributorId;

      try {
        const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
        const userData = userSnap.exists() ? (userSnap.data() || {}) : {};
        const preferredDistributorId = String(
          userData.preferredDistributorId
          || userData.distributorId
          || userData.commercial?.distributorId
          || ''
        ).trim();
        if (preferredDistributorId) return preferredDistributorId;

        const preferredRegion = String(userData.preferredRegion || userData.region || '').trim().toUpperCase();
        if (preferredRegion === 'TW') return 'default-twd';
        if (preferredRegion === 'US') return 'default-usd';
      } catch (error) {
        console.warn('[learning-path] Failed to resolve preferred distributor from Firestore:', error);
      }

      return localPreferredDistributorId;
    }

    window.__getLessonsMetadata = async function () {
      const distributorId = await resolveLessonsDistributorId();
      const res = await getLessonsFunc({ distributorId });
      return res?.data || {};
    };
    const AUTH_URL = "/auth.html?v=" + Date.now();

    function detectUiLocale() {
      if (typeof window.detectUiLocale === 'function') return window.detectUiLocale();
      return "zh-TW";
    }

    function normalizeLocaleCode(raw = "") {
      const v = String(raw || "").trim().toLowerCase();
      if (!v) return "tw";
      if (v.startsWith("zh")) return "tw";
      return v.split(/[-_]/)[0] || "en";
    }
    function normalizeLevel(raw = "") {
      const v = String(raw || "").trim().toLowerCase();
      if (!v) return "common";
      if (v === "started" || v === "start") return "starter";
      if (v === "prepare") return "common";
      return v;
    }
    function normalizeTrack(raw = "") {
      const v = String(raw || "").trim().toLowerCase();
      return v || "common";
    }
    function normalizeCanonicalLearningPathKey(value = "") {
      const fromUtils = typeof normalizeCanonicalLearningPathKeyFromUtils === "function"
        ? normalizeCanonicalLearningPathKeyFromUtils(value)
        : "";
      if (fromUtils) return fromUtils;
      const v = String(value || "").trim().toLowerCase().split('?')[0].split('#')[0].replace(/\.html$/i, '');
      if (!v) return "";
      if (v === "common" || v === "car-starter" || v === "car-basic" || v === "car-advanced") return v;
      if (/^(?:tw|en)-common$/i.test(v)) return "common";
      if (/^(?:tw|en)-car-(starter|basic|advanced)$/i.test(v)) return v.replace(/^(?:tw|en)-/i, "");
      if (/^start-\d{2}-unit-/i.test(v)) return "car-starter";
      if (/^basic-\d{2}-unit-/i.test(v)) return "car-basic";
      if (/^(?:adv|advanced)-\d{2}-unit-/i.test(v)) return "car-advanced";
      if (/^\d{2}-unit-/i.test(v)) return "common";
      if (/^prepare-\d+/i.test(v)) return "common";
      return v;
    }
    function legacyPathKeyFromCanonical(value = "", uiLocale = "zh-TW") {
      const canonical = normalizeCanonicalLearningPathKey(value);
      if (!canonical) return "";
      if (typeof legacyLearningPathKeyFromCanonical === "function") {
        return legacyLearningPathKeyFromCanonical(canonical, uiLocale);
      }
      const prefix = String(uiLocale || "").toLowerCase().startsWith("en") ? "en" : "tw";
      if (canonical === "common") return `${prefix}-common`;
      return `${prefix}-${canonical}`;
    }
    function pathKeyCandidates(value = "", uiLocale = "zh-TW") {
      if (typeof learningPathKeyCandidatesFromValue === "function") {
        return learningPathKeyCandidatesFromValue(value, uiLocale);
      }
      const canonical = normalizeCanonicalLearningPathKey(value);
      return [...new Set([String(value || "").trim(), canonical, legacyPathKeyFromCanonical(canonical, "zh-TW"), legacyPathKeyFromCanonical(canonical, "en")].filter(Boolean))];
    }
    function normalizeCanonicalCourseKey(value = "") {
      const raw = String(value || "")
        .trim()
        .replace(/\.html$/i, "")
        .replace(/^(?:tw|en)-/i, "")
        .toLowerCase();
      if (!raw) return "";
      if (/^start-\d{2}-unit-/i.test(raw)) return raw.replace(/^start-\d{2}-unit-/i, "car-starter-");
      if (/^basic-\d{2}-unit-/i.test(raw)) return raw.replace(/^basic-\d{2}-unit-/i, "car-basic-");
      if (/^(?:adv|advanced)-\d{2}-unit-/i.test(raw)) return raw.replace(/^(?:adv|advanced)-\d{2}-unit-/i, "car-advanced-");
      if (/^\d{2}-unit-/i.test(raw)) return raw.replace(/^\d{2}-unit-/i, "common-");
      if (/^prepare-\d+-(.+)$/i.test(raw)) return raw.replace(/^prepare-\d+-/i, "common-");
      if (/^(?:common|car-(?:starter|basic|advanced))-(.+)$/i.test(raw)) return raw;
      return raw;
    }
    function resolveMatchingPathKeys(pathKey = "") {
      return pathKeyCandidates(pathKey);
    }
    function getPricingApi() {
      return window.vibePricing || {
      resolveLessonPrice(lesson = {}, locale = "zh-TW") {
          const amount = Number(lesson?.dealerPrice ?? 0);
          return { amount: Number.isFinite(amount) ? amount : 0, currency: String(lesson?.dealerCurrency || lesson?.currency || "").toUpperCase() };
        },
        formatPrice(priceEntry = {}, locale = "zh-TW") {
          const amount = Number(priceEntry?.amount ?? priceEntry ?? 0);
          const currency = String(priceEntry?.currency || "").toUpperCase();
          if (!amount) return String(locale || "").startsWith("en") ? "Free" : "免費";
          if (!currency) {
            try {
              return new Intl.NumberFormat(String(locale || "").startsWith("en") ? "en-US" : "zh-TW").format(amount);
            } catch (_) {
              return amount.toLocaleString();
            }
          }
          if (currency === "TWD") {
            return `TWD ${Math.round(amount).toLocaleString()}`;
          }
          return `${currency} ${amount.toLocaleString()}`;
        }
      };
    }
    function formatCoursePrice(priceEntry = {}, locale = "zh-TW") {
      return getPricingApi().formatPrice(priceEntry, locale);
    }
    function translateLessonLabel(label = "", uiLocale = "zh-TW") {
      const raw = String(label || "").trim();
      if (!raw) return "";
      if (!uiLocale.startsWith("en")) return raw;
      return raw
        .replace(/^課前準備/, "Preparation")
        .replace(/^入門/, "Starter")
        .replace(/^基礎/, "Basic")
        .replace(/^進階/, "Advanced")
        .replace(/^課程/, "Course")
        .replace(/\s+/g, " ")
        .trim();
    }
    function titleCaseFromSlug(slug = "") {
      return String(slug || "")
        .split(/[-_]/)
        .filter(Boolean)
        .map((part) => {
          const lower = part.toLowerCase();
          const special = {
            ai: "AI",
            api: "API",
            ble: "BLE",
            css: "CSS",
            cv: "CV",
            fsm: "FSM",
            html: "HTML",
            http: "HTTP",
            io: "IO",
            iot: "IoT",
            js: "JS",
            json: "JSON",
            jsx: "JSX",
            pid: "PID",
            pwm: "PWM",
            s3: "S3",
            ui: "UI",
            ux: "UX",
            url: "URL",
            usb: "USB",
            wifi: "WiFi",
            ota: "OTA",
          };
          if (special[lower]) return special[lower];
          if (lower === "web") return "Web";
          if (lower === "dev") return "Dev";
          return part.charAt(0).toUpperCase() + part.slice(1);
        })
        .join(" ")
        .replace(/\bOf\b/g, "of")
        .replace(/\bAnd\b/g, "and")
        .replace(/\bTo\b/g, "to")
        .trim();
    }

    function inferEnglishTitle(lesson = {}) {
      const key = normalizeCanonicalCourseKey(
        lesson.courseKey ||
        lesson.courseId ||
        lesson.entryUnitId ||
        lesson.contentRef ||
        lesson.id ||
        ""
      );
      if (!key) return "";
      if (EN_TITLE_OVERRIDES[key]) return EN_TITLE_OVERRIDES[key];
      const rawTitle = String(lesson.title || "").trim();
      const englishInParens = rawTitle.match(/\(([^)]+)\)\s*$/);
      if (englishInParens && englishInParens[1]) return englishInParens[1].trim();
      return titleCaseFromSlug(key);
    }
    function resolveLessonLabel(lesson = {}, uiLocale = "zh-TW") {
      const resolved = window.__vibeResolveLocalizedFieldValue
        ? window.__vibeResolveLocalizedFieldValue(lesson, "lessonLabel", uiLocale, lesson.lessonLabel || lesson.tagText || "")
        : null;
      if (resolved) return String(resolved).trim();
      const isEn = String(uiLocale || "").toLowerCase().startsWith("en");
      const i18n = lesson && typeof lesson.i18n === "object" && !Array.isArray(lesson.i18n) ? lesson.i18n : {};
      const localizedLessonLabel = isEn
        ? (i18n.en?.lessonLabel || i18n["en-US"]?.lessonLabel || i18n["en-GB"]?.lessonLabel)
        : (i18n["zh-TW"]?.lessonLabel || i18n.zh?.lessonLabel || i18n["zh-Hant"]?.lessonLabel);
      return String(localizedLessonLabel || (lesson.lessonLabel || lesson.tagText) || "").trim();
    }
    function resolveLessonCardTitle(lesson = {}, uiLocale = "zh-TW") {
      const isEn = String(uiLocale || "").toLowerCase().startsWith("en");

        return String(lesson.titleEn || inferEnglishTitle(lesson) || "").trim();
      }
      const resolved = window.__vibeResolveLocalizedFieldValue
        ? window.__vibeResolveLocalizedFieldValue(lesson, "title", uiLocale, lesson.title || lesson.titleEn || "")
        : lesson.title;
      return String(resolved || lesson.title || "").trim();
    }
    function resolveLessonCardSummary(lesson = {}, uiLocale = "zh-TW") {
      const isEn = String(uiLocale || "").toLowerCase().startsWith("en");
      if (isEn) {
        return String(lesson.summaryEn || lesson.descriptionEn || "English translation pending.").trim();
      }
      const resolved = window.__vibeResolveLocalizedFieldValue
        ? window.__vibeResolveLocalizedFieldValue(lesson, "summary", uiLocale, lesson.summary || lesson.description || lesson.tagText || "")
        : (lesson.summary || lesson.description || lesson.tagText || "");
      return String(resolved || lesson.summary || lesson.description || lesson.tagText || "").trim();
    }
    function categoryFromLesson(lesson = {}) {
      const level = normalizeLevel(lesson.level || lesson.category || "");
      const track = normalizeTrack(lesson.track || "");
      if (level === "common") return "common";
      if (track && track !== "common") return `${track}-${level}`;
      return `car-${level}`;
    }
    let categoryLabelsMap = {};
    function titleizeCategoryKey(path = "") {
      return String(path || "")
        .split("-")
        .filter(Boolean)
        .map((part) => part.length <= 3 ? part.toUpperCase() : part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }
    function pickCategoryLabelFromLesson(lesson = {}, uiLocale = "zh-TW") {
      const isZh = uiLocale.startsWith("zh");
      const candidates = [];
      if (isZh) {
        candidates.push(
          lesson.learningPathLabelZhTw,
          lesson.learningPathLabelZh,
          lesson.categoryLabelZhTw,
          lesson.categoryLabelZh,
          lesson.navLabelZhTw,
          lesson.navLabelZh
        );
      } else {
        candidates.push(
          lesson.learningPathLabelEn,
          lesson.categoryLabelEn,
          lesson.navLabelEn
        );
      }
      candidates.push(
        lesson.learningPathLabel,
        lesson.categoryLabel,
        lesson.navLabel
      );
      const hit = candidates.find((v) => typeof v === "string" && v.trim());
      return hit ? hit.trim() : "";
    }

    function normalizeCategoryLabelEntry(entry = {}, uiLocale = "zh-TW") {
      if (typeof entry === "string") return entry.trim();
      if (!entry || typeof entry !== "object" || Array.isArray(entry)) return "";
      const locale = String(uiLocale || "").toLowerCase().startsWith("en") ? "en" : "zh-TW";
      return String(
        entry[locale]
        || entry["zh-TW"]
        || entry.zhTW
        || entry.zh
        || entry.en
        || entry.label
        || entry.title
        || ""
      ).trim();
    }

    function normalizeCategoryLabelsMap(sourceMap = {}, uiLocale = "zh-TW") {
      const normalized = {};
      if (!sourceMap || typeof sourceMap !== "object" || Array.isArray(sourceMap)) return normalized;

      const isEn = String(uiLocale || "").toLowerCase().startsWith("en");

      const assign = (key, value) => {
        const canonical = normalizeCanonicalLearningPathKey(key);
        if (!canonical) return;
        const label = normalizeCategoryLabelEntry(value, uiLocale);
        if (label) normalized[canonical] = label;
      };

      for (const [key, value] of Object.entries(sourceMap)) {
        const lowerKey = key.trim().toLowerCase();
        if (isEn) {
          if (lowerKey.startsWith("tw-") || lowerKey.startsWith("tw_") || lowerKey.startsWith("zh-") || lowerKey.startsWith("zh_")) {
            continue;
          }
        } else {
          if (lowerKey.startsWith("en-") || lowerKey.startsWith("en_")) {
            continue;
          }
        }

        if (key === "zh-TW" || key === "en") {
          const isKeyEn = key.startsWith("en");
          if (isEn !== isKeyEn) continue;

          if (value && typeof value === "object" && !Array.isArray(value)) {
            for (const [nestedKey, nestedValue] of Object.entries(value)) {
              assign(nestedKey, nestedValue);
            }
          }
          continue;
        }
        assign(key, value);
      }

      return normalized;
    }

    function deriveCategoryLabels(lessons = [], existingMap = {}, uiLocale = "zh-TW") {
      const derived = normalizeCategoryLabelsMap(existingMap, uiLocale);
      (Array.isArray(lessons) ? lessons : []).forEach((lesson) => {
        const key = categoryFromLesson(lesson);
        if (!key || derived[key]) return;
        const label = pickCategoryLabelFromLesson(lesson, uiLocale);
        if (label) derived[key] = label;
      });
      return derived;
    }
    function categoryLabel(path = "") {
      const uiLocale = detectUiLocale();
      const canonical = normalizeCanonicalLearningPathKey(path);
      const labelMap = normalizeCategoryLabelsMap(categoryLabelsMap, uiLocale);
      const localizedLabel = labelMap[canonical || path];
      if (localizedLabel) return localizedLabel;
      return titleizeCategoryKey(canonical || path);
    }
    function resolveUnitFile(lesson = {}) {
      const pickFile = (value = "") => String(value || "").split("/").pop().split("?")[0];
      if (Array.isArray(lesson.courseUnits) && lesson.courseUnits.length > 0) {
        const file = pickFile(lesson.courseUnits[0]);
        if (file) return normalizeLegacyUnitFilename(file);
      }
      if (lesson.entryUnitId) {
        const file = pickFile(lesson.entryUnitId);
        if (file) return normalizeLegacyUnitFilename(file);
      }
      if (lesson.contentRef) {
        const file = pickFile(lesson.contentRef);
        if (file) return normalizeLegacyUnitFilename(file);
      }
      if (lesson.classroomUrl && /\.html(?:$|\?)/i.test(lesson.classroomUrl)) {
        const file = pickFile(lesson.classroomUrl);
        if (file) return normalizeLegacyUnitFilename(file);
      }
      return "";
    }

    function normalizeLegacyUnitFilename(file = "") {
      const v = String(file || "").trim();
      if (!v) return "";
      if (/^(?:tw|en)-(common|car-(starter|basic|advanced))-/i.test(v)) return v.replace(/^(?:tw|en)-/i, "");
      if (/^start-\d{2}-unit-/i.test(v)) return v.replace(/^start-\d{2}-unit-/i, "car-starter-");
      if (/^basic-\d{2}-unit-/i.test(v)) return v.replace(/^basic-\d{2}-unit-/i, "car-basic-");
      if (/^(?:adv|advanced)-\d{2}-unit-/i.test(v)) return v.replace(/^(?:adv|advanced)-\d{2}-unit-/i, "car-advanced-");
      if (/^\d{2}-unit-/i.test(v)) return v.replace(/^\d{2}-unit-/i, "common-");
      if (/^prepare-\d+-(.+)$/i.test(v)) return v.replace(/^prepare-\d+-/i, "common-");
      return v;
    }

    function resolveEntryUrl(lesson = {}, fallbackUrl = "") {
      if (Array.isArray(lesson.courseUnits) && lesson.courseUnits.length > 0) {
        const firstUnit = normalizeLegacyUnitFilename(String(lesson.courseUnits[0]));
        if (firstUnit) return `/courses/${firstUnit}`;
      }
      const entryUnit = lesson.entryUnitId
        ? normalizeLegacyUnitFilename(String(lesson.entryUnitId))
        : "";
      if (entryUnit) return `/courses/${entryUnit}`;
      const unitFile = resolveUnitFile(lesson);
      if (unitFile) return `/courses/${unitFile}`;
      return lesson.classroomUrl || fallbackUrl || "";
    }

    function stripQueryAndHash(value = "") {
      return String(value || "").split("?")[0].split("#")[0];
    }

    function basenameFromUrl(value = "") {
      const clean = stripQueryAndHash(value);
      if (!clean) return "";
      return clean.split("/").pop() || "";
    }

    function buildLessonAuthRequest(card = {}) {
      const lessonId = String(card.dataset.lessonId || card.dataset.courseId || "").trim();
      const classroomUrl = String(card.dataset.classroomUrl || "").trim();
      const authFileName = String(card.dataset.authFileName || "").trim() || basenameFromUrl(classroomUrl).replace(/\.html$/i, "");
      return {
        pageId: lessonId,
        fileName: authFileName
      };
    }

    function addToCart(docId, productName, productPrice, isPhysical, currency = "") {
      const cart = JSON.parse(localStorage.getItem("vibeCodingCart") || "{}");
      if (cart[docId]) return false;
      cart[docId] = {
        name: productName,
        price: Number(productPrice || 0),
        currency: currency || "",
        price_currency: currency || "",
        quantity: 1,
        isPhysical: !!isPhysical
      };
      localStorage.setItem("vibeCodingCart", JSON.stringify(cart));
      return true;
    }

    function updateCardAction(card, status) {
      const btn = card.querySelector(".action-btn");
      if (!btn) return;
      const lessonId = card.dataset.lessonId || card.dataset.courseId;
      const authPageId = card.dataset.authPageId || lessonId;
      const courseName = card.dataset.courseName;
      const coursePrice = Number(card.dataset.coursePrice || 0);
      const courseCurrency = card.dataset.courseCurrency || "";
      const isPhysical = card.dataset.isPhysical === "true";
      const hasPriceData = card.dataset.hasPriceData === "true";
      const classroomUrl = card.dataset.classroomUrl;
      const hasVideoButton = !!card.querySelector(".video-btn");
      const widthClass = hasVideoButton ? "flex-1 w-full" : "w-full";
      btn.onclick = null;
      btn.disabled = false;

      const uiLocale = detectUiLocale();

      if (!hasPriceData) {
        btn.textContent = uiLocale.startsWith("en") ? "Not for sale" : "未定價";
        btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-gray-400 text-white font-medium cursor-not-allowed`;
        btn.disabled = true;
        return;
      }

      if (isPhysical && coursePrice > 0) {
        btn.textContent = window.t('lp_addToCartPhysical', '🛒 加入購物車');
        btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
        btn.onclick = () => {
          if (addToCart(lessonId, courseName, coursePrice, isPhysical, courseCurrency)) window.location.href = CART_URL;
          else alert(window.t('lp_alreadyInCart', '⚠️ 「{name}」已在購物車中！').replace("{name}", courseName));
        };
        return;
      }
      if (status === "AUTHORIZED") {
        btn.textContent = window.t('lp_enterCourseBtn', '✅ 進入課程內容');
        btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-blue-600 hover:bg-blue-700 text-white font-medium transition`;
        btn.onclick = () => {
          if (!classroomUrl) return alert(window.t('lp_coursesConfigMissing', '⚠️ 課程連結尚未備妥，請聯繫客服。'));
          const langParam = uiLocale === "en" ? "&lang=en" : "";
          const currencyParam = courseCurrency ? `&currency=${encodeURIComponent(courseCurrency)}` : "";
          window.location.href = `${AUTH_URL}&url=${encodeURIComponent(classroomUrl)}&id=${encodeURIComponent(authPageId)}&price=${coursePrice}${currencyParam}${langParam}`;
        };
        return;
      }
      if (status === "NOT_LOGGED_IN") {
        if (coursePrice > 0) {
          btn.textContent = window.t('lp_addToCartBtn', '🛒 加入購物車');
          btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
          btn.onclick = () => {
            if (addToCart(lessonId, courseName, coursePrice, isPhysical, courseCurrency)) window.location.href = CART_URL;
            else alert(window.t('lp_alreadyInCart', '⚠️ 「{name}」已在購物車中！').replace("{name}", courseName));
          };
          return;
        }

        btn.textContent = window.t('lp_loginFreeBtn', '👤 請先登入 (免費)');
        btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
        btn.onclick = () => {
          if (typeof window.vibeStartGoogleLogin === 'function') window.vibeStartGoogleLogin();
          else signInWithPopup(auth, new GoogleAuthProvider());
        };
        return;
      }
      if (status === "UNAUTHORIZED" || status === "ERROR") {
        btn.textContent = window.t('lp_addToCartBtn', '🛒 加入購物車');
        btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-medium transition`;
        btn.onclick = () => {
          if (addToCart(lessonId, courseName, coursePrice, isPhysical, courseCurrency)) window.location.href = CART_URL;
          else alert(window.t('lp_alreadyInCart', '⚠️ 「{name}」已在購物車中！').replace("{name}", courseName));
        };
        return;
      }
      btn.textContent = window.t('lp_loadingText', '載入中...');
      btn.className = `action-btn ${widthClass} py-2 px-3 rounded-md bg-gray-400 text-white font-medium cursor-not-allowed`;
      btn.disabled = true;
    }

    async function checkLessonAuthorization(card, user) {
      updateCardAction(card, "LOADING");
      const hasPriceData = card.dataset.hasPriceData === "true";
      const coursePrice = Number(card.dataset.coursePrice || 0);
      const courseCurrency = card.dataset.courseCurrency || "";
      const isFreeCourse = hasPriceData && Number(card.dataset.coursePrice || 0) === 0;
      if (isFreeCourse && user) return updateCardAction(card, "AUTHORIZED");
      const tutorModeActive = getScopedTutorModeForUid(auth.currentUser?.uid || "");
      try {
        const attempt = buildLessonAuthRequest(card);
        const lastResult = await checkAuthFunction({
          pageId: attempt.pageId,
          fileName: attempt.fileName,
          price: coursePrice,
          currency: courseCurrency,
          tutorMode: tutorModeActive
        });
        if (lastResult?.data?.authorized) {
          updateCardAction(card, "AUTHORIZED");
          return;
        }
        updateCardAction(card, "UNAUTHORIZED");
      } catch (_) {
        updateCardAction(card, "UNAUTHORIZED");
      }
    }

    function isCatalogCourseLesson(lesson = {}) {
      const metadataType = String(lesson?.metadataType || "").toLowerCase();
      if (lesson?.hiddenFromCatalog === true) return false;
      if (lesson?.isPhysical === true) return false;
      if (metadataType === "product" || metadataType === "legacy_product") return false;
      if (metadataType === "course") return true;
      return Array.isArray(lesson?.courseUnits) || String(lesson?.courseId || "").endsWith(".html");
    }

    function toList(value) {
      if (Array.isArray(value)) return value.filter(Boolean).map(String);
      if (typeof value === "string" && value.trim()) return [value.trim()];
      return [];
    }

    function hasHanText(value = "") {
      return /[\u3400-\u4DBF\u4E00-\u9FFF]/.test(String(value || ""));
    }

    function lessonTextBlob(lesson = {}) {
      const values = [
        lesson.title,
        lesson.titleEn,
        lesson.summary,
        lesson.summaryEn,
        lesson.description,
        lesson.descriptionEn,
        lesson.lessonLabel,
        lesson.lessonLabelEn,
        lesson.tagText,
        ...(Array.isArray(lesson.coreContent) ? lesson.coreContent : []),
        ...(Array.isArray(lesson.coreContentEn) ? lesson.coreContentEn : [])
      ];
      return values.map((value) => String(value || "")).join(" ").trim();
    }

    function lessonVariantScore(lesson = {}, uiLocale = "zh-TW") {
      const blob = lessonTextBlob(lesson);
      const rawLocale = String(lesson.locale || "").trim().toLowerCase();
      const explicitLocale = rawLocale ? normalizeLocaleCode(rawLocale) : "";
      const isZh = uiLocale.startsWith("zh");
      const hasHan = hasHanText(blob);
      const hasLatin = /[A-Za-z]/.test(blob);
      let score = 0;

      if (Number.isFinite(Number(lesson.orderWeight))) {
        score -= Number(lesson.orderWeight) / 1000;
      }
      if (isZh) {
        if (explicitLocale === "tw") score += 100;
        else if (explicitLocale === "en") score -= 50;
        if (hasHan) score += 20;
        if (hasLatin && !hasHan) score -= 5;
      } else {
        if (explicitLocale === "en") score += 100;
        else if (explicitLocale === "tw") score -= 50;
        if (hasLatin && !hasHan) score += 20;
        if (hasHan) score -= 5;
        // [新增] 英文模式下，若文件含有英文翻譯欄位，給予顯著加分以避免因欄位混合中文字而被當成純中文卡片
        if (lesson.titleEn) score += 1000;
        if (lesson.coreContentEn && lesson.coreContentEn.length > 0) score += 500;
        if (lesson.lessonLabelEn) score += 500;
      }
      return score;
    }

    function lessonRenderKey(lesson = {}) {
      return normalizeCanonicalCourseKey(
        lesson.courseKey ||
        lesson.docId ||
        lesson.courseId ||
        lesson.entryUnitId ||
        lesson.contentRef ||
        lesson.id ||
        ""
      );
    }

    function dedupeLessonsForRender(items = [], uiLocale = "zh-TW") {
      const groups = new Map();
      (Array.isArray(items) ? items : []).forEach((lesson) => {
        const key = lessonRenderKey(lesson);
        if (!key) return;
        const bucket = groups.get(key) || [];
        bucket.push(lesson);
        groups.set(key, bucket);
      });
      return [...groups.values()]
        .map((bucket) => bucket.slice().sort((a, b) => lessonVariantScore(b, uiLocale) - lessonVariantScore(a, uiLocale))[0])
        .filter(Boolean);
    }

    function pickImage(lesson = {}) {
      return (
        lesson.cardImageUrl ||
        lesson.imageUrl ||
        lesson.thumbnailUrl ||
        lesson.bannerUrl ||
        ""
      );
    }

    function pickVideo(lesson = {}) {
      if (lesson.videoId) return `https://www.youtube.com/embed/${lesson.videoId}?autoplay=1&enablejsapi=1`;
      if (lesson.videoUrl) return lesson.videoUrl;
      return "";
    }

    function openVideo(url = "") {
      if (!url) return;
      if (typeof window.enterMediaMode === "function") {
        window.enterMediaMode("video", url);
        return;
      }
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function renderSection(title, html) {
      const titleHtml = title ? `<h2 class="text-2xl font-bold text-slate-800 mb-4">${title}</h2>` : "";
      return `
        <section class="mb-10">
          ${titleHtml}
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-2">${html}</div>
        </section>
      `;
    }

    function renderLessons(lessons, pathKey) {
      const uiLocale = detectUiLocale();
      const t = {
        coreContentLabel: window.t('lp_coreContentLabel', uiLocale.startsWith('en') ? 'Core Content' : '核心內容'),
        freeLabel: window.t('lp_freeLabel', uiLocale.startsWith('en') ? 'Free' : '免費'),
        loadingText: window.t('lp_loadingText', uiLocale.startsWith('en') ? 'Loading...' : '載入中...')
      };
      const pageTitleText = categoryLabel(pathKey);

      const shouldHideCourse = (lesson = {}) => {
        return lesson.hiddenFromCatalog === true;
      };

      const container = document.getElementById("lesson-container");
      const title = document.getElementById("page-title");
      if (title) {
        title.textContent = pageTitleText;
        title.setAttribute("data-path-title", categoryLabel(pathKey));
      }
      document.title = pageTitleText;
      const catalogCourses = lessons.filter(isCatalogCourseLesson);
      const matchingPathKeys = resolveMatchingPathKeys(pathKey);

      let rows = dedupeLessonsForRender(
        catalogCourses
        .filter((x) => matchingPathKeys.includes(categoryFromLesson(x)))
        .filter((x) => !shouldHideCourse(x)),
        uiLocale
      ).sort((a, b) => Number(a.orderWeight || 0) - Number(b.orderWeight || 0));
      let hardwareRows = dedupeLessonsForRender(
        lessons.filter(
        (x) => x?.isPhysical === true &&
               x?.hiddenFromCatalog !== true &&
               Array.isArray(x?.learningPaths) &&
               matchingPathKeys.some((key) => x.learningPaths.includes(key))
        ),
        uiLocale
      ).sort((a, b) => Number(a.orderWeight || 0) - Number(b.orderWeight || 0));
      if (!rows.length && !hardwareRows.length && normalizeCanonicalLearningPathKey(pathKey) !== "common") {
        container.innerHTML = `<p class="text-center text-gray-500 w-full col-span-3 py-12">${window.t('lp_emptyCategory', '目前此分類尚無課程。')}</p>`;
        return;
      }
      const courseHtml = rows.map((lesson) => {
        const entryUrl = resolveEntryUrl(lesson);
        const unitFile = resolveUnitFile(lesson);
        const isEn = String(uiLocale || "").toLowerCase().startsWith("en");
        const displayTitle = resolveLessonCardTitle(lesson, uiLocale);
        const displayKey = categoryLabel(pathKey);
        const contentList = translateBulletList(
          toList(window.__vibeResolveLocalizedFieldValue
            ? window.__vibeResolveLocalizedFieldValue(lesson, "coreContent", uiLocale, isEn ? (lesson.coreContentEn || []) : lesson.coreContent || [])
            : (isEn ? (lesson.coreContentEn || []) : lesson.coreContent || [])).slice(0, 4),
          uiLocale
        ).filter(Boolean);
        const summary = resolveLessonCardSummary(lesson, uiLocale) || (isEn ? "English translation pending." : "課程內容由系統資料動態載入。");
        const duration = String(lesson.duration || lesson.estimatedDuration || "");
        const lessonLabel = resolveLessonLabel(lesson, uiLocale);
        const displayLessonLabel = lessonLabel || (isEn ? "Course Unit" : "課程單元");
        const icon = String(lesson.cardIcon || lesson.icon || "📘");
        const imageUrl = pickImage(lesson);
        const videoUrl = pickVideo(lesson);
        const priceEntry = getPricingApi().resolveLessonPrice(lesson);
        const price = Number(priceEntry.amount || 0);
        const priceCurrency = String(priceEntry.currency || "");
        const hasPriceData = priceEntry.hasPriceData === true || lesson.dealerPriceBookId != null;
        const disablePreview = lesson.previewDisabled === true;
        const videoButton = (videoUrl && !disablePreview)
          ? `<button class="video-btn flex-1 w-full py-2 px-3 rounded-md border border-red-500 text-red-600 font-medium hover:bg-red-50 transition-colors">${window.t('lp_previewBtn', '▶ 課程預覽')}</button>`
          : "";
        const actionButtonClass = videoUrl ? "flex-1 w-full" : "w-full";
        const listHtml = contentList.length
          ? `<ul class="list-disc pl-5 space-y-1">${contentList.map((x) => `<li>${x}</li>`).join("")}</ul>`
          : `<p class="text-sm text-slate-500">${summary}</p>`;
        const imageHtml = imageUrl
          ? `<div class="rounded-xl overflow-hidden border border-slate-200 bg-slate-50 mb-3"><img src="${imageUrl}" alt="${displayTitle || "course"}" class="w-full h-40 object-cover"></div>`
          : "";
        return `
          <div class="lesson-card bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-lg transition"
               data-lesson-id="${lesson.id || lesson.docId || ""}"
               data-course-id="${lesson.id || lesson.docId || lesson.courseId || ""}"
               data-legacy-course-id="${lesson.courseId || ""}"
               data-auth-page-id="${lesson.id || lesson.docId || lesson.courseId || ""}"
               data-auth-file-name="${unitFile || ""}"
               data-course-name="${lesson.title || ""}"
               data-course-price="${price}"
               data-course-currency="${priceCurrency}"
               data-has-price-data="${hasPriceData}"
               data-is-physical="${lesson.isPhysical === true}"
               data-classroom-url="${entryUrl}">
            <div class="flex items-start justify-between gap-3 mb-3">
              <div class="min-w-0 text-xs text-slate-500 truncate">${displayKey}</div>
              ${duration ? `<span class="flex-shrink-0 text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded">${duration}</span>` : ""}
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">${displayTitle || lesson.courseId || "Untitled Course"}</h2>
            <div class="text-xs text-blue-700 bg-blue-50 border border-blue-100 rounded px-2 py-1 inline-block mb-3">${displayLessonLabel}</div>
            ${imageHtml}
            <div class="text-sm text-slate-700 mb-3"><span class="mr-2">${icon}</span>${summary}</div>
            <div class="text-sm text-slate-700 mb-4">
              <strong class="text-slate-900 block mb-1">${t.coreContentLabel}</strong>
              ${listHtml}
            </div>
            <div class="mt-4 pt-3 border-t border-slate-100 text-center">
              <span class="text-2xl font-bold text-blue-600">${!hasPriceData ? (uiLocale.startsWith('en') ? 'Not for sale' : '未定價') : (price === 0 ? t.freeLabel : formatCoursePrice(priceEntry, uiLocale))}</span>
            </div>
            <div class="mt-3 flex flex-col sm:flex-row gap-2">
              ${videoButton}
              <button class="action-btn ${actionButtonClass} py-2 px-3 rounded-md bg-gray-300 text-gray-500 font-medium cursor-not-allowed" disabled>${t.loadingText}</button>
            </div>
          </div>
        `;
      }).join("");

      const hardwareHtml = hardwareRows.map((lesson) => {
        const entryUrl = resolveEntryUrl(lesson);
        const unitFile = resolveUnitFile(lesson);
        const priceEntry = getPricingApi().resolveLessonPrice(lesson);
        const price = Number(priceEntry.amount || 0);
        const priceCurrency = String(priceEntry.currency || "");
        const hasPriceData = priceEntry.hasPriceData === true || lesson.dealerPriceBookId != null;
        const isEn = String(uiLocale || "").toLowerCase().startsWith("en");
        const displayKey = categoryLabel(pathKey);
        const hardwareId = String(lesson.courseId || "").toLowerCase();
        const imageUrl = pickImage(lesson);
        const summary = isEn
          ? String(lesson.summaryEn || lesson.descriptionEn || "Hardware recommendations")
          : String((window.__vibeResolveLocalizedFieldValue
              ? window.__vibeResolveLocalizedFieldValue(lesson, "summary", uiLocale, lesson.summary || lesson.description || lesson.tagText || "")
              : (lesson.summary || lesson.description || lesson.tagText))
            || "硬體設備推薦");
        const displayTitle = resolveLessonCardTitle(lesson, uiLocale) || (uiLocale === "zh-TW" ? "硬體設備" : "Hardware Kit");
        const contentList = translateBulletList(
          toList(window.__vibeResolveLocalizedFieldValue
            ? window.__vibeResolveLocalizedFieldValue(lesson, "coreContent", uiLocale, isEn ? (lesson.coreContentEn || []) : lesson.coreContent || [])
            : (isEn ? (lesson.coreContentEn || []) : lesson.coreContent || [])).slice(0, 4),
          uiLocale
        ).filter(Boolean);
        const listHtml = contentList.length
          ? `<ul class="list-disc pl-5 space-y-1">${contentList.map((x) => `<li>${x}</li>`).join("")}</ul>`
          : `<p class="text-sm text-slate-500">${summary}</p>`;
        const objectPos = hardwareId === "car-intro" ? "50% 50%" : (hardwareId === "car-advanced" ? "50% 28%" : ((hardwareId === "esp32-s3" || hardwareId === "product-esp32-s3") ? "50% 15%" : "50% 50%"));
        const objectScale = hardwareId === "car-advanced" ? "scale(1.08)" : (hardwareId === "car-intro" ? "scale(1.02)" : "scale(1)");
        const imageHtml = imageUrl
          ? `<div class="rounded-xl overflow-hidden border border-slate-200 bg-white mb-3 h-56"><img src="${imageUrl}" alt="${displayTitle}" class="w-full h-full object-cover" style="object-position:${objectPos}; transform:${objectScale};"></div>`
          : "";
        return `
          <div class="lesson-card bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-lg transition"
               data-lesson-id="${lesson.id || lesson.docId || ""}"
               data-course-id="${lesson.id || lesson.docId || lesson.courseId || ""}"
               data-legacy-course-id="${lesson.courseId || ""}"
               data-auth-page-id="${lesson.id || lesson.docId || lesson.courseId || ""}"
               data-auth-file-name="${unitFile || ""}"
               data-course-name="${displayTitle}"
               data-course-price="${price}"
               data-course-currency="${priceCurrency}"
               data-has-price-data="${hasPriceData}"
               data-is-physical="true"
               data-classroom-url="${entryUrl}">
            <div class="min-w-0 text-xs text-slate-500 mb-2 truncate">${displayKey}</div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">${displayTitle}</h3>
            ${imageHtml}
            <div class="text-sm text-slate-700 mb-4">${listHtml}</div>
            <div class="mt-4 pt-3 border-t border-slate-100 text-center">
              <span class="text-2xl font-bold text-blue-600">${!hasPriceData ? (uiLocale.startsWith('en') ? 'Not for sale' : '未定價') : (price === 0 ? t.freeLabel : formatCoursePrice(priceEntry, uiLocale))}</span>
            </div>
            <div class="mt-3">
              <button class="action-btn w-full py-2 px-3 rounded-md bg-gray-300 text-gray-500 font-medium cursor-not-allowed" disabled>${t.loadingText}</button>
            </div>
          </div>
        `;
      }).join("");

      const specsRows = dedupeLessonsForRender(
        lessons.filter((x) => {
          if (x?.metadataType !== "spec") return false;
          const paths = Array.isArray(x?.learningPaths) ? x.learningPaths.map(String).filter(Boolean) : [];
          if (paths.some((key) => matchingPathKeys.includes(key))) return true;
          return !paths.length && String(x?.category || "").toLowerCase() === "prepare" && matchingPathKeys.some((key) => /^(tw|en)-common$/.test(key));
        }),
        uiLocale
      ).sort((a, b) => Number(a.orderWeight || 0) - Number(b.orderWeight || 0));
      const specsHtml = specsRows.map((spec) => {
        const isEn = String(uiLocale || "").toLowerCase().startsWith("en");
        const displayTitle = isEn
          ? String(spec.titleEn || inferEnglishTitle(spec) || spec.title || "").trim()
          : String((window.__vibeResolveLocalizedFieldValue
              ? window.__vibeResolveLocalizedFieldValue(spec, "title", uiLocale, spec.title || "")
              : spec.title) || "");
        const specImg = pickImage(spec);
        const specSummary = isEn
          ? String(spec.summaryEn || spec.descriptionEn || "Computer Spec Recommendations")
          : String((window.__vibeResolveLocalizedFieldValue
              ? window.__vibeResolveLocalizedFieldValue(spec, "summary", uiLocale, spec.summary || spec.description || "")
              : (spec.summary || spec.description || "")));
        const specContentList = translateBulletList(
          toList(window.__vibeResolveLocalizedFieldValue
            ? window.__vibeResolveLocalizedFieldValue(spec, "coreContent", uiLocale, isEn ? (spec.coreContentEn || spec.coreContent) : spec.coreContent || [])
            : (isEn ? (spec.coreContentEn || spec.coreContent) : spec.coreContent || [])),
          uiLocale
        );
        return `
          <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
            ${specImg ? `<div class="rounded-xl overflow-hidden border border-slate-200 bg-slate-50 mb-3"><img src="${specImg}" alt="${displayTitle}" class="w-full h-40 object-cover"></div>` : ""}
            <h3 class="text-xl font-bold text-slate-800 mb-2">${displayTitle}</h3>
            <p class="text-sm text-slate-600 mb-3">${specSummary}</p>
            <ul class="list-disc pl-5 space-y-1 text-sm text-slate-700">${specContentList.map((x) => `<li>${x}</li>`).join("")}</ul>
          </div>
        `;
      }).join("");

      let pageHtml = "";
      const isCommon = normalizeCanonicalLearningPathKey(pathKey) === "common";
      if (isCommon) {
        if (hardwareHtml) pageHtml += renderSection(t.hardwareHeader, hardwareHtml);
        if (courseHtml) pageHtml += renderSection("", courseHtml);
        if (specsHtml) pageHtml += renderSection(t.specsHeader, specsHtml);
      } else {
        if (courseHtml) pageHtml += renderSection("", courseHtml);
        if (hardwareHtml) pageHtml += renderSection(window.t('lp_hardwareHeader', '硬體設備'), hardwareHtml);
        if (specsHtml) pageHtml += renderSection(window.t('lp_specsHeader', '電腦規格推薦'), specsHtml);
      }
      container.innerHTML = pageHtml;

      container.querySelectorAll(".video-btn").forEach((btn, i) => {
        const videoUrl = pickVideo(rows[i] || {});
        btn.addEventListener("click", () => openVideo(videoUrl));
      });
    }

    async function loadLessonsForCurrentDistributor() {
      const requestId = ++currentLessonsRequestId;
      const distributorId = await resolveLessonsDistributorId();
      if (auth.currentUser && distributorId) {
        persistLocalPreferredDistributorId(distributorId);
      }
      const result = await getLessonsFunc({ distributorId });
      if (requestId !== currentLessonsRequestId) return null;
      currentLessons = Array.isArray(result?.data?.lessons) ? result.data.lessons : [];
      categoryLabelsMap = result?.data?.categoryLabels || {};
      renderLessons(currentLessons, currentPathKey);
      return currentLessons;
    }

    async function init() {
      const uiLocale = detectUiLocale();
      document.documentElement.lang = uiLocale.startsWith("en") ? "en" : "zh-Hant";
      currentPathKey = normalizeCanonicalLearningPathKey(new URLSearchParams(location.search).get("path") || "common") || "common";
      document.title = categoryLabel(currentPathKey);
      window.updateAuthUI = async function () {
        const cards = document.querySelectorAll(".lesson-card");
        const user = auth.currentUser;
        cards.forEach((card) => {
          if (user) checkLessonAuthorization(card, user);
          else updateCardAction(card, "NOT_LOGGED_IN");
        });
      };
      onAuthStateChanged(auth, async () => {
        await loadLessonsForCurrentDistributor();
        await window.updateAuthUI();
      });
    }
    init();
    window.addEventListener('storage', (event) => {
      if (event.key !== 'vibe_user_preferred_distributor' && event.key !== 'preferredDistributorId') return;
      loadLessonsForCurrentDistributor().catch((error) => {
        console.warn('[learning-path] Failed to refresh lessons after distributor change:', error);
      });
    });
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        loadLessonsForCurrentDistributor().catch((error) => {
          console.warn('[learning-path] Failed to refresh lessons after bfcache restore:', error);
        });
      }
    });
    window.handleLogout = async () => { await signOut(auth); };
  </script>
</body>
</html>
