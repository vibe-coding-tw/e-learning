<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 / 註冊 - Vibe Coding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .gradient-bg { background: radial-gradient(circle at top right, #f8fafc 0%, #e0e7ff 100%); }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; font-weight: 700; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <!-- Logo Branding -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-3 text-3xl font-extrabold text-indigo-900 tracking-tighter">
                <span>🚀</span> Vibe Coding
            </a>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 mb-8">
                <button id="tab-login" onclick="switchMode('login')" class="flex-1 py-4 text-center text-gray-500 font-medium transition-all tab-active">登入 (Login)</button>
                <button id="tab-register" onclick="switchMode('register')" class="flex-1 py-4 text-center text-gray-500 font-medium transition-all">註冊 (Register)</button>
            </div>

            <!-- Form -->
            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1">電子郵件 Email</label>
                        <input type="email" id="email" required placeholder="example@email.com" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 px-1">密碼 Password</label>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                    </div>

                    <div id="error-msg" class="text-red-500 text-sm italic px-1 hidden"></div>

                    <button type="submit" id="submit-btn" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-3">
                        <span id="btn-text">登入會員</span>
                        <div id="btn-loader" class="loader"></div>
                    </button>
                    
                    <p id="auth-hint" class="text-center text-xs text-slate-400 mt-6">
                        還沒有帳號？ <a href="javascript:switchMode('register')" class="text-indigo-600 font-bold underline">立即註冊</a>
                    </p>
                </div>
            </form>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-8">
            <a href="index.html" class="text-slate-400 hover:text-indigo-600 text-sm font-medium transition-colors">
                ← 返回首頁 (Back to Home)
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO6Y6Pa7b7zbieJIErysaNF6-UqbT8KJw",
            authDomain: "e-learning-942f7.firebaseapp.com",
            projectId: "e-learning-942f7",
            storageBucket: "e-learning-942f7.firebasestorage.app",
            messagingSenderId: "878397058574",
            appId: "1:878397058574:web:28aaa07a291ee3baab165f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentMode = 'login';

        window.switchMode = function(mode) {
            currentMode = mode;
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const btnText = document.getElementById('btn-text');
            const authHint = document.getElementById('auth-hint');
            const errorMsg = document.getElementById('error-msg');

            errorMsg.classList.add('hidden');

            if (mode === 'login') {
                tabLogin.classList.add('tab-active');
                tabRegister.classList.remove('tab-active');
                btnText.innerText = "登入會員";
                authHint.innerHTML = "還沒有帳號？ <a href=\"javascript:switchMode('register')\" class=\"text-indigo-600 font-bold underline\">立即註冊</a>";
            } else {
                tabLogin.classList.remove('tab-active');
                tabRegister.classList.add('tab-active');
                btnText.innerText = "建立新帳號";
                authHint.innerHTML = "已經有帳號了？ <a href=\"javascript:switchMode('login')\" class=\"text-indigo-600 font-bold underline\">點此登入</a>";
            }
        };

        window.handleAuth = async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');

            // UI Feedback
            btnText.style.opacity = '0.5';
            btnLoader.style.display = 'block';
            submitBtn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                if (currentMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                
                // Redirection Logic
                const urlParams = new URLSearchParams(window.location.search);
                const returnUrl = urlParams.get('returnUrl');
                
                if (returnUrl) {
                    window.location.replace(decodeURIComponent(returnUrl));
                } else {
                    window.location.replace("index.html");
                }

            } catch (error) {
                console.error(error);
                errorMsg.classList.remove('hidden');
                
                let friendlyMsg = "發生錯誤，請稍後再試。";
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    friendlyMsg = "帳號或密碼錯誤。";
                } else if (error.code === 'auth/email-already-in-use') {
                    friendlyMsg = "此 Email 已被註冊。";
                } else if (error.code === 'auth/weak-password') {
                    friendlyMsg = "密碼強度不足（至少 6 位數）。";
                } else if (error.code === 'auth/invalid-email') {
                    friendlyMsg = "Email 格式無效。";
                }
                
                errorMsg.innerText = friendlyMsg;
            } finally {
                btnText.style.opacity = '1';
                btnLoader.style.display = 'none';
                submitBtn.disabled = false;
            }
        };

        // If already logged in, redirect to home or returnUrl
        onAuthStateChanged(auth, (user) => {
            if (user && !document.getElementById('submit-btn').disabled) {
                console.log("[Login] Already logged in as", user.email);
                const urlParams = new URLSearchParams(window.location.search);
                const returnUrl = urlParams.get('returnUrl');
                if (returnUrl) window.location.replace(decodeURIComponent(returnUrl));
                else window.location.replace("index.html");
            }
        });
    </script>
</body>

</html>
