<!DOCTYPE html>
<html lang="zh-Hant">

<head>
        <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程授權驗證中...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        (function() {
            const w = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
                w.apply(console, args);
            };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        (function () {
            const normalize = (value = "") => String(value || "").trim().replace(/_/g, "-");
            const detectLocale = () => {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const queryLang = normalize(params.get('lang') || params.get('locale') || '');
                    if (queryLang.toLowerCase().startsWith('en')) return 'en';
                    if (queryLang.toLowerCase().startsWith('zh')) return 'zh-TW';
                } catch (_) {}

                try {
                    const stored = normalize(localStorage.getItem('vibe_user_locale'));
                    if (stored.toLowerCase().startsWith('en')) return 'en';
                    if (stored.toLowerCase().startsWith('zh')) return 'zh-TW';
                } catch (_) {}

                const navLang = normalize(navigator.language || navigator.languages?.[0] || '');
                if (navLang.toLowerCase().startsWith('en')) return 'en';
                return 'zh-TW';
            };

            window.__authLocale = detectLocale();
            document.documentElement.lang = window.__authLocale === 'en' ? 'en' : 'zh-Hant';
            document.title = window.__authLocale === 'en' ? 'Checking course access...' : '課程授權驗證中...';
        })();
    </script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 h-screen flex flex-col items-center justify-center" style="visibility:hidden;">

    <div id="loading-ui" class="text-center">
        <div class="loader mx-auto mb-4"></div>
        <h2 id="loading-title" class="text-xl font-bold text-gray-700">正在驗證學員身份...</h2>
        <p id="loading-desc" class="text-gray-500 mt-2">請稍候，我們正在為您開啟課程內容。</p>
    </div>

    <div id="error-ui" class="hidden text-center max-w-md p-6 bg-white rounded-lg shadow-lg">
        <div class="text-red-500 text-5xl mb-4">⚠️</div>
        <h2 id="error-title" class="text-2xl font-bold text-gray-800 mb-2">無法存取課程</h2>
        <p id="error-msg" class="text-gray-600 mb-6">您尚未購買此課程，或權限已過期。</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <button id="retry-login-btn"
                class="bg-indigo-600 text-white px-6 py-2 rounded-full hover:bg-indigo-700 transition">重新登入</button>
            <a id="back-home-link" href="index.html"
                class="bg-gray-100 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-200 transition">返回首頁</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signInWithRedirect } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";
        import { firebaseConfig, connectFirebaseEmulators, isLocalDev } from "./js/firebase-local.js?v=3";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app, 'asia-east1');
        connectFirebaseEmulators({ auth, db, functions });
        const checkAuthFunction = httpsCallable(functions, 'checkPaymentAuthorization');
        const loginProvider = new GoogleAuthProvider();
        const AUTH_COPY = {
            en: {
                title: 'Checking course access...',
                loadingTitle: 'Verifying your access...',
                loadingDesc: 'Please wait while we open the course content for you.',
                errorTitle: 'Unable to access the course',
                defaultError: 'You have not purchased this course yet, or your access has expired.',
                retryLogin: 'Sign in again',
                backHome: 'Back to Home',
                googleLoginFailed: 'Google sign-in failed. Please return to the home page and try again.',
                missingFilename: 'Error: unable to resolve file name (Filename missing)',
                missingPath: 'Unable to resolve the course file path',
                noAuthRecord: 'We could not find a purchase record. Please confirm you are signed in with the correct account.',
                invalidCourseId: 'Course lookup failed. Please check the URL or contact support.',
                paymentRequired: 'This course is not authorized yet. Please confirm payment or activation.',
                authFailedPrefix: 'Authorization failed: ',
                serverError: 'Server connection error. Please try again later.'
            },
            'zh-TW': {
                title: '課程授權驗證中...',
                loadingTitle: '正在驗證學員身份...',
                loadingDesc: '請稍候，我們正在為您開啟課程內容。',
                errorTitle: '無法存取課程',
                defaultError: '您尚未購買此課程，或權限已過期。',
                retryLogin: '重新登入',
                backHome: '返回首頁',
                googleLoginFailed: 'Google 登入失敗，請返回首頁後再試一次。',
                missingFilename: '錯誤：無法解析檔案名稱 (Filename missing)',
                missingPath: '無法解析課程檔案路徑',
                noAuthRecord: '系統查無您的購買紀錄，請確認是否已登入正確帳號。',
                invalidCourseId: '課程標識失敗，請確認網址是否正確或聯繫客服。',
                paymentRequired: '此課程尚未授權或付款，請確認是否已完成購買。',
                authFailedPrefix: '授權失敗：',
                serverError: '伺服器連線錯誤，請稍後再試。'
            }
        };
        const authLocale = window.__authLocale === 'en' ? 'en' : 'zh-TW';
        const authT = (key) => (AUTH_COPY[authLocale] && AUTH_COPY[authLocale][key]) || AUTH_COPY.en[key] || AUTH_COPY['zh-TW'][key] || '';

        document.title = authT('title');
        document.getElementById('loading-title').textContent = authT('loadingTitle');
        document.getElementById('loading-desc').textContent = authT('loadingDesc');
        document.getElementById('error-title').textContent = authT('errorTitle');
        document.getElementById('error-msg').textContent = authT('defaultError');
        document.getElementById('retry-login-btn').textContent = authT('retryLogin');
        document.getElementById('back-home-link').textContent = authT('backHome');
        document.body.style.visibility = 'visible';

        document.getElementById('retry-login-btn').addEventListener('click', startGoogleLogin);

        async function startGoogleLogin() {
            try {
                // Try popup login first in all environments. This is much more reliable
                // on custom domains under modern browser privacy restrictions (blocking third-party cookies).
                await signInWithPopup(auth, loginProvider);
            } catch (error) {
                console.warn("[Auth] Google popup login failed or blocked, trying redirect...", error);
                try {
                    await signInWithRedirect(auth, loginProvider);
                } catch (redirectError) {
                    console.error("[Auth] Google redirect login failed:", redirectError);
                    showError(authT('googleLoginFailed'));
                }
            }
        }

        function showError(message) {
            document.getElementById('loading-ui').classList.add('hidden');
            document.getElementById('error-ui').classList.remove('hidden');
            if (message) document.getElementById('error-msg').textContent = message;
        }

        function getScopedTutorModeForUid(uid = "") {
            const cleanUid = String(uid || "").trim();
            if (!cleanUid) return false;
            try {
                const scopedKey = `adminTutorMode:${cleanUid}`;
                const scopedValue = localStorage.getItem(scopedKey);
                if (scopedValue !== null) return scopedValue === "true";

                const legacyValue = localStorage.getItem('adminTutorMode');
                if (legacyValue !== null) {
                    localStorage.setItem(scopedKey, legacyValue);
                    localStorage.removeItem('adminTutorMode');
                    return legacyValue === "true";
                }

                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i) || "";
                    if (!key.startsWith('adminTutorMode:')) continue;
                    const value = localStorage.getItem(key);
                    if (value === "true") {
                        localStorage.setItem(scopedKey, "true");
                        return true;
                    }
                }

                const currentEmail = String(auth.currentUser?.email || window.__vibeCurrentAuthUser?.email || "").trim().toLowerCase();
                if (currentEmail === "rover.k.chen@gmail.com") return true;

                return false;
            } catch (_) {
                return false;
            }
        }

        async function verifyAndRedirect(user) {
            // 1. 解析網址參數
            const urlParams = new URLSearchParams(window.location.search);
            const targetUrl = urlParams.get('url'); // 真實課程網址 (作業 / YouTube)
            const docId = urlParams.get('docId');   // 課程 docId
            const courseId = urlParams.get('id');    // 相容舊參數
            const price = urlParams.get('price');   // 價格 (判斷是否為免費課)
            const currency = urlParams.get('currency') || '';
            const lang = urlParams.get('lang') || urlParams.get('locale') || '';
            const resolvedCourseId = docId || courseId;

            console.log("[Auth] Verifying params:", { targetUrl, docId, courseId, price, currency, lang });
            
            // [MODIFIED] Legacy/Cache Fallback: If URLSearchParams fails (e.g. because of multiple ?)
            if (!targetUrl || !resolvedCourseId) {
                console.warn("[Auth] Standard parsing failed, trying manual fallback...");
                const fullSearch = window.location.search + window.location.hash;
                const matchUrl = fullSearch.match(/[?&]url=([^&]*)/);
                const matchDocId = fullSearch.match(/[?&]docId=([^&]*)/);
                const matchId = fullSearch.match(/[?&]id=([^&]*)/);
                const matchPrice = fullSearch.match(/[?&]price=([^&]*)/);
                const matchCurrency = fullSearch.match(/[?&]currency=([^&]*)/);
                const matchLang = fullSearch.match(/[?&](?:lang|locale)=([^&]*)/);
                
                const fallbackUrl = matchUrl ? decodeURIComponent(matchUrl[1]) : null;
                const fallbackDocId = matchDocId ? matchDocId[1] : null;
                const fallbackId = matchId ? matchId[1] : null;
                const fallbackPrice = matchPrice ? matchPrice[1] : null;
                const fallbackCurrency = matchCurrency ? decodeURIComponent(matchCurrency[1]) : '';
                const fallbackLang = matchLang ? matchLang[1] : '';
                
                console.log("[Auth] Fallback results:", { fallbackUrl, fallbackDocId, fallbackId, fallbackPrice, fallbackCurrency, fallbackLang });
                
                if (fallbackUrl && (fallbackDocId || fallbackId)) {
                    // Use fallbacks
                    proceedWithVerification(fallbackUrl, fallbackDocId || fallbackId, fallbackPrice, fallbackCurrency, user, fallbackLang);
                    return;
                }
            }

            if (!targetUrl || !resolvedCourseId || targetUrl === 'undefined') {
                console.warn("[Auth] Missing URL or ID, redirecting to index.html");
                window.location.replace("index.html");
                return;
            }
            // If we have them, proceed with the main flow
            proceedWithVerification(targetUrl, resolvedCourseId, price, currency, user, lang);
        }

        // Refactored flow to allow fallbacks
        async function proceedWithVerification(targetUrl, courseId, price, currency, user, lang = "") {
            // 2. 付費與免費課程皆需透過後端取得 Token，以通過 serveCourse 的安全檢查
            try {
                let fileName = "";
                if (targetUrl) {
                    const parts = targetUrl.split('/');
                    fileName = parts[parts.length - 1].split('?')[0];
                }

                if (!fileName) {
                    alert(authT('missingFilename'));
                    showError(authT('missingPath'));
                    return;
                }

                const isTutorMode = getScopedTutorModeForUid(user?.uid);
                const primaryPageId = courseId || fileName;
                const normalizedPageId = String(primaryPageId || '').replace(/\.html$/i, '') || primaryPageId;
                const normalizedFileName = String(fileName || '').replace(/\.html$/i, '') || fileName;

                let result = await checkAuthFunction({
                    docId: normalizedPageId,
                    pageId: normalizedPageId,
                    fileName: normalizedFileName,
                    price: price,
                    currency: currency,
                    tutorMode: isTutorMode
                });

                if (result?.data?.authorized) {
                    // 驗證成功！
                    const token = result.data.token;
                    let finalUrl = decodeURIComponent(targetUrl);

                    // 所有已授權課程都帶 token，讓 /courses/* 的 token gate 可以通過。
                    if (token) {
                        if (finalUrl.includes('?')) {
                            finalUrl += `&token=${token}`;
                        } else {
                            finalUrl += `?token=${token}`;
                        }
                    }

                    // Append lang/locale if present
                    if (lang) {
                        finalUrl += `${finalUrl.includes('?') ? '&' : '?'}lang=${encodeURIComponent(lang)}`;
                    }

                    console.log("[Auth] Redirecting after authorization:", { finalUrl });
                    window.location.replace(finalUrl);
                } else {
                    const reason = result?.data?.reason || result?.data?.error || null;
                    let message = authT('noAuthRecord');
                    if (reason === 'missing-context' || reason === 'missing-course') {
                        message = authT('invalidCourseId');
                    } else if (reason === 'payment-required') {
                        message = authT('paymentRequired');
                    } else if (reason === 'unauthenticated') {
                        message = authT('googleLoginFailed');
                    } else if (result?.data?.error) {
                        message = `${authT('authFailedPrefix')}${result.data.error}`;
                    }
                    console.warn('[Auth] Authorization failed reason:', reason, result?.data, { courseId, fileName, price, currency, lang });
                    showError(message);
                }
            } catch (error) {
                console.error(error);
                showError(authT('serverError'));
            }
        }

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            window.__vibeCurrentAuthUser = user || auth.currentUser || null;
            console.log("[Auth] State changed. User:", user ? user.email : "null");
            if (user) {
                verifyAndRedirect(user);
            } else {
                console.log("[Auth] No user detected. Waiting for 3s before redirect...");
                // 如果沒登入，保留一點時間讓 Firebase 嘗試自動登入
                setTimeout(() => {
                    if (!auth.currentUser) {
                        console.warn("[Auth] Still no user after 3s. Starting Google login on this page...");
                        startGoogleLogin();
                    } else {
                        console.log("[Auth] User detected after delay. Resuming...");
                    }
                }, 3000);
            }
        });
    </script>
</body>

</html>
