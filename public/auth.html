<!DOCTYPE html>
<html lang="zh-Hant">

<head>
        <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程授權驗證中...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 h-screen flex flex-col items-center justify-center">

    <div id="loading-ui" class="text-center">
        <div class="loader mx-auto mb-4"></div>
        <h2 class="text-xl font-bold text-gray-700">正在驗證學員身份...</h2>
        <p class="text-gray-500 mt-2">請稍候，我們正在為您開啟課程內容。</p>
    </div>

    <div id="error-ui" class="hidden text-center max-w-md p-6 bg-white rounded-lg shadow-lg">
        <div class="text-red-500 text-5xl mb-4">⚠️</div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">無法存取課程</h2>
        <p id="error-msg" class="text-gray-600 mb-6">您尚未購買此課程，或權限已過期。</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <button id="retry-login-btn"
                class="bg-indigo-600 text-white px-6 py-2 rounded-full hover:bg-indigo-700 transition">重新登入</button>
            <a href="index.html"
                class="bg-gray-100 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-200 transition">返回首頁</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signInWithRedirect } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-functions.js";
        import { firebaseConfig, connectFirebaseEmulators, isLocalDev } from "./js/firebase-local.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const functions = getFunctions(app, 'asia-east1');
        connectFirebaseEmulators({ auth, db, functions });
        const checkAuthFunction = httpsCallable(functions, 'checkPaymentAuthorization');
        const loginProvider = new GoogleAuthProvider();
        document.getElementById('retry-login-btn').addEventListener('click', startGoogleLogin);

        function isInAppBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            
            // 1. Explicit signatures for known webviews
            const knownInApp = (
                ua.indexOf("FBAN") > -1 ||
                ua.indexOf("FBAV") > -1 ||
                ua.indexOf("Line/") > -1 ||
                ua.indexOf("Instagram") > -1 ||
                ua.indexOf("WeChat") > -1 ||
                ua.indexOf("GSA/") > -1 ||
                ua.indexOf("Twitter") > -1 ||
                ua.indexOf("Slack") > -1 ||
                ua.indexOf("Discord") > -1
            );
            if (knownInApp) return true;

            // 2. iOS WebView detection (e.g. Gmail app, which doesn't specify custom UA tokens but lacks standard Safari tokens)
            const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
            if (isIOS) {
                const isStandardMobileBrowser = (
                    ua.indexOf("Safari") > -1 || 
                    ua.indexOf("CriOS") > -1 || 
                    ua.indexOf("FxiOS") > -1 || 
                    ua.indexOf("DuckDuckGo") > -1 || 
                    ua.indexOf("EdgiOS") > -1
                );
                const hasWebKitHandlers = !!(window.webkit && window.webkit.messageHandlers);
                if (!isStandardMobileBrowser || hasWebKitHandlers) {
                    return true;
                }
            }

            // 3. Android WebView detection
            const isAndroid = /Android/i.test(ua);
            if (isAndroid) {
                const isAndroidWebView = ua.indexOf("; wv)") > -1 || (ua.indexOf("Version/") > -1 && ua.indexOf("Chrome") > -1 && ua.indexOf("Mobile") > -1 && ua.indexOf("Version/4.0") > -1);
                if (isAndroidWebView) {
                    return true;
                }
            }

            return false;
        }

        function showInAppBrowserModal() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            const backdrop = document.createElement("div");
            backdrop.id = "in-app-browser-modal";
            backdrop.style.cssText = `
                position: fixed;
                inset: 0;
                z-index: 1000000;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(15, 23, 42, 0.65);
                backdrop-filter: blur(12px);
                padding: 1.5rem;
                font-family: 'Inter', system-ui, -apple-system, sans-serif;
            `;
            
            const card = document.createElement("div");
            card.style.cssText = `
                background: rgba(255, 255, 255, 0.98);
                border: 1px solid rgba(255, 255, 255, 0.5);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
                border-radius: 2rem;
                max-width: 28rem;
                width: 100%;
                padding: 2.5rem 2rem;
                text-align: center;
                position: relative;
                animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            `;
            
            let animationStyle = document.getElementById("in-app-modal-animations");
            if (!animationStyle) {
                animationStyle = document.createElement("style");
                animationStyle.id = "in-app-modal-animations";
                animationStyle.innerHTML = `
                    @keyframes scaleIn {
                        from { transform: scale(0.9); opacity: 0; }
                        to { transform: scale(1); opacity: 1; }
                    }
                `;
                document.head.appendChild(animationStyle);
            }

            const titleText = "請使用獨立瀏覽器開啟";
            const descText = "Google 為了帳戶安全，已封鎖在 App 內建瀏覽器（如 LINE、FB、Gmail、Slack 等）的登入。若您是從其他 App 開啟此連結，請切換至系統獨立的 Safari 或 Chrome App 即可正常登入。";
            const stepText = isIOS 
                ? "請點擊右上角「<span style='font-weight: 800; color: #4f46e5;'>⋯</span>」或「<span style='font-weight: 800; color: #4f46e5;'>分享</span>」按鈕，並選擇 <b>在 Safari 中開啟</b>。" 
                : "請點擊右上角「<span style='font-weight: 800; color: #4f46e5;'>⋯</span>」按鈕，並選擇 <b>在 Chrome / 預設瀏覽器中開啟</b>。";

            card.innerHTML = `
                <div style="width: 4.5rem; height: 4.5rem; background: #e0e7ff; border-radius: 9999px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: #4f46e5; font-size: 2rem;">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </div>
                <h3 style="font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 0.75rem; letter-spacing: -0.025em;">${titleText}</h3>
                <p style="font-size: 0.875rem; color: #475569; line-height: 1.6; margin-bottom: 1.5rem;">${descText}</p>
                
                <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1.25rem; padding: 1.25rem; font-size: 0.9rem; color: #334155; line-height: 1.6; text-align: left; margin-bottom: 1.75rem; position: relative;">
                    <div style="display: flex; gap: 0.75rem; align-items: flex-start;">
                        <span style="background: #4f46e5; color: #fff; width: 1.25rem; height: 1.25rem; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; flex-shrink: 0; margin-top: 0.2rem;">1</span>
                        <div>${stepText}</div>
                    </div>
                </div>

                <button id="in-app-copy-btn" style="width: 100%; padding: 1rem; background: #4f46e5; color: #fff; border: none; border-radius: 1rem; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); margin-bottom: 0.75rem;">
                    複製網頁連結
                </button>
                <button id="in-app-close-btn" style="width: 100%; padding: 0.75rem; background: transparent; color: #64748b; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer;">
                    關閉提示
                </button>
            `;

            backdrop.appendChild(card);
            document.body.appendChild(backdrop);

            document.getElementById("in-app-close-btn").onclick = () => {
                backdrop.remove();
            };

            document.getElementById("in-app-copy-btn").onclick = async () => {
                const copyBtn = document.getElementById("in-app-copy-btn");
                try {
                    await navigator.clipboard.writeText(window.location.href);
                    copyBtn.innerText = "✓ 連結複製成功！";
                    copyBtn.style.background = "#10b981";
                    setTimeout(() => {
                        copyBtn.innerText = "複製網頁連結";
                        copyBtn.style.background = "#4f46e5";
                    }, 2000);
                } catch (e) {
                    alert("複製失敗，請手動複製網址。");
                }
            };
        }

        async function startGoogleLogin() {
            if (isInAppBrowser()) {
                showInAppBrowserModal();
                return;
            }
            try {
                // Try popup login first in all environments. This is much more reliable
                // on custom domains under modern browser privacy restrictions (blocking third-party cookies).
                await signInWithPopup(auth, loginProvider);
            } catch (error) {
                console.warn("[Auth] Google popup login failed or blocked, trying redirect...", error);
                try {
                    await signInWithRedirect(auth, loginProvider);
                } catch (redirectError) {
                    console.error("[Auth] Google redirect login failed:", redirectError);
                    showError("Google 登入失敗，請返回首頁後再試一次。");
                }
            }
        }

        function showError(message) {
            document.getElementById('loading-ui').classList.add('hidden');
            document.getElementById('error-ui').classList.remove('hidden');
            if (message) document.getElementById('error-msg').textContent = message;
        }

        async function verifyAndRedirect(user) {
            // 1. 解析網址參數
            const urlParams = new URLSearchParams(window.location.search);
            const targetUrl = urlParams.get('url'); // 真實課程網址 (作業 / YouTube)
            const courseId = urlParams.get('id');   // 課程 ID
            const price = urlParams.get('price');   // 價格 (判斷是否為免費課)
            const lang = urlParams.get('lang') || urlParams.get('locale') || '';

            console.log("[Auth] Verifying params:", { targetUrl, courseId, price, lang });
            
            // [MODIFIED] Legacy/Cache Fallback: If URLSearchParams fails (e.g. because of multiple ?)
            if (!targetUrl || !courseId) {
                console.warn("[Auth] Standard parsing failed, trying manual fallback...");
                const fullSearch = window.location.search + window.location.hash;
                const matchUrl = fullSearch.match(/[?&]url=([^&]*)/);
                const matchId = fullSearch.match(/[?&]id=([^&]*)/);
                const matchPrice = fullSearch.match(/[?&]price=([^&]*)/);
                const matchLang = fullSearch.match(/[?&](?:lang|locale)=([^&]*)/);
                
                const fallbackUrl = matchUrl ? decodeURIComponent(matchUrl[1]) : null;
                const fallbackId = matchId ? matchId[1] : null;
                const fallbackPrice = matchPrice ? matchPrice[1] : null;
                const fallbackLang = matchLang ? matchLang[1] : '';
                
                console.log("[Auth] Fallback results:", { fallbackUrl, fallbackId, fallbackPrice, fallbackLang });
                
                if (fallbackUrl && fallbackId) {
                    // Use fallbacks
                    proceedWithVerification(fallbackUrl, fallbackId, fallbackPrice, user, fallbackLang);
                    return;
                }
            }

            if (!targetUrl || !courseId || targetUrl === 'undefined') {
                console.warn("[Auth] Missing URL or ID, redirecting to index.html");
                window.location.replace("index.html");
                return;
            }
            // If we have them, proceed with the main flow
            proceedWithVerification(targetUrl, courseId, price, user, lang);
        }

        // Refactored flow to allow fallbacks
        async function proceedWithVerification(targetUrl, courseId, price, user, lang = "") {
            // 2. 付費與免費課程皆需透過後端取得 Token，以通過 serveCourse 的安全檢查
            try {
                let fileName = "";
                if (targetUrl) {
                    const parts = targetUrl.split('/');
                    fileName = parts[parts.length - 1].split('?')[0];
                }

                if (!fileName) {
                    alert("錯誤：無法解析檔案名稱 (Filename missing)");
                    showError("無法解析課程檔案路徑");
                    return;
                }

                const isTutorMode = localStorage.getItem('adminTutorMode') === 'true';
                const primaryPageId = courseId || fileName;

                let result = await checkAuthFunction({
                    pageId: primaryPageId,
                    fileName: fileName,
                    tutorMode: isTutorMode
                });

                if (result?.data?.authorized) {
                    // 驗證成功！
                    const token = result.data.token;
                    let finalUrl = decodeURIComponent(targetUrl);

                    // Append token
                    if (finalUrl.includes('?')) {
                        finalUrl += `&token=${token}`;
                    } else {
                        finalUrl += `?token=${token}`;
                    }

                    // Append lang/locale if present
                    if (lang) {
                        finalUrl += `&lang=${encodeURIComponent(lang)}`;
                    }

                    window.location.replace(finalUrl);
                } else {
                    showError("系統查無您的購買紀錄，請確認是否已登入正確帳號。");
                }
            } catch (error) {
                console.error(error);
                showError("伺服器連線錯誤，請稍後再試。");
            }
        }

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            console.log("[Auth] State changed. User:", user ? user.email : "null");
            if (user) {
                verifyAndRedirect(user);
            } else {
                console.log("[Auth] No user detected. Waiting for 3s before redirect...");
                // 如果沒登入，保留一點時間讓 Firebase 嘗試自動登入
                setTimeout(() => {
                    if (!auth.currentUser) {
                        console.warn("[Auth] Still no user after 3s. Starting Google login on this page...");
                        startGoogleLogin();
                    } else {
                        console.log("[Auth] User detected after delay. Resuming...");
                    }
                }, 3000);
            }
        });
    </script>
</body>

</html>
