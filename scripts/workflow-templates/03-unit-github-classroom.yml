name: Classroom Grade + Sync

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "grade_and_sync or sync_only"
        required: false
        default: "grade_and_sync"
        type: choice
        options:
          - grade_and_sync
          - sync_only
      score_override:
        description: "Optional score override (e.g. 83)"
        required: false
        type: string
      max_score:
        description: "Max score"
        required: false
        default: "100"
        type: string
      status_override:
        description: "Optional status override"
        required: false
        default: ""
        type: string
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  grade_and_sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'autograde')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Grader
        id: grader
        shell: bash
        run: |
          set -euo pipefail
          RUN_MODE="${{ github.event.inputs.run_mode }}"
          SCORE_OVERRIDE="${{ github.event.inputs.score_override }}"
          MAX_SCORE="${{ github.event.inputs.max_score || '100' }}"
          STATUS_OVERRIDE="${{ github.event.inputs.status_override }}"

          if [ -n "$SCORE_OVERRIDE" ]; then
            echo "score=$SCORE_OVERRIDE" >> "$GITHUB_OUTPUT"
            echo "max_score=$MAX_SCORE" >> "$GITHUB_OUTPUT"
            echo "status=${STATUS_OVERRIDE:-completed}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$RUN_MODE" = "sync_only" ]; then
            echo "score=100" >> "$GITHUB_OUTPUT"
            echo "max_score=$MAX_SCORE" >> "$GITHUB_OUTPUT"
            echo "status=${STATUS_OVERRIDE:-completed}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # -------------------------------------------------------
          # Task 3-1: 啟動 Codespaces 雲端環境 (30 pts)
          #   submission/task-3-1.md must contain:
          #     - A GitHub repo URL (https://github.com/...)
          #     - At least 3 non-empty lines (screenshot description or notes)
          # -------------------------------------------------------
          SCORE_VAL=0
          if [ -f submission/task-3-1.md ]; then
            HAS_REPO_URL=$(grep -Eic 'https://github\.com/.+/.+' submission/task-3-1.md || true)
            NON_EMPTY=$(grep -cve '^\s*$' submission/task-3-1.md || true)
            if [ "$HAS_REPO_URL" -ge 1 ] && [ "$NON_EMPTY" -ge 3 ]; then
              SCORE_VAL=$((SCORE_VAL + 30))
            fi
          fi

          # -------------------------------------------------------
          # Task 3-2: 原子化提交與自動評分 (40 pts)
          #   submission/task-3-2.md must contain:
          #     - A GitHub Actions run URL (https://github.com/.../actions/runs/...)
          #     - The word "autograde" or "✅" indicating green result
          #     - At least 2 distinct commit SHAs or "git log" lines
          # -------------------------------------------------------
          if [ -f submission/task-3-2.md ]; then
            HAS_ACTIONS_URL=$(grep -Eic 'https://github\.com/.+/actions/runs/[0-9]+' submission/task-3-2.md || true)
            HAS_GREEN=$(grep -Eic '✅|passed|success|green|autograde' submission/task-3-2.md || true)
            HAS_COMMITS=$(grep -Eic '^[a-f0-9]{7,40} ' submission/task-3-2.md || true)
            TASK32_SCORE=0
            if [ "$HAS_ACTIONS_URL" -ge 1 ]; then
              TASK32_SCORE=$((TASK32_SCORE + 20))
            fi
            if [ "$HAS_GREEN" -ge 1 ]; then
              TASK32_SCORE=$((TASK32_SCORE + 10))
            fi
            if [ "$HAS_COMMITS" -ge 2 ]; then
              TASK32_SCORE=$((TASK32_SCORE + 10))
            fi
            SCORE_VAL=$((SCORE_VAL + TASK32_SCORE))
          fi

          # -------------------------------------------------------
          # Task 3-3: Feedback PR 與 Code Review (30 pts)
          #   submission/task-3-3.md must contain:
          #     - A GitHub PR comment permalink (https://github.com/.../pull/.../files#...)
          #       OR a PR URL (https://github.com/.../pull/...)
          #     - At least 5 non-empty lines (showing comment content description)
          # -------------------------------------------------------
          if [ -f submission/task-3-3.md ]; then
            HAS_PR_URL=$(grep -Eic 'https://github\.com/.+/pull/[0-9]+' submission/task-3-3.md || true)
            NON_EMPTY=$(grep -cve '^\s*$' submission/task-3-3.md || true)
            if [ "$HAS_PR_URL" -ge 1 ] && [ "$NON_EMPTY" -ge 5 ]; then
              SCORE_VAL=$((SCORE_VAL + 30))
            elif [ "$HAS_PR_URL" -ge 1 ]; then
              SCORE_VAL=$((SCORE_VAL + 15))
            fi
          fi

          if [ "$SCORE_VAL" -gt "$MAX_SCORE" ]; then
            SCORE_VAL="$MAX_SCORE"
          fi

          echo "score=$SCORE_VAL" >> "$GITHUB_OUTPUT"
          echo "max_score=$MAX_SCORE" >> "$GITHUB_OUTPUT"
          if [ "$SCORE_VAL" -ge "$MAX_SCORE" ]; then
            echo "status=${STATUS_OVERRIDE:-completed}" >> "$GITHUB_OUTPUT"
          elif [ "$SCORE_VAL" -gt 0 ]; then
            echo "status=${STATUS_OVERRIDE:-in_progress}" >> "$GITHUB_OUTPUT"
          else
            echo "status=${STATUS_OVERRIDE:-failed}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Payload
        id: payload
        shell: bash
        env:
          DEFAULT_USER_ID: ${{ vars.VC_USER_ID }}
          DEFAULT_UNIT_ID: ${{ vars.VC_UNIT_ID }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          USER_ID="${DEFAULT_USER_ID:-}"
          UNIT_ID="${DEFAULT_UNIT_ID:-}"
          SCORE="${{ steps.grader.outputs.score }}"
          MAX_SCORE="${{ steps.grader.outputs.max_score }}"
          STATUS="${{ steps.grader.outputs.status }}"

          if [ -z "$SCORE" ]; then
            echo "score missing"; exit 1
          fi
          if [ -z "$USER_ID" ] || [ -z "$UNIT_ID" ]; then
            echo "Need vars.VC_USER_ID+VC_UNIT_ID."; exit 1
          fi

          PAYLOAD=$(jq -cn \
            --arg userId "$USER_ID" \
            --arg unitId "$UNIT_ID" \
            --argjson score "$SCORE" \
            --argjson maxScore "$MAX_SCORE" \
            --arg status "$STATUS" \
            --arg runUrl "$RUN_URL" \
            --arg workflow "$WORKFLOW_NAME" \
            --arg commitSha "$COMMIT_SHA" \
            --arg repo "$REPO" \
            --arg actor "$ACTOR" \
            '{
              userId: ($userId | select(length > 0)),
              unitId: ($unitId | select(length > 0)),
              score: $score,
              maxScore: $maxScore,
              status: $status,
              runUrl: $runUrl,
              workflow: $workflow,
              commitSha: $commitSha,
              repo: $repo,
              actor: $actor
            }')

          echo "payload=$PAYLOAD" >> "$GITHUB_OUTPUT"

      - name: Send Score To Vibe Coding
        shell: bash
        env:
          VC_AUTOGRADE_URL: ${{ secrets.VC_AUTOGRADE_URL }}
          VC_AUTOGRADE_TOKEN: ${{ secrets.VC_AUTOGRADE_TOKEN }}
          PAYLOAD: ${{ steps.payload.outputs.payload }}
        run: |
          set -euo pipefail
          [ -n "${VC_AUTOGRADE_URL:-}" ] || { echo "Missing VC_AUTOGRADE_URL"; exit 1; }
          [ -n "${VC_AUTOGRADE_TOKEN:-}" ] || { echo "Missing VC_AUTOGRADE_TOKEN"; exit 1; }

          SIG="sha256=$(printf %s "$PAYLOAD" | openssl dgst -sha256 -hmac "$VC_AUTOGRADE_TOKEN" | sed 's/^.* //')"

          curl -sS -X POST "$VC_AUTOGRADE_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"
