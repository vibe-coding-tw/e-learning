name: Autograde Sync To Vibe Coding

on:
  workflow_dispatch:
    inputs:
      assignment_doc_id:
        description: "Firestore assignment doc id (e.g. uid_assignmentId)"
        required: true
        type: string
      score:
        description: "Auto grade score"
        required: true
        type: string
      max_score:
        description: "Max score"
        required: false
        default: "100"
        type: string
      status:
        description: "Grade status"
        required: false
        default: "completed"
        type: string
  repository_dispatch:
    types: [autograde_result]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Build payload
        id: payload
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ASSIGNMENT_DOC_ID: ${{ inputs.assignment_doc_id }}
          INPUT_SCORE: ${{ inputs.score }}
          INPUT_MAX_SCORE: ${{ inputs.max_score }}
          INPUT_STATUS: ${{ inputs.status }}
          DISPATCH_ASSIGNMENT_DOC_ID: ${{ github.event.client_payload.assignmentDocId }}
          DISPATCH_SCORE: ${{ github.event.client_payload.score }}
          DISPATCH_MAX_SCORE: ${{ github.event.client_payload.maxScore }}
          DISPATCH_STATUS: ${{ github.event.client_payload.status }}
          DISPATCH_RUN_URL: ${{ github.event.client_payload.runUrl }}
          DISPATCH_WORKFLOW: ${{ github.event.client_payload.workflow }}
          DISPATCH_COMMIT_SHA: ${{ github.event.client_payload.commitSha }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            ASSIGNMENT_DOC_ID="${DISPATCH_ASSIGNMENT_DOC_ID:-}"
            SCORE="${DISPATCH_SCORE:-}"
            MAX_SCORE="${DISPATCH_MAX_SCORE:-100}"
            STATUS="${DISPATCH_STATUS:-completed}"
            GRADE_RUN_URL="${DISPATCH_RUN_URL:-$RUN_URL}"
            GRADE_WORKFLOW="${DISPATCH_WORKFLOW:-$WORKFLOW_NAME}"
            GRADE_COMMIT_SHA="${DISPATCH_COMMIT_SHA:-$COMMIT_SHA}"
          else
            ASSIGNMENT_DOC_ID="${INPUT_ASSIGNMENT_DOC_ID:-}"
            SCORE="${INPUT_SCORE:-}"
            MAX_SCORE="${INPUT_MAX_SCORE:-100}"
            STATUS="${INPUT_STATUS:-completed}"
            GRADE_RUN_URL="$RUN_URL"
            GRADE_WORKFLOW="$WORKFLOW_NAME"
            GRADE_COMMIT_SHA="$COMMIT_SHA"
          fi

          if [ -z "$ASSIGNMENT_DOC_ID" ] || [ -z "$SCORE" ]; then
            echo "assignment_doc_id and score are required"
            exit 1
          fi

          PAYLOAD=$(jq -cn \
            --arg assignmentDocId "$ASSIGNMENT_DOC_ID" \
            --argjson score "$SCORE" \
            --argjson maxScore "$MAX_SCORE" \
            --arg status "$STATUS" \
            --arg runUrl "$GRADE_RUN_URL" \
            --arg workflow "$GRADE_WORKFLOW" \
            --arg commitSha "$GRADE_COMMIT_SHA" \
            --arg repo "$REPO" \
            --arg actor "$ACTOR" \
            '{
              assignmentDocId: $assignmentDocId,
              score: $score,
              maxScore: $maxScore,
              status: $status,
              runUrl: $runUrl,
              workflow: $workflow,
              commitSha: $commitSha,
              repo: $repo,
              actor: $actor
            }')

          echo "payload=$PAYLOAD" >> "$GITHUB_OUTPUT"

      - name: Sign payload and send
        env:
          VC_AUTOGRADE_URL: ${{ secrets.VC_AUTOGRADE_URL }}
          VC_AUTOGRADE_TOKEN: ${{ secrets.VC_AUTOGRADE_TOKEN }}
          PAYLOAD: ${{ steps.payload.outputs.payload }}
        run: |
          set -euo pipefail

          if [ -z "${VC_AUTOGRADE_URL:-}" ] || [ -z "${VC_AUTOGRADE_TOKEN:-}" ]; then
            echo "Missing VC_AUTOGRADE_URL or VC_AUTOGRADE_TOKEN secrets."
            exit 1
          fi

          SIG="sha256=$(printf %s "$PAYLOAD" | openssl dgst -sha256 -hmac "$VC_AUTOGRADE_TOKEN" | sed 's/^.* //')"

          curl -sS -X POST "$VC_AUTOGRADE_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"
